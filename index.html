<title>Kognit — Welcher KI-Arbeitstyp bist du?</title>
<style>
/* ============================================================
   KOGNIT — design tokens
   Neutrals biased toward indigo. Deep night ground + cool
   blue-tinted off-white (deliberately NOT the AI cream cliché).
   ============================================================ */
:root{
  /* light is default; dark overridden below */
  --bg:#F3F5F9;
  --surface:#FAFBFD;
  --raised:#FFFFFF;
  --border:#D8DCE8;
  --border-strong:#C3C8DA;
  --ink:#14182B;
  --ink-2:#454C66;
  --ink-3:#7C829B;
  --brand:#4C48D1;
  --brand-ink:#3E3AB8;
  --shadow:0 1px 2px rgba(20,23,43,.04), 0 12px 34px -18px rgba(20,23,43,.18);
  --shadow-lg:0 2px 6px rgba(20,23,43,.05), 0 40px 80px -40px rgba(20,23,43,.32);
  --accent:#4C48D1;          /* per-archetype, set at runtime */
  --accent-soft:rgba(76,72,209,.12);
  --on-accent:#fff;          /* legible text/graphic on top of accent/brand */

  --serif:ui-serif,"New York","Iowan Old Style","Palatino Linotype",Palatino,Georgia,Cambria,"Times New Roman",serif;
  --sans:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,system-ui,sans-serif;
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Cascadia Mono","Liberation Mono",monospace;

  --maxw:1120px;
  --readw:660px;
  --r-sm:8px; --r-md:14px; --r-lg:22px; --r-xl:30px;
  --sp:clamp(18px,4vw,40px);
  color-scheme:light;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#0B0E1C;
    --surface:#111527;
    --raised:#181D33;
    --border:#272E4A;
    --border-strong:#39406A;
    --ink:#EEF0FA;
    --ink-2:#A6ACCB;
    --ink-3:#6A7194;
    --brand:#938BFC;
    --brand-ink:#A9A3FF;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 18px 40px -22px rgba(0,0,0,.7);
    --shadow-lg:0 2px 8px rgba(0,0,0,.5), 0 50px 90px -40px rgba(0,0,0,.8);
    --accent-soft:rgba(147,139,252,.16);
    --on-accent:#0B0E1C;
    color-scheme:dark;
  }
}
:root[data-theme="light"]{
  --bg:#F3F5F9; --surface:#FAFBFD; --raised:#FFFFFF; --border:#D8DCE8; --border-strong:#C3C8DA;
  --ink:#14182B; --ink-2:#454C66; --ink-3:#7C829B; --brand:#4C48D1; --brand-ink:#3E3AB8;
  --shadow:0 1px 2px rgba(20,23,43,.04), 0 12px 34px -18px rgba(20,23,43,.18);
  --shadow-lg:0 2px 6px rgba(20,23,43,.05), 0 40px 80px -40px rgba(20,23,43,.32);
  --accent-soft:rgba(76,72,209,.12); --on-accent:#fff; color-scheme:light;
}
:root[data-theme="dark"]{
  --bg:#0B0E1C; --surface:#111527; --raised:#181D33; --border:#272E4A; --border-strong:#39406A;
  --ink:#EEF0FA; --ink-2:#A6ACCB; --ink-3:#6A7194; --brand:#938BFC; --brand-ink:#A9A3FF;
  --shadow:0 1px 2px rgba(0,0,0,.4), 0 18px 40px -22px rgba(0,0,0,.7);
  --shadow-lg:0 2px 8px rgba(0,0,0,.5), 0 50px 90px -40px rgba(0,0,0,.8);
  --accent-soft:rgba(147,139,252,.16); --on-accent:#0B0E1C; color-scheme:dark;
}

*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;background:var(--bg);color:var(--ink);
  font-family:var(--sans);font-size:17px;line-height:1.6;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
img,canvas{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
::selection{background:var(--accent-soft);color:var(--ink)}
:where(button,a,summary,select,input):focus-visible{outline:2px solid var(--accent);outline-offset:2px}

h1,h2,h3,.serif{font-family:var(--serif);font-weight:600;letter-spacing:-.015em}
.mono{font-family:var(--mono)}
.eyebrow{
  font-family:var(--mono);font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--ink-3);font-weight:500;
}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--sp)}

/* ---------- app screens ---------- */
.screen{display:none;animation:fadeUp .5s ease both}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){
  .screen{animation:none}
  *{animation-duration:.001ms !important;transition-duration:.001ms !important;animation-delay:0s !important;transition-delay:0s !important}
}

/* ---------- top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:60;
  backdrop-filter:saturate(1.4) blur(14px);
  background:color-mix(in srgb,var(--bg) 82%,transparent);
  border-bottom:1px solid var(--border);
}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:60px}
.brandmark{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:-.01em;font-size:16px}
.brandmark .dot{width:26px;height:26px;border-radius:7px;background:
  radial-gradient(120% 120% at 30% 20%, var(--brand) 0%, color-mix(in srgb,var(--brand) 55%, #000) 100%);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);position:relative}
.brandmark .dot::after{content:"";position:absolute;inset:0;border-radius:7px;
  background:conic-gradient(from 210deg,transparent 0 55%,rgba(255,255,255,.5) 62%,transparent 70%)}
.topbar-actions{display:flex;align-items:center;gap:6px}
.iconbtn{
  width:40px;height:40px;border-radius:10px;display:grid;place-items:center;color:var(--ink-2);
  border:1px solid transparent;transition:.2s
}
.iconbtn:hover{background:var(--surface);border-color:var(--border);color:var(--ink)}
.ghostlink{font-size:14px;color:var(--ink-2);padding:8px 12px;border-radius:9px;transition:.2s}
.ghostlink:hover{color:var(--ink);background:var(--surface)}

/* ---------- buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:10px;justify-content:center;
  font-size:16px;font-weight:550;padding:14px 24px;border-radius:12px;
  transition:transform .18s cubic-bezier(.2,.8,.2,1),box-shadow .2s,background .2s,border-color .2s;
  will-change:transform
}
.btn-primary{background:var(--brand);color:var(--on-accent);box-shadow:0 8px 22px -10px color-mix(in srgb,var(--brand) 80%,transparent)}
.btn-primary:hover{box-shadow:0 12px 30px -10px color-mix(in srgb,var(--brand) 85%,transparent);transform:translateY(-1px)}
.btn-accent{background:var(--accent);color:var(--on-accent);box-shadow:0 10px 26px -12px var(--accent)}
.btn-accent:hover{transform:translateY(-1px)}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--ink)}
.btn-ghost:hover{border-color:var(--border-strong);background:var(--raised)}
.btn:active{transform:translateY(1px) scale(.995)}
.btn-lg{font-size:17.5px;padding:17px 30px}
.btn-block{width:100%}

/* ============================================================
   LANDING
   ============================================================ */
.hero{position:relative;padding:clamp(56px,10vw,120px) 0 clamp(40px,7vw,80px);overflow:hidden}
.hero-orbit{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.9}
.hero .wrap{position:relative;z-index:1}
.hero-eyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:26px}
.hero-eyebrow .pip{width:7px;height:7px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 4px var(--accent-soft)}
.hero h1{
  font-size:clamp(42px,7.4vw,84px);line-height:1.02;letter-spacing:-.03em;margin:0;
  max-width:15ch;text-wrap:balance;font-weight:600
}
.hero h1 em{font-style:italic;color:var(--brand)}
.hero-sub{
  margin:28px 0 0;font-size:clamp(17px,2.2vw,20.5px);line-height:1.55;color:var(--ink-2);
  max-width:56ch
}
.hero-cta{margin-top:38px;display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.hero-meta{display:flex;gap:22px;flex-wrap:wrap;margin-top:30px;color:var(--ink-3);font-size:14px}
.hero-meta span{display:inline-flex;align-items:center;gap:8px}
.hero-meta svg{width:15px;height:15px;stroke:var(--brand)}

.section{padding:clamp(52px,8vw,104px) 0;border-top:1px solid var(--border);scroll-margin-top:76px}
.section-head{max-width:var(--readw)}
.section-head h2{font-size:clamp(28px,4.4vw,44px);line-height:1.08;margin:14px 0 0;letter-spacing:-.025em}
.section-head p{color:var(--ink-2);font-size:18px;margin:16px 0 0;max-width:52ch}

.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:52px}
.step{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:30px 26px;position:relative;box-shadow:var(--shadow)}
.step .n{font-family:var(--mono);font-size:13px;color:var(--brand);letter-spacing:.1em}
.step h3{font-size:21px;margin:16px 0 8px}
.step p{color:var(--ink-2);font-size:15.5px;margin:0}

.props{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-top:52px;background:var(--border);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.prop{background:var(--surface);padding:30px 28px}
.prop .k{font-family:var(--mono);font-size:12px;color:var(--ink-3);letter-spacing:.14em;text-transform:uppercase}
.prop h3{font-size:19px;margin:14px 0 8px;letter-spacing:-.01em}
.prop p{color:var(--ink-2);font-size:15px;margin:0}
.prop svg{width:22px;height:22px;stroke:var(--brand);fill:none;stroke-width:1.5}

/* archetype preview strip */
.typestrip{margin-top:48px;display:grid;grid-template-columns:repeat(8,1fr);gap:12px}
.typechip{aspect-ratio:1;border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface);
  display:grid;place-items:center;position:relative;transition:.25s;overflow:hidden}
.typechip canvas{width:70%;height:70%}
.typechip .code{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--ink-2);letter-spacing:.05em}
.typechip:hover{transform:translateY(-3px);border-color:var(--border-strong);box-shadow:var(--shadow)}

/* SEO role cards */
.roles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:48px}
.rolecard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:26px 24px;transition:.25s;box-shadow:var(--shadow)}
.rolecard:hover{border-color:var(--border-strong);transform:translateY(-2px)}
.rolecard .glyph{width:34px;height:34px;color:var(--brand);margin-bottom:16px}
.rolecard h3{font-size:19px;margin:0 0 8px}
.rolecard p{color:var(--ink-2);font-size:14.5px;margin:0}

/* pricing */
.tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:52px;align-items:stretch}
.tier{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:32px 28px;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.tier.feature{border-color:color-mix(in srgb,var(--brand) 50%,var(--border));box-shadow:var(--shadow-lg);position:relative}
.tier.feature::before{content:"Empfohlen";position:absolute;top:-11px;left:28px;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:var(--brand);color:var(--on-accent);padding:4px 12px;border-radius:20px}
.tier .name{font-family:var(--mono);font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
.tier .price{font-family:var(--serif);font-size:44px;margin:16px 0 4px;letter-spacing:-.02em}
.tier .price small{font-size:17px;color:var(--ink-3);font-family:var(--sans)}
.tier .strike{color:var(--ink-3);text-decoration:line-through;font-size:20px;margin-left:8px;font-family:var(--sans)}
.tier ul{list-style:none;padding:0;margin:22px 0;display:flex;flex-direction:column;gap:11px;flex:1}
.tier li{display:flex;gap:11px;font-size:14.5px;color:var(--ink-2);line-height:1.45}
.tier li svg{width:17px;height:17px;stroke:var(--brand);flex-shrink:0;margin-top:3px}

/* FAQ */
.faq{margin-top:44px;max-width:760px}
.qa{border-top:1px solid var(--border)}
.qa summary{list-style:none;cursor:pointer;padding:22px 0;display:flex;justify-content:space-between;gap:20px;align-items:center;font-weight:550;font-size:17.5px}
.qa summary::-webkit-details-marker{display:none}
.qa summary .chev{width:20px;height:20px;stroke:var(--ink-3);transition:.3s;flex-shrink:0}
.qa summary:hover .chev{stroke:var(--brand)}
.qa[open] summary .chev{transform:rotate(180deg)}
.qa p{margin:0 0 22px;color:var(--ink-2);font-size:16px;max-width:64ch}

footer{border-top:1px solid var(--border);padding:44px 0;color:var(--ink-3);font-size:13.5px}
footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px}
.disclaimer{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:16px 18px;font-size:13px;color:var(--ink-3);margin-top:28px;line-height:1.5}

/* ============================================================
   START / ROLE
   ============================================================ */
.center-stage{min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:40px var(--sp)}
.card-narrow{max-width:560px;width:100%}
.field{margin-top:26px}
.field label{display:block;font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px}
.select{position:relative}
.select select{
  appearance:none;width:100%;padding:16px 46px 16px 18px;border-radius:var(--r-md);
  background:var(--surface);border:1px solid var(--border);color:var(--ink);font-size:16.5px;font-family:var(--sans);
  transition:.2s
}
.select select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 4px var(--accent-soft)}
.select .chev{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--ink-3);pointer-events:none}

/* ============================================================
   TEST FLOW
   ============================================================ */
.progress-wrap{position:sticky;top:60px;z-index:40;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(8px)}
.progress-inner{max-width:var(--maxw);margin:0 auto;padding:14px var(--sp);display:flex;align-items:center;gap:16px}
.pbar{flex:1;height:5px;border-radius:99px;background:var(--border);overflow:hidden}
.pbar i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--brand),color-mix(in srgb,var(--brand) 60%,#fff));transition:width .5s cubic-bezier(.2,.8,.2,1)}
.pcount{font-family:var(--mono);font-size:12.5px;color:var(--ink-3);letter-spacing:.05em;min-width:52px;text-align:right;font-variant-numeric:tabular-nums}

.qstage{min-height:calc(100vh - 60px - 55px);display:flex;flex-direction:column;justify-content:center;padding:40px var(--sp) 80px;max-width:780px;margin:0 auto}
#screen-test{animation:none}
#screen-test .qstage{animation:fadeUp .35s cubic-bezier(.2,.8,.2,1) both}
.qaxis{display:inline-flex;align-items:center;gap:10px;margin-bottom:22px}
.qaxis .tag{font-family:var(--mono);font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--brand);padding:5px 11px;border:1px solid color-mix(in srgb,var(--brand) 35%,var(--border));border-radius:20px}
.qtext{font-family:var(--serif);font-size:clamp(26px,4.4vw,40px);line-height:1.18;letter-spacing:-.02em;margin:0;text-wrap:balance;min-height:3.6em;display:flex;align-items:center}
.likert{margin-top:44px}
.likert-labels{display:flex;justify-content:space-between;font-size:13px;color:var(--ink-3);margin-bottom:14px;font-family:var(--mono);letter-spacing:.02em}
.scale{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.opt{
  position:relative;border:1px solid var(--border);background:var(--surface);border-radius:var(--r-md);
  padding:22px 10px;display:flex;flex-direction:column;align-items:center;gap:12px;transition:.2s;
}
.opt:hover{border-color:var(--brand);transform:translateY(-2px)}
.opt.sel{border-color:var(--brand);background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--brand)}
.opt .dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--border-strong);transition:.2s;display:grid;place-items:center}
.opt:hover .dot{border-color:var(--brand)}
.opt.sel .dot{border-color:var(--brand);background:var(--brand)}
.opt.sel .dot::after{content:"";width:9px;height:9px;border-radius:50%;background:var(--on-accent)}
.opt .num{font-family:var(--mono);font-size:13px;color:var(--ink-3)}
.opt.sel .num{color:var(--brand)}
.qnav{display:flex;justify-content:space-between;align-items:center;margin-top:36px}
.qhint{font-size:13px;color:var(--ink-3)}
.qhint kbd{font-family:var(--mono);background:var(--surface);border:1px solid var(--border);border-bottom-width:2px;border-radius:5px;padding:1px 6px;font-size:11.5px}

/* ============================================================
   REVEAL
   ============================================================ */
.reveal{padding:clamp(30px,6vw,64px) 0 60px;position:relative;overflow:hidden}
.reveal-halo{position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:min(900px,120vw);height:700px;
  background:radial-gradient(50% 50% at 50% 50%, color-mix(in srgb,var(--accent) 26%,transparent) 0%, transparent 70%);
  filter:blur(20px);z-index:0;pointer-events:none;opacity:0;transition:opacity 1.4s ease}
.reveal.lit .reveal-halo{opacity:1}
.reveal .wrap{position:relative;z-index:1}
.reveal-top{display:grid;grid-template-columns:340px 1fr;gap:clamp(28px,5vw,64px);align-items:center}
.glyph-stage{position:relative;aspect-ratio:1;display:grid;place-items:center}
.glyph-stage canvas{width:100%;height:100%}
.code-badge{font-family:var(--mono);letter-spacing:.44em;font-size:16px;color:var(--accent);display:flex;gap:0;justify-content:center;margin-top:8px}
.code-badge span{display:inline-block;opacity:0;transform:translateY(6px);animation:codeIn .5s ease forwards}
.code-badge span:last-child{letter-spacing:0}
@keyframes codeIn{to{opacity:1;transform:none}}
.reveal-headline .kicker{font-family:var(--mono);font-size:12.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3)}
.reveal-headline h1{font-size:clamp(40px,6.6vw,74px);line-height:1;letter-spacing:-.03em;margin:14px 0 0;
  opacity:0;transform:translateY(14px);animation:revIn .8s .3s cubic-bezier(.2,.8,.2,1) forwards}
.reveal-headline .tagline{font-family:var(--serif);font-style:italic;font-size:clamp(19px,2.6vw,25px);color:var(--accent);margin:16px 0 0;
  opacity:0;animation:revIn .8s .5s ease forwards}
.reveal-headline .desc{color:var(--ink-2);font-size:18px;margin:20px 0 0;max-width:48ch;
  opacity:0;animation:revIn .8s .65s ease forwards}
@keyframes revIn{to{opacity:1;transform:none}}

.axes{margin-top:clamp(40px,6vw,68px);display:grid;grid-template-columns:1fr 1fr;gap:22px 44px}
.axis-row{opacity:0;animation:revIn .7s ease forwards}
.axis-row .axhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.axis-row .axname{font-size:14px;color:var(--ink-3);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase}
.axis-row .axpoles{display:flex;justify-content:space-between;font-size:14.5px;margin-bottom:9px}
.axis-row .axpoles b{font-weight:600}
.axis-row .axpoles .on{color:var(--accent)}
.axis-row .axpoles .off{color:var(--ink-3)}
.axtrack{height:9px;border-radius:99px;background:var(--border);position:relative}
.axtrack .fill{position:absolute;top:0;bottom:0;background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 55%,transparent),var(--accent));border-radius:99px;width:0;transition:width 1s cubic-bezier(.2,.8,.2,1)}
.axtrack .knob{position:absolute;top:50%;width:16px;height:16px;border-radius:50%;background:var(--accent);transform:translate(-50%,-50%) scale(0);left:50%;box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 25%,transparent);transition:left 1s cubic-bezier(.2,.8,.2,1),transform .4s .3s}
.axtrack .knob.show{transform:translate(-50%,-50%) scale(1)}
.axlean{font-family:var(--mono);font-size:12px;color:var(--ink-3);margin-top:7px;font-variant-numeric:tabular-nums}

.cards2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:clamp(36px,5vw,56px)}
.infocard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px 26px;box-shadow:var(--shadow)}
.infocard h3{font-size:15px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin:0 0 18px;display:flex;align-items:center;gap:9px}
.infocard h3 .ic{width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:1.6}
.infocard ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:14px}
.infocard li{display:flex;gap:12px;font-size:15.5px;line-height:1.45;color:var(--ink)}

.sharebox p{color:var(--ink-2);font-size:15.5px;margin:0 0 22px}

.unlockband{margin-top:clamp(40px,6vw,72px);text-align:center;padding:clamp(30px,5vw,52px) var(--sp);

.unlockband .btn{margin-top:28px}

/* ============================================================
   PAYWALL
   ============================================================ */
.paywall{padding:clamp(40px,7vw,80px) 0}

.report-preview{position:relative;border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;background:var(--surface);box-shadow:var(--shadow)}
.report-preview .peek{padding:clamp(26px,4vw,38px);filter:blur(0);}
.report-preview .fade{position:absolute;left:0;right:0;bottom:0;height:62%;

.buybox{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:clamp(26px,4vw,36px);box-shadow:var(--shadow-lg);position:sticky;top:80px}

.buybox .old{color:var(--ink-3);text-decoration:line-through;font-size:24px}
.buybox .once{color:var(--ink-3);font-size:14px;margin-bottom:20px}
.incl{list-style:none;padding:0;margin:22px 0;display:flex;flex-direction:column;gap:13px}
.incl li{display:flex;gap:12px;font-size:15px;color:var(--ink)}
.incl li svg{width:18px;height:18px;stroke:var(--accent);flex-shrink:0;margin-top:2px}
.ls-note{font-size:12.5px;color:var(--ink-3);margin-top:14px;line-height:1.5;display:flex;gap:9px;align-items:flex-start}
.ls-note svg{width:15px;height:15px;stroke:var(--ink-3);flex-shrink:0;margin-top:2px}
.divider-or{display:flex;align-items:center;gap:14px;margin:24px 0;color:var(--ink-3);font-size:12.5px;font-family:var(--mono);letter-spacing:.1em}
.divider-or::before,.divider-or::after{content:"";height:1px;background:var(--border);flex:1}
.keyfield{display:flex;gap:10px}
.keyfield input{flex:1;padding:14px 16px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--raised);color:var(--ink);font-family:var(--mono);font-size:14px;letter-spacing:.04em;transition:.2s}

.keymsg{font-size:13px;margin-top:12px;min-height:18px}
.keymsg.ok{color:#12a150}
.keymsg.err{color:#e5484d}
.demohint{font-size:12px;color:var(--ink-3);margin-top:10px}
.demohint code{font-family:var(--mono);background:var(--raised);border:1px solid var(--border);padding:2px 7px;border-radius:5px;color:var(--accent)}

/* ============================================================
   REPORT
   ============================================================ */
.report{padding:clamp(30px,5vw,56px) 0 90px}
.report-header{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap;padding-bottom:30px;border-bottom:1px solid var(--border)}
.report-id{display:flex;align-items:center;gap:20px}
.report-id .g{width:72px;height:72px;flex-shrink:0}
.report-id .code{font-family:var(--mono);letter-spacing:.3em;color:var(--accent);font-size:14px}
.report-id h1{font-size:clamp(28px,4vw,40px);margin:6px 0 0;letter-spacing:-.02em}
.report-id .sub{color:var(--ink-3);font-size:14px;margin-top:4px}
.report-actions{display:flex;gap:10px;flex-wrap:wrap}

.report-section{padding:clamp(36px,5vw,56px) 0;border-bottom:1px solid var(--border)}
.report-section > .rs-head{max-width:var(--readw);margin-bottom:30px}
.report-section .rs-num{font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:.14em}
.report-section h2{font-size:clamp(24px,3.6vw,34px);margin:10px 0 0;letter-spacing:-.02em}
.report-section .rs-head p{color:var(--ink-2);margin:12px 0 0;font-size:16.5px}

.promptlib{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.plib{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:.2s;display:flex;flex-direction:column}
.plib:hover{border-color:var(--border-strong);box-shadow:var(--shadow)}
.plib .ph{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);gap:12px}
.plib .ph h4{margin:0;font-size:15.5px;letter-spacing:-.01em;font-family:var(--sans);font-weight:600}
.plib .ph .n{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
.plib pre{margin:0;padding:18px 20px;font-family:var(--mono);font-size:13px;line-height:1.6;white-space:pre-wrap;word-wrap:break-word;color:var(--ink-2);flex:1}
.plib .copybtn2{align-self:flex-start;margin:0 20px 18px;font-family:var(--mono);font-size:11px;padding:6px 11px;border-radius:7px;border:1px solid var(--border);color:var(--ink-3);transition:.2s;background:var(--raised)}

.delmap{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.delcol{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px 26px}

.delcol.keep{border-top:3px solid var(--ink-3)}
.delcol h3{font-size:16px;margin:0 0 20px;display:flex;align-items:center;gap:10px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase}
.delcol h3 svg{width:18px;height:18px;stroke-width:1.7;fill:none}
.delcol.give h3 svg{stroke:var(--accent)}
.delcol.keep h3 svg{stroke:var(--ink-3)}
.delcol ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:13px}
.delcol li{display:flex;gap:12px;font-size:15px;line-height:1.45}
.delcol li svg{width:16px;height:16px;flex-shrink:0;margin-top:3px}

.wf-list{display:flex;flex-direction:column;gap:18px}
.wf{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:26px 28px}
.wf h4{margin:0 0 20px;font-size:18px;letter-spacing:-.01em;display:flex;align-items:center;gap:12px}
.wf h4 .wn{font-family:var(--mono);font-size:12px;color:var(--on-accent);background:var(--accent);width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}
.wf ol{margin:0;padding:0;list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:0}
.wf li{display:flex;gap:16px;padding:12px 0;border-top:1px dashed var(--border);counter-increment:s;font-size:15px;color:var(--ink-2)}
.wf li:first-child{border-top:none}
.wf li::before{content:counter(s);font-family:var(--mono);font-size:12px;color:var(--accent);width:22px;flex-shrink:0;text-align:right;padding-top:1px}

.anti{display:grid;grid-template-columns:1fr;gap:14px}
.antirow{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px 26px;display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:start}
.antirow .warn{width:36px;height:36px;border-radius:10px;background:color-mix(in srgb,#e5a04d 18%,transparent);display:grid;place-items:center;flex-shrink:0}
.antirow .warn svg{width:19px;height:19px;stroke:#d98a2b;fill:none;stroke-width:1.7}
.antirow h4{margin:0 0 6px;font-size:16.5px;letter-spacing:-.01em}
.antirow p{margin:0;color:var(--ink-2);font-size:15px}
.antirow p .fix{color:var(--accent);font-weight:600}

.report-foot{padding:40px 0 0;text-align:center;color:var(--ink-3);font-size:13px}

/* ============================================================
   toast
   ============================================================ */
.toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,20px);background:var(--ink);color:var(--bg);
  padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;
  transition:.3s;z-index:200;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translate(-50%,0)}

   ============================================================ */

}

@media print{

}

<script>

/* ---- per-archetype accent colors (Fable art direction) ---- */
const PALETTE = {
  EPDA:{dark:"#79ACE3",light:"#2D5F9E"},
  EPDI:{dark:"#6FC2E8",light:"#1F6B99"},
  EPMA:{dark:"#5FBEC8",light:"#19717C"},

  WVDA:{dark:"#BB79F0",light:"#75249F"},
  WVDI:{dark:"#DF8FC7",light:"#962D70"},
  WVMA:{dark:"#D68F62",light:"#8C4A1F"},
  WVMI:{dark:"#E5BE66",light:"#8A6A14"}
};

/* ---- generated profile content (Fable) — filled in below ---- */
const DATA = {"EVDA":{"description":"Du führst KI wie ein Schachspieler seine Figuren: klar umrissene Aufträge, ein Zug nach dem anderen, und jeder Zug zahlt auf einen Plan ein, den nur du vollständig kennst. Dabei ist die KI weniger Schreibkraft als Sparringspartner — du lässt sie dein Denken schärfen, nimmst gute Antworten ohne langes Zögern an und gießt alles, was funktioniert, in wiederverwendbare Vorlagen.","strengths":["Deine klar geschnittenen Teilaufträge treffen fast immer ins Ziel — weil du weißt, was du willst, bevor du fragst.","Du verlierst keine Zeit mit Misstrauensritualen: Was gut ist, erkennst du schnell und baust sofort darauf auf.","Aus jedem gelungenen Denkprozess machst du ein System — deine Prompt-Bibliothek wird mit jeder Woche wertvoller."],"blindspots":["Ein elegant formulierter Denkfehler rutscht bei dir leichter durch als bei jedem Prüfer-Typ — gerade weil du auf Überzeugungskraft vertraust.","Weil du jede Teilaufgabe selbst zuschneidest, bleibst du der Flaschenhals: Dein System skaliert nur so schnell wie dein Kalender.","Deine Vorlagen können zur Komfortzone werden — du optimierst den Apparat, während sich die eigentliche Frage längst verändert hat."],"signaturePrompt":"Ich stehe vor dieser Entscheidung: [Entscheidung in einem Satz].\nMein Favorit ist [Option] — aus diesem Grund: [Begründung].\nSei mein Sparringspartner: Gib mir die zwei stärksten Argumente für meinen Favoriten,\ndas eine Argument, das ihn kippen könnte, und die Frage, die ich mir noch nicht gestellt habe.\nKurz, direkt, ohne Absicherungsfloskeln.","promptLibrary":[{"title":"Drei Brillen auf ein Problem","prompt":"Hier ist mein Problem: [Problem in 2–3 Sätzen].\nBetrachte es nacheinander durch drei Brillen: [z. B. Ökonomie, Psychologie, Systemdenken].\nPro Brille: die eine Einsicht, die die anderen beiden übersehen würden.\nAm Ende: Welche Brille verdient in meinem Fall die meiste Aufmerksamkeit — und warum?"},{"title":"Vom Knäuel zur Gliederung","prompt":"Hier sind meine ungeordneten Notizen: [Notizen einfügen].\nBaue daraus drei alternative Gliederungen mit je einem anderen roten Faden.\nBenenne pro Variante in einem Satz, welche Geschichte sie erzählt.\nKeine neuen Inhalte erfinden — nur ordnen und benennen."},{"title":"Der Eine-Satz-Kern","prompt":"Ich versuche, [Idee/Projekt] auf den Punkt zu bringen.\nMein aktueller Versuch: [Satz].\nGib mir fünf schärfere Fassungen in je einem Satz — von nüchtern bis pointiert.\nMarkiere die Fassung, die am meisten weglässt, ohne falsch zu werden."},{"title":"Zug für Zug zerlegen","prompt":"Mein Ziel: [Ziel]. Zeitrahmen: [Zeitraum].\nZerlege das in Teilaufgaben von maximal 30 Minuten, die ich einzeln an dich delegieren kann.\nPro Teilaufgabe: ein Satz Auftrag, das erwartete Ergebnis und was ich dir dafür liefern muss.\nSortiere nach der Reihenfolge, in der die Züge aufeinander aufbauen."},{"title":"Vorlage aus dem Treffer bauen","prompt":"Dieser Prompt hat gerade sehr gut funktioniert: [Prompt einfügen].\nMach daraus eine wiederverwendbare Vorlage: Ersetze alles Situative durch [Platzhalter],\nergänze eine Zeile, die Ton und Format fixiert, und schreib zwei Sätze dazu,\nwann diese Vorlage passt — und wann nicht."},{"title":"Schnelle Zweitmeinung","prompt":"Hier ist mein Entwurf: [Entwurf oder Plan einfügen].\nEine Zweitmeinung in genau drei Punkten: Was ist stark? Was ist die größte Schwäche?\nWas würdest du als Erstes ändern?\nKeine Einleitung, keine Absicherungen — direkt zur Sache."},{"title":"Optionen-Matrix","prompt":"Ich vergleiche diese Optionen: [Option A, Option B, Option C].\nMeine Kriterien: [z. B. Aufwand, Risiko, Wirkung].\nBaue eine Matrix und bewerte jede Zelle in einem Halbsatz.\nSag mir am Ende, bei welchem Kriterium sich die Optionen wirklich unterscheiden — der Rest ist Rauschen."},{"title":"Pre-Mortem in fünf Minuten","prompt":"Angenommen, [Plan/Projekt] ist in [Zeitraum] gescheitert.\nErzähle mir die drei wahrscheinlichsten Scheiter-Geschichten — jede in drei Sätzen.\nFür jede: das früheste Warnsignal, das ich heute schon beobachten könnte."},{"title":"Standard-Kickoff für neue Projekte","prompt":"Ab jetzt gilt für dieses Projekt: Kontext: [Projektbeschreibung].\nMeine Rolle: [Rolle]. Ziel: [Ziel]. Zielgruppe: [Zielgruppe].\nAntworte immer erst mit deinem Verständnis der Aufgabe in einem Satz, dann mit dem Ergebnis.\nBei Unklarheiten: eine präzise Rückfrage statt einer stillen Annahme."},{"title":"Argument härten","prompt":"Meine These: [These]. Mein bestes Argument dafür: [Argument].\nSchlüpfe in die Rolle des klügsten Skeptikers, den ich kenne, und greif das Argument an.\nDann wechsle zurück und baue mir die Fassung, die diesen Angriff überlebt."},{"title":"Begriff schärfen","prompt":"Ich benutze ständig den Begriff [Begriff], aber er ist mir zu unscharf.\nGib mir drei präzise Definitionen mit unterschiedlichem Zuschnitt,\nje ein Beispiel, das nur unter diese eine Definition fällt,\nund die Abgrenzung zum Nachbarbegriff [verwandter Begriff]."},{"title":"Gespräch in drei Zügen vorbereiten","prompt":"Gleich habe ich ein Gespräch mit [Person/Runde] über [Thema]. Mein Ziel: [Ziel].\nGib mir: die Eröffnung in zwei Sätzen, die drei Punkte, die ich platzieren muss,\nund den einen Einwand, auf den ich vorbereitet sein sollte — samt einer Antwort darauf."},{"title":"Wochenzüge planen","prompt":"Hier meine offenen Themen der Woche: [Liste].\nSortiere sie in drei Stapel: entscheiden (nur ich), delegieren (an dich, als klar umrissene Teilaufgabe),\nliegen lassen (mit Wiedervorlage-Datum).\nFormuliere die Aufträge im Delegieren-Stapel gleich so, dass ich sie einzeln abschicken kann."},{"title":"Denkpfad als Protokoll sichern","prompt":"Wir haben gerade [Thema] durchdacht.\nFasse unseren Denkpfad als wiederverwendbares Protokoll zusammen: Ausgangsfrage,\nverworfene Abzweigungen (mit je einem Satz, warum), finale Linie, offene Fragen.\nSo knapp, dass ich es in einem halben Jahr in zwei Minuten wieder laden kann."}],"delegate":["Das erste Sortieren von unstrukturiertem Material — Notizen, Transkripte, Rechercheschnipsel.","Gegenpositionen und alternative Deutungen zu deinen eigenen Thesen.","Formulierungsvarianten für Inhalte, die inhaltlich bereits entschieden sind.","Die Pflege deiner Prompt-Bibliothek: Vorlagen verallgemeinern, Varianten testen, Ballast ausmisten.","Protokolle und Zusammenfassungen deiner eigenen Denk-Sessions — damit kein Zug verloren geht."],"keep":["Den Gesamtplan: Welche Züge in welcher Reihenfolge gespielt werden, entscheidet niemand außer dir.","Das finale Urteil bei Entscheidungen mit echten Konsequenzen — dein Vertrauen ist ein Werkzeug, kein Freifahrtschein.","Den Zuschnitt der Teilaufgaben: Wer die Aufträge formuliert, kontrolliert das Ergebnis.","Die Kriterien, an denen Output gemessen wird — festgelegt, bevor die KI arbeitet, nicht danach.","Gespräche, in denen es um Vertrauen und Beziehung geht: Stakeholder, Konflikte, heikle Nachrichten."],"workflows":[{"name":"Entscheidung in vier Zügen","steps":["Entscheidung und Favorit in je einem Satz notieren — bevor du die KI öffnest","Mit dem Sparring-Prompt die stärksten Gegenargumente und die ungestellte Frage einholen","Die eine Frage, die hängen bleibt, in einer zweiten Runde vertiefen","Entscheiden und die Begründung in deiner Entscheidungs-Vorlage festhalten — für das nächste Mal"]},{"name":"Von Notizen zum Konzept","steps":["Alles Ungeordnete in einen Prompt kippen und drei Gliederungsvarianten anfordern","Die stärkste Variante wählen und pro Abschnitt eine klar umrissene Teilaufgabe formulieren","Die Teilaufgaben einzeln delegieren und die Ergebnisse selbst zum Ganzen fügen","Den Lauf als Vorlage sichern, wenn er gut war"]},{"name":"Monatliche Vorlagen-Inventur","steps":["Alle Vorlagen durchgehen und markieren, welche du im letzten Monat wirklich benutzt hast","Unbenutzte Vorlagen archivieren statt weiterpflegen","Die zwei meistgenutzten von der KI auf Schwachstellen und bessere Varianten abklopfen lassen","Eine neue Vorlage nur anlegen, wenn du denselben Prompt dreimal von Hand geschrieben hast"]}],"antiPatterns":[{"title":"Die schöne Antwort gewinnt","fix":"Für Entscheidungen mit Tragweite eine feste Gegenregel: Erst annehmen, wenn du die Antwort einer Kollegin in eigenen Worten erklären kannst — was du nicht erklären kannst, hast du nicht geprüft."},{"title":"Werkstatt statt Baustelle","fix":"Vorlagen-Bau strikt an die Drei-Wiederholungen-Regel koppeln: Ein Prompt bekommt erst dann einen Platz in der Bibliothek, wenn du ihn dreimal fast identisch gebraucht hast — vorher wird gearbeitet, nicht gebaut."},{"title":"Ewiges Klein-Klein","fix":"Einmal pro Woche ein bewusstes Experiment: eine komplette Aufgabe statt einer Teilaufgabe delegieren und das Ergebnis mit deinem üblichen Weg vergleichen — oft kann der Autopilot mehr, als dein Plan ihm zutraut."}]},"EPDI":{"description":"Du behandelst KI wie einen klugen Gesprächspartner: kleine, scharf umrissene Aufträge, ein freies Hin und Her ohne Skript — und geglaubt wird erst, wenn du nachgeprüft hast. Dich treibt nicht der schnelle Output, sondern die Frage, ob ein Gedanke wirklich trägt; die Gesamtsteuerung gibst du dabei nie aus der Hand.","strengths":["Fehler skalieren bei dir nicht: Weil du in kleinen Häppchen delegierst und jedes einzeln prüfst, bleibt kein Irrtum lange unentdeckt.","Im freien Hin und Her entlockst du der KI Perspektiven und Einwände, die ein starrer Vorlagen-Prompt nie hergegeben hätte.","Was deinen Dialog und deine Prüfung überlebt, überlebt auch das kritischste Meeting — deine Argumente sind belastbar durchdacht."],"blindspots":["Der Dialog kann zum Selbstzweck werden: Du hast brillant durchdacht — aber noch nichts geliefert.","Weil du nur kleinteilig abgibst, trägst du Routinearbeit weiter selbst, die eine KI längst zuverlässig übernehmen könnte.","Ohne Vorlagen erfindest du deine besten Gesprächszüge jedes Mal neu — was gestern funktioniert hat, ist heute im Chatverlauf verschollen."],"signaturePrompt":"Ich denke gerade über [Thema oder Entscheidung] nach. Übernimm die Rolle eines sokratischen Gesprächspartners: Stelle mir eine Frage nach der anderen — immer nur eine —, die mein Denken schärft. Gib keine Antworten und keine Ratschläge. Wenn ich mir widerspreche oder eine Annahme unbelegt lasse, sag es mir direkt. Wir hören auf, wenn ich sage: „These steht.\"","promptLibrary":[{"title":"Advocatus Diaboli","prompt":"Hier ist meine These: [These]. Greif sie an, so hart wie möglich. Nenne die drei stärksten Gegenargumente, jeweils mit dem realistischsten Szenario, in dem ich falsch liege. Keine Höflichkeit, keine Balance — nur der Angriff. Danach sage ich dir, welche Angriffe ich entkräften kann."},{"title":"Annahmen-Röntgen","prompt":"Lies diesen Entwurf: [Text]. Liste jede Aussage auf, die auf einer unbelegten Annahme beruht — als Tabelle mit drei Spalten: die Aussage, was belegt sein müsste, und wie ich es in unter zehn Minuten selbst prüfen könnte."},{"title":"Denk-Stenograf","prompt":"Ich denke jetzt laut über [Thema] nach. Unterbrich mich nicht mit Lösungen. Fasse nach jedem meiner Absätze in einem Satz zusammen, was ich gerade behauptet habe, und stelle höchstens eine Rückfrage, wenn etwas unklar ist. Am Ende: die Struktur meines Gedankengangs als Gliederung."},{"title":"Widerspruchs-Wächter","prompt":"Ich füttere dich nach und nach mit meinen Notizen zu [Projekt]. Deine einzige Aufgabe: Melde dich nur, wenn sich zwei meiner Aussagen widersprechen oder eine neue Notiz eine frühere kippt. Sonst antworte ausschließlich mit „Notiert.\""},{"title":"Quellen-Kreuzverhör","prompt":"Du hast mir eben [Behauptung oder Zahl] genannt. Verhöre dich selbst: Woher könnte diese Angabe stammen? Wie sicher bist du auf einer Skala von 1 bis 10? Und was genau müsste ich nachschlagen, um sie unabhängig zu verifizieren? Wenn du unsicher bist, sag es klar — rate nicht."},{"title":"Ein Häppchen, bitte","prompt":"Wir arbeiten an [größere Aufgabe], aber jetzt nur an einem Teil: [Teilaufgabe]. Ignoriere alles andere. Liefere nur diesen Baustein, maximal [Umfang], und schlag am Ende vor, welches Häppchen als Nächstes sinnvoll wäre — entscheiden tue ich."},{"title":"Perspektiven-Karussell","prompt":"Nimm meine Idee: [Idee]. Antworte dreimal hintereinander aus drei Rollen, die ich nicht erwarte — du wählst sie selbst. Pro Rolle: drei bis vier Sätze, eine überraschende Beobachtung und eine unbequeme Frage an mich."},{"title":"Steelman zuerst","prompt":"Ich halte [Position] für falsch. Bevor wir sie zerlegen: Baue die stärkste Version dieser Position, die ein kluger Mensch ernsthaft vertreten würde — mit ihren besten Argumenten und ihrem plausibelsten Anwendungsfall. Erst wenn ich „verstanden\" sage, wechseln wir die Seite."},{"title":"Gedanken-Kartograf","prompt":"Hier ist mein unsortierter Gedankenstrom zu [Thema]: [Notizen]. Bring keine neuen Ideen ein. Ordne nur, was da ist: Cluster, Widersprüche, Lücken. Markiere zum Schluss die drei Stellen, an denen mein Denken am dünnsten ist."},{"title":"Was-wäre-wenn-Leiter","prompt":"Wir spielen [Szenario oder Entscheidung] durch. Frag mich Schritt für Schritt: „Und was passiert dann?\" — jedes Mal eine Ebene tiefer. Wenn ich eine Konsequenz übersehe, ergänze sie in Klammern. Nach fünf Ebenen: eine Zusammenfassung des riskantesten Pfads."},{"title":"Zahlen-TÜV","prompt":"Prüfe die Zahlen und Fakten in diesem Ausschnitt: [Absatz mit Zahlen]. Bewerte jede Angabe als plausibel, fragwürdig oder prüfbedürftig — mit je einem Satz Begründung. Erfinde keine Korrekturen: Wenn du die richtige Zahl nicht kennst, schreib „unbekannt\"."},{"title":"Die dümmste kluge Frage","prompt":"Ich arbeite seit Langem an [Thema] und bin vermutlich betriebsblind. Stelle mir fünf Fragen, die ein sehr kluger Fachfremder stellen würde — Fragen, die so grundlegend sind, dass ich sie mir selbst nicht mehr stelle. Eine nach der anderen, warte jeweils auf meine Antwort."},{"title":"Vor dem Absenden","prompt":"Gleich geht [E-Mail oder Dokument] an [Empfänger] raus. Letzte Runde: Wo könnte [Empfänger] es missverstehen? Wo klinge ich anders, als ich es meine? Und welche eine Formulierung würdest du ändern? Keine Komplettüberarbeitung — ich ändere selbst."},{"title":"Prä-mortem im Dialog","prompt":"Ich habe mich für [Option] entschieden. Führe mit mir ein Prä-mortem: Stell dir vor, es ist [Zeitpunkt in der Zukunft] und die Entscheidung hat sich als Fehler erwiesen. Frag mich nacheinander, was schiefgelaufen ist — erst an internen Ursachen entlang, dann an externen. Am Ende: die zwei Frühwarnzeichen, auf die ich ab jetzt achten sollte."}],"delegate":["Erste Strukturvorschläge und Gliederungen, die du danach nach deinem Kopf umbaust.","Zusammenfassungen langer Dokumente, Threads und Protokolle — als Rohstoff für dein Denken.","Das systematische Gegenlesen deiner Entwürfe auf Widersprüche, Lücken und unbelegte Annahmen.","Formatier- und Fleißarbeit: Notizen sortieren, Tabellen bauen, Rohtext glätten.","Die Vorsortierung bei Recherchen — was es zu einem Thema überhaupt gibt, bevor du selbst in die Tiefe prüfst."],"keep":["Die finale Formulierung von allem, was unter deinem Namen nach außen geht.","Urteile über Menschen, Prioritäten und heikle Trade-offs — die KI liefert Perspektiven, du triffst die Entscheidung.","Deine Kernthese: Die KI darf sie angreifen und schärfen, aber nicht ersetzen.","Die Prüfung von allem, was rechtlich, finanziell oder reputationskritisch ist — egal, wie überzeugend die KI klingt.","Die Regie über den Dialog: Welches Häppchen als Nächstes drankommt, entscheidest du."],"workflows":[{"name":"These härten","steps":["Formuliere deine Rohthese in zwei Sätzen und wirf sie der KI zum Angriff vor (Advocatus Diaboli).","Notiere, welche Angriffe dich wirklich treffen, und schärfe die These selbst nach — du schreibst um, nicht die KI.","Lass die KI die stärkste Gegenposition als Steelman bauen und formuliere deine Antwort darauf.","Prüfe alle Fakten und Zahlen, die im Dialog entstanden sind, gegen unabhängige Quellen.","Schreibe die finale Fassung selbst — der Dialog war Werkzeug, nicht Autor."]},{"name":"Vom Gedankenknäuel zur Gliederung","steps":["Sprich oder tippe deinen unsortierten Gedankenstrom, ohne zu strukturieren.","Lass die KI clustern, Widersprüche markieren und Lücken benennen — ausdrücklich ohne neue Inhalte.","Entscheide selbst, welche Cluster tragen, und streiche den Rest.","Delegiere pro Lücke ein klar umrissenes Häppchen: eine Recherchefrage, ein Absatzentwurf.","Prüfe jedes Häppchen einzeln, bevor es in die Gliederung wandert."]},{"name":"Entscheidung im Dialog","steps":["Beschreibe die Entscheidung und lass dich mit einer Frage nach der anderen ausfragen, bis die Optionen klar auf dem Tisch liegen.","Spiele mit der Was-wäre-wenn-Leiter die Konsequenzen jeder Option fünf Ebenen tief durch.","Führe für deine Favoriten-Option ein Prä-mortem.","Verifiziere die zwei, drei Fakten, an denen die Entscheidung tatsächlich hängt.","Entscheide, halte die Begründung in eigenen Worten fest und lege Frühwarnzeichen fest."]}],"antiPatterns":[{"title":"Der endlose Dialog","fix":"Setze vor jedem Gespräch einen Lieferpunkt — „in 30 Minuten steht ein Absatz, eine Entscheidung oder eine Gliederung\" — und beauftrage die KI, dich daran zu erinnern, sobald ihr abschweift."},{"title":"Alles nochmal selbst","fix":"Kalibriere die Prüftiefe nach Schadenshöhe: Bei internem Wegwerf-Material reicht eine Stichprobe, die volle Prüfung gibt es nur für das, was nach außen geht — sonst wärst du ohne KI schneller gewesen."},{"title":"Genialer Dialog, nie wieder gefunden","fix":"Kopiere nach jedem starken Gespräch die zwei wirksamsten Formulierungen in eine simple Prompt-Notiz — kein System nötig, eine einzige Datei reicht, um deine besten Züge wiederholbar zu machen."}]},"EPMI":{"description":"Du arbeitest mit KI wie an einer Werkbank: kleine, präzise umrissene Aufträge, sofort geprüft, direkt verbaut — und dann der nächste Handgriff. Statt fester Vorlagen tastest du dich im freien Dialog voran und lässt nichts in dein Ergebnis, was du nicht selbst nachgeprüft hast.","strengths":["Weil du klein delegierst und sofort prüfst, fängst du Fehler ab, solange sie noch billig zu beheben sind.","Im freien Hin und Her schleifst du Ergebnisse Runde für Runde besser, statt auf den einen perfekten Prompt zu warten.","Durch ständiges Ausprobieren am echten Werkstück kennst du die Grenzen des Modells genauer als jedes Handbuch."],"blindspots":["Weil du nur Häppchen abgibst, bleibt der große Hebel ungenutzt — manche Aufgabe wäre am Stück schneller und besser erledigt.","Deine besten Dialoge verpuffen: Was heute funktioniert hat, erfindest du morgen neu, statt es als Vorlage zu sichern.","Du prüfst die interne Notiz so gründlich wie den Kundenvertrag — Kontrolle ohne Triage frisst den Zeitgewinn wieder auf."],"signaturePrompt":"Wir bauen [Ergebnis, z. B. eine Wettbewerbs-Übersicht] Stück für Stück.\nErstelle zuerst nur [erstes Teilstück, z. B. die Tabellenstruktur mit drei Beispielzeilen].\nMarkiere jede Zahl und jede Behauptung, die du nicht sicher belegen kannst, mit ⚠️.\nDann stelle ich Rückfragen und wir korrigieren — das nächste Stück kommt erst, wenn ich „weiter“ sage.","promptLibrary":[{"title":"Werkbank-Modus","prompt":"Wir arbeiten im Werkbank-Modus an [Ergebnis]. Zerlege die Aufgabe in Teilstücke von je maximal [10 Minuten] Arbeit. Liefere immer nur das nächste Teilstück und warte auf mein Okay. Wenn dir Kontext fehlt, frag nach, statt zu raten."},{"title":"Selbstauskunft vor Abnahme","prompt":"Hier ist dein eigener Output: [Text/Tabelle/Code einfügen].\nGeh ihn Zeile für Zeile durch und kennzeichne jede Aussage als BELEGT (mit Quelle), PLAUSIBEL (mit Begründung) oder GERATEN.\nBei GERATEN: Sag mir, wie ich es in unter zwei Minuten selbst verifizieren kann."},{"title":"Zahlen-TÜV","prompt":"Prüfe alle Zahlen in [Dokument/Absatz einfügen]: Rechne jede Berechnung nach, prüfe Einheiten und Größenordnungen und markiere alles, was ohne externe Quelle nicht haltbar ist.\nGib mir eine Liste: Zahl → Prüfergebnis → was ich manuell nachschlagen muss."},{"title":"Ein Absatz, drei Fassungen","prompt":"Schreibe [diesen Absatz / diese Funktion / diese Headline] in drei deutlich verschiedenen Fassungen: eine nüchterne, eine pointierte, eine radikal kurze.\nIch sage dir, welche Richtung stimmt — dann bauen wir nur diese weiter aus."},{"title":"Red-Team fürs Werkstück","prompt":"Du bist jetzt mein härtester Kritiker. Zerpflücke [Ergebnis einfügen]: Wo bricht die Argumentation, wo sind Fakten dünn, was würde ein [skeptischer Kunde / Senior-Kollege / Fachanwalt] als Erstes anzweifeln?\nNenne die drei schwersten Treffer zuerst."},{"title":"Ein Handgriff pro Runde","prompt":"Verbessere [Text/Code] in genau EINEM Aspekt: [z. B. nur die Übergänge / nur die Fehlerbehandlung / nur die Verben].\nÄndere sonst nichts und zeig mir jede Änderung als Vorher/Nachher-Paar. Weitere Aspekte machen wir danach einzeln."},{"title":"Erst fragen, dann bauen","prompt":"Bevor du irgendetwas produzierst: Stelle mir fünf Fragen zu [Aufgabe], deren Antworten das Ergebnis am stärksten verändern würden.\nIch antworte kurz und spontan — dann baust du die erste Version aus genau diesen Antworten."},{"title":"Quellencheck-Sparring","prompt":"Ich gebe dir gleich [Behauptung/Studie/Statistik]. Sag mir: Was genau müsste stimmen, damit die Aussage hält? Welche typischen Verzerrungen hätten so ein Ergebnis auch erzeugt?\nFormuliere zum Schluss die eine Suchanfrage, mit der ich die Originalquelle finde."},{"title":"Werkstück aus Rohmaterial","prompt":"Hier sind meine rohen Notizen: [Notizen einfügen].\nMach daraus zuerst NUR eine Gliederung mit je einem Satz pro Abschnitt.\nErst wenn die Gliederung steht, schreiben wir aus — immer einen Abschnitt, dann mein Feedback."},{"title":"Fehlersuche als Training","prompt":"Baue in [Text/Tabelle einfügen] drei subtile sachliche Fehler ein und gib mir das Ergebnis ohne Markierung.\nIch suche sie — danach löst du auf und sagst mir, welche Fehlerart ich übersehen habe. So kalibriere ich mein Prüfen für diese Art Aufgabe."},{"title":"Sackgassen-Check","prompt":"Stopp — fasse zusammen, was wir in diesem Gespräch schon verworfen haben und warum.\nWelche Annahme aus den ersten Nachrichten schleppen wir noch mit, obwohl sie längst wackelt?\nDann schlag einen frischen Ansatz vor, der ohne diese Annahme auskommt."},{"title":"Tabellen-Schmiede","prompt":"Baue aus [Rohdaten/Text] eine Tabelle mit den Spalten [Spalten].\nRegel: Keine Zelle wird erfunden — was fehlt, bleibt leer und kommt in eine Liste „offene Lücken“.\nNenne mir zum Schluss die drei Zeilen, bei denen du dir am unsichersten bist."},{"title":"Prompt-Konserve","prompt":"Das hier hat gerade gut funktioniert. Destilliere aus unserem bisherigen Dialog eine wiederverwendbare Prompt-Vorlage mit [Platzhaltern] für das nächste Mal — plus die zwei Stolperfallen, die wir unterwegs entdeckt haben."},{"title":"Übergabe mit Prüfprotokoll","prompt":"Ich gebe dir ausnahmsweise ein größeres Stück: [Aufgabe beschreiben].\nArbeite es komplett durch, aber liefere zusätzlich ein Prüfprotokoll: welche Entscheidungen du getroffen hast, wo du unsicher warst und welche drei Stellen ich zuerst kontrollieren sollte."}],"delegate":["Erste Rohfassungen von Routine-Dokumenten — Protokolle, Status-Updates, Standardmails — du prüfst sie ohnehin.","Formatier- und Fleißarbeit: Tabellen umbauen, Daten vereinheitlichen, Zitierweisen angleichen.","Varianten-Produktion in Serie: fünf Betreffzeilen, drei Tonlagen, zwei Strukturen — die Auswahl bleibt bei dir.","Die erste Fehlersuche am eigenen Output: Lass die KI ihr Werkstück selbst zerpflücken, bevor du zur Prüfung ansetzt.","Landkarten langer Dokumente: Zusammenfassung mit Fundstellen, damit du die kritischen Passagen gezielt im Original liest."],"keep":["Die finale Faktenprüfung bei allem mit Außenwirkung — Zahlen, Namen, Zusagen, Rechtliches.","Die Zerlegung der Aufgabe: Du entscheidest, was Häppchen wird und was besser am Stück bleibt.","Das Urteil über „gut genug“ — wann ein Werkstück fertig ist, sagt dir kein Modell.","Heikle Kommunikation: kritisches Feedback, Verhandlungen, alles, wo Beziehung auf dem Spiel steht.","Die fachliche Kernentscheidung, was überhaupt gebaut wird — die KI baut nur schneller, nicht richtiger."],"workflows":[{"name":"Werkbank-Sprint","steps":["Aufgabe in Teilstücke von höchstens 15 Minuten zerlegen und das riskanteste zuerst wählen","KI baut nur dieses Teilstück und markiert alle Stellen, die sie nicht sicher belegen kann","Markierte Stellen sofort prüfen und Korrekturen direkt im Dialog einarbeiten","Erst nach Abnahme das nächste Teilstück beauftragen","Am Ende alles einmal am Stück lesen — Übergänge zwischen Teilstücken sind die typische Schwachstelle"]},{"name":"Prüf-Schleife für Fakten","steps":["Entwurf mit Pflicht-Kennzeichnung anfordern: jede Aussage als BELEGT, PLAUSIBEL oder GERATEN markiert","Nur die GERATEN-Stellen selbst recherchieren, statt alles gleich tief zu prüfen","Korrigierte Fakten zurückgeben und den Entwurf aktualisieren lassen","Stichprobe ziehen: zwei BELEGT-Stellen gegenprüfen, um die Kennzeichnung zu kalibrieren"]},{"name":"Vom Spieltrieb zur Konserve","steps":["Neue Aufgabe frei im Dialog anspielen: Fragen stellen, Varianten testen, schnelle Teilergebnisse bauen","Sobald ein Ansatz trägt, die KI den funktionierenden Weg als Schrittfolge zusammenfassen lassen","Daraus eine Prompt-Vorlage mit Platzhaltern destillieren und in einer Notiz ablegen","Beim nächsten Mal mit der Vorlage starten — und nur noch am Feinschliff improvisieren"]}],"antiPatterns":[{"title":"Micromanagement im Chatfenster","fix":"Du zerlegst so klein, dass die Betreuung länger dauert als das Selbermachen. Gib einmal pro Woche eine Aufgabe bewusst am Stück ab — mit Prüfprotokoll statt Dauerbeobachtung — und stoppe die Zeit: Meist ist das Ergebnis besser, als dein Bauchgefühl behauptet."},{"title":"Jeden Tag bei null anfangen","fix":"Du improvisierst jeden Prompt neu, auch bei Aufgaben, die wöchentlich wiederkommen. Investiere nach jedem gelungenen Dialog zwei Minuten und sichere die funktionierende Formulierung als Vorlage — drei Konserven decken achtzig Prozent deiner Wiederholfälle."},{"title":"Die 90-Prozent-Schleife","fix":"Das Werkstück ist längst gut, aber es findet sich immer noch ein Rädchen zum Justieren. Halte vor Beginn schriftlich fest, woran „fertig“ erkennbar ist — und liefere nach der zweiten Feinschliff-Runde, nicht nach der fünften."}]},"EVDI":{"description":"Du öffnest den Chat wie ein Notizbuch: halbfertiger Gedanke rein, Rückfrage, Gedankensprung — und zehn Minuten später steht eine Idee da, auf die du allein nicht gekommen wärst. Die KI ist dein Sparringspartner, nicht deine Schreibmaschine: Du wirfst ihr kleine Denkaufträge zu, und wenn eine Antwort zündet, nimmst du sie beim Wort und springst weiter.","strengths":["Du kitzelst im freien Dialog Verbindungen aus der KI heraus, auf die kein vorbereiteter Prompt je gekommen wäre.","Weil du nur kleine Denkaufträge abgibst, bleibst du immer Herr über die Richtung — die KI inspiriert dich, aber sie steuert dich nicht.","Dein schnelles Qualitätsgefühl erspart dir Absicherungsschleifen: Was zündet, wird genutzt, was nicht, fliegt raus — ohne Grübelei."],"blindspots":["Eloquenz überzeugt dich zu leicht: Eine schön formulierte Falschbehauptung rutscht bei dir ungeprüft in Konzepte und Präsentationen.","Deine besten Gesprächszüge gehen verloren, weil du nichts festhältst — du erfindest funktionierende Dialoge jedes Mal neu.","Denk-Sessions ersetzen dir das Liefern: Fünf scharfe Ideen fühlen sich wie Fortschritt an, auch wenn am Ende nichts davon gebaut ist."],"signaturePrompt":"Ich denke gerade über [Thema/Problem] nach und bin bei diesem halbfertigen Gedanken: [Gedanke in 1–2 Sätzen].\nSpiel mit: Gib mir drei überraschende Weiterdrehungen — eine naheliegende, eine gewagte, eine aus einem fremden Feld [z. B. Biologie, Städtebau, Küche].\nDanach stell mir genau eine Frage, die meinen Gedanken am meisten voranbringt.","promptLibrary":[{"title":"Gedanken-Pingpong","prompt":"Hier ist ein halbfertiger Gedanke zu [Thema]: [Gedanke].\nSpiel Pingpong mit mir: Antworte in maximal 4 Sätzen mit einer Weiterdrehung oder einem Einwand — und gib den Ball dann mit einer konkreten Rückfrage an mich zurück.\nKein Fazit, kein fertiger Text, nur der nächste Schlag."},{"title":"Perspektiven-Karussell","prompt":"Betrachte [meine Idee/mein Problem] nacheinander durch vier fremde Brillen: als [Ökonom:in], als [Kind], als [schärfster Wettbewerber], als [jemand aus dem Jahr 2035].\nJe Brille 2–3 Sätze: Was sieht diese Person, das ich übersehe?\nKeine Zusammenfassung am Ende — ich picke selbst."},{"title":"Anwalt des Funkens","prompt":"Diese Idee fühlt sich richtig an, aber ich kann noch nicht sagen, warum: [Idee].\nSei ihr Anwalt: Nenne die drei stärksten Gründe, warum sie funktionieren könnte, und formuliere sie so scharf, dass ich sie morgen jemandem in 30 Sekunden erklären kann."},{"title":"Fremdes Feld anzapfen","prompt":"Ich stecke bei [Problem] fest.\nHol mir drei Lösungsmuster aus [fremdes Feld, z. B. Notaufnahme, Jazz, Flugsicherung] und übersetze jedes in einen konkreten ersten Schritt für meinen Fall.\nJe Muster maximal 4 Sätze."},{"title":"Zehn-Minuten-Sortierung","prompt":"Hier ist mein unsortierter Gedankenhaufen zu [Thema]: [Brain-Dump, ruhig chaotisch].\nSortiere ihn in maximal drei Denk-Stränge. Gib jedem Strang einen prägnanten Namen und markiere den einen Gedanken darin, der am meisten Potenzial hat — mit einem Satz, warum."},{"title":"Eine Frage pro Zug","prompt":"Ich will [Thema/Entscheidung] durchdenken — aber ohne Vortrag.\nStell mir pro Antwort genau EINE Frage: die, die mein Denken gerade am meisten voranbringt. Baue auf meinen Antworten auf und werde von Zug zu Zug spitzer.\nStart: Frag mich etwas, das ich mich selbst noch nicht gefragt habe."},{"title":"Sprungbrett statt Antwort","prompt":"Beantworte meine Frage NICHT. Gib mir stattdessen fünf halbfertige Gedanken zu [Thema] — angerissene Sätze, gewagte Thesen, offene Enden.\nIch springe von dem ab, der zündet.\nMeine Frage: [deine Frage]."},{"title":"Was-wäre-wenn-Kaskade","prompt":"Nimm [meine Idee/Situation] und dreh die Regler:\nWas wäre, wenn das Budget zehnmal so groß wäre? Wenn es bis Freitag fertig sein müsste? Wenn [wichtigste Annahme] falsch wäre? Wenn es das schon gäbe, nur schlecht gemacht?\nJe Szenario 3 Sätze — und sag mir, welches die interessanteste Idee freilegt."},{"title":"Gegenspieler auf Zeit","prompt":"Ich bin von [Idee/Entscheidung] überzeugt und will es auch bleiben — aber gönn mir drei Minuten Gegenwind:\nNenne die zwei Einwände, die mir am ehesten auf die Füße fallen, und zu jedem einen Handgriff, wie ich ihn heute noch entschärfe.\nDanach zurück zum Weiterdenken."},{"title":"Funken einfangen","prompt":"Lies unser bisheriges Gespräch noch einmal.\nZieh die drei stärksten Ideen heraus, die dabei entstanden sind, und gib jeder einen merkbaren Namen, zwei Sätze Zusammenfassung und einen konkreten nächsten Schritt für die kommende Woche."},{"title":"Denk-Häppchen","prompt":"Nur eine Mini-Aufgabe: Nimm diesen einen Satz — \"[dein Satz]\" — und gib mir fünf schärfere Fassungen: präziser, kürzer, mutiger, bildhafter, einfacher.\nKeine Erklärungen, nur die fünf Sätze."},{"title":"Metaphern-Werkstatt","prompt":"Ich suche das Bild, das [Idee/Konzept] sofort verständlich macht.\nGib mir sieben Metaphern aus sieben verschiedenen Lebensbereichen — von alltäglich bis abwegig.\nZur besten: ein Satz, wie ich sie in [Pitch/Text/Präsentation] einsetzen würde."},{"title":"Entscheidungs-Blitz","prompt":"Zwei Wege, wenig Zeit: [Option A] oder [Option B].\nGib mir je Weg die eine Sache, die dafür spricht, und die eine, die mich in drei Monaten ärgern würde.\nDann eine klare Empfehlung in einem Satz. Keine Tabellen, kein \"es kommt darauf an\"."},{"title":"Assoziations-Aufschlag","prompt":"Aufschlag für mein Denken: Wirf mir 15 rohe Assoziationen zu [Thema] hin — Begriffe, Fragen, Bilder, Namen, quer durcheinander, ungefiltert.\nKeine Sortierung, keine Erklärung. Ich sage dir dann, welche drei wir weiterspinnen."}],"delegate":["Das Protokollieren deiner Gedankensprünge — lass die KI am Ende jeder Session die besten Ideen einsammeln und benennen.","Recherche-Futter fürs Denken: Fakten, Definitionen, Beispiele aus anderen Branchen — immer mit der Bitte um Quellen.","Die erste Rohfassung, sobald ein Gedanke steht — dein Kopf ist fürs Finden da, nicht fürs Abtippen.","Perspektiven, die dir nicht liegen: die Zahlenmensch-Sicht, die Juristen-Sicht, die Skeptiker-Sicht.","Wiederkehrende Kleinformate wie Meeting-Notizen und Status-Mails, die dein Denk-Budget auffressen."],"keep":["Die Auswahl, welcher Funke weiterverfolgt wird — dieses Urteil ist der Kern deiner Arbeit.","Den Faktencheck bei allem, was nach außen geht: Zahlen, Zitate, Namen, Behauptungen.","Die Gesamtrichtung des Projekts — wohin es läuft, entscheidest du, nicht der Gesprächsverlauf.","Die Formulierung deiner Kernbotschaften, die unverwechselbar nach dir klingen müssen.","Den Moment des Abschließens: wann eine Idee fertig gedacht ist und geliefert wird."],"workflows":[{"name":"Funkenflug mit Fangnetz","steps":["Wirf der KI einen halbfertigen Gedanken hin und spiele 15 Minuten freies Pingpong — ohne Ziel, ohne Struktur.","Sobald etwas zündet, markiere es im Chat mit einem Stichwort wie MERKEN und spring weiter.","Lass die KI am Ende alle MERKEN-Stellen einsammeln: Name, zwei Sätze, ein nächster Schritt.","Übertrage die stärkste Idee sofort in dein Aufgaben-Tool — bevor der nächste Funke sie verdrängt."]},{"name":"Der 20-Minuten-Sparringskampf","steps":["Schildere die anstehende Entscheidung in drei Sätzen — inklusive deines Bauchgefühls.","Lass die KI eine Runde den Anwalt deines Favoriten spielen, dann eine Runde den Gegner.","Stelle die eine Rückfrage, die dich danach noch juckt.","Entscheide selbst — und lass die KI deine Begründung in fünf Sätzen festhalten, für dein Zukunfts-Ich."]},{"name":"Vom Gedanken zum Ding","steps":["Beende die Denk-Session mit einer Ein-Satz-These: Was genau soll jetzt entstehen?","Lass die KI daraus eine bewusst unperfekte Rohfassung bauen — in einem Rutsch, ohne Rückfragen.","Geh die Rohfassung improvisierend durch und gib Änderungen als kurze Zurufe zurück.","Prüfe nur die Stellen mit Zahlen, Namen und Behauptungen von Hand — beim Rest darfst du deinem Gefühl vertrauen."]}],"antiPatterns":[{"title":"Ideen-Konfetti","fix":"Beende jede Session mit einem Funken-einfangen-Prompt und wähle genau eine Idee, die vor der nächsten Session einen sichtbaren Schritt machen muss — sonst zählt die Session nicht."},{"title":"Der charmante Irrtum","fix":"Ein einziger Reflex genügt: Bei allem mit Zahlen, Namen oder Quellen einmal nachfragen — \"Woher weißt du das, und wie sicher bist du?\" Kostet 30 Sekunden, rettet Präsentationen."},{"title":"Jedes Mal bei null","fix":"Du brauchst keine Prompt-Bibliothek — aber eine Notiz mit deinen fünf besten Gesprächseröffnungen. Improvisation mit gutem Aufschlag ist immer noch Improvisation."}]},"EPMA":{"description":"Du zerlegst deine Arbeit in klar umrissene Teilstücke, lässt die KI nach deinen gespeicherten Vorlagen fertige Ergebnisse produzieren — und gibst nichts frei, was du nicht selbst geprüft hast. Dich treibt verlässliche Qualität in Serie: dieselbe Präzision beim zehnten Durchlauf wie beim ersten.","strengths":["Deine Ergebnisse sind reproduzierbar: Was einmal funktioniert hat, wird als Vorlage gesichert und liefert beim nächsten Mal in gleicher Qualität.","Fehler bleiben klein, weil du in kurzen, prüfbaren Schritten arbeitest — nichts Falsches wandert unbemerkt in die nächste Stufe.","Auf deine Abgaben ist Verlass: Zahlen, Namen und Fakten sind gegen die Quelle gecheckt, bevor irgendetwas dein Postfach verlässt."],"blindspots":["Du delegierst nur, was du schon vollständig durchdrungen hast — größere zusammenhängende Aufträge, bei denen KI dir echte Stunden schenken würde, bleiben liegen.","Du prüfst alles mit derselben Gründlichkeit und verbrennst Prüfzeit an Outputs, bei denen ein Fehler fast nichts kosten würde.","Deine Vorlagen können zur Komfortzone werden: Du feilst am System weiter, während sich die Aufgabe darunter längst verändert hat."],"signaturePrompt":"Erstelle [einen Abschnitt / eine Tabelle / einen Baustein] für [Projekt] exakt nach dieser Vorlage:\n[Vorlage einfügen]\nHalte Struktur, Ton und Länge präzise ein. Markiere jede Zahl, jeden Namen und jede prüfbare Faktenaussage am Zeilenende mit [PRÜFEN], damit ich sie gegen [Quelle] abgleichen kann.\nLiefere nur diesen einen Baustein — den nächsten briefe ich separat.","promptLibrary":[{"title":"Baustein produzieren, Prüfstellen markieren","prompt":"Erstelle [Baustein, z. B. Kapitel 2.1 / Folie 5 / E-Mail-Absatz] für [Projekt] nach dieser Vorlage:\n[Vorlage einfügen]\nHalte Struktur, Ton und Länge exakt ein. Markiere jede Zahl, jeden Namen und jede Faktenaussage am Zeilenende mit [PRÜFEN]. Liefere ausschließlich diesen einen Baustein — nichts davor, nichts danach."},{"title":"Vorlage aus einem guten Ergebnis destillieren","prompt":"Hier ist ein Ergebnis, das genau meinen Ansprüchen entspricht:\n[Beispiel einfügen]\nDestilliere daraus eine wiederverwendbare Prompt-Vorlage: Struktur, Tonregeln, Längenvorgaben, No-Gos. Formuliere sie so, dass ich künftig nur noch [Thema] und [Zielgruppe] austauschen muss. Gib die Vorlage als fertigen Prompt aus, den ich direkt speichern kann."},{"title":"Faktencheck gegen Quelle","prompt":"Prüfe den folgenden Text ausschließlich gegen die mitgelieferte Quelle.\nText: [Text einfügen]\nQuelle: [Quelle einfügen]\nListe jede prüfbare Aussage als Tabelle: Aussage | belegt / widerlegt / nicht in der Quelle | Fundstelle. Bewerte nichts, was die Quelle nicht hergibt — schreibe dann exakt „nicht in der Quelle\"."},{"title":"Zahlen-Gegenprobe","prompt":"Hier sind meine Zahlen: [Tabelle oder Werte einfügen]\nHier die Originalquelle: [Quelle einfügen]\nGleiche jede Zahl einzeln ab. Gib mir nur die Abweichungen: Wert bei mir | Wert in der Quelle | wahrscheinliche Ursache (Rundung, anderer Zeitraum, Tippfehler). Wenn alles stimmt, schreibe genau das — ohne Zusatztext."},{"title":"Serienfertigung nach Muster","prompt":"Hier ist mein freigegebenes Muster:\n[Muster einfügen]\nProduziere davon [Anzahl] Varianten für [Fälle, z. B. Kundensegmente / Produkte / Kanäle]. Regeln: Struktur und Ton bleiben identisch, nur [variable Elemente] ändern sich. Nummeriere die Varianten und weiche an keiner anderen Stelle vom Muster ab."},{"title":"Abnahme-Checkliste bauen","prompt":"Ich liefere regelmäßig [Art des Ergebnisses, z. B. Monatsreport] an [Empfänger]. Erstelle eine Abnahme-Checkliste mit maximal [10] Punkten, gegliedert nach: fachliche Korrektheit, Zahlen & Quellen, Form & Ton, Vollständigkeit. Jeder Punkt als Ja/Nein-Frage, die ich in unter 30 Sekunden beantworten kann."},{"title":"Aufgabe in delegierbare Häppchen schneiden","prompt":"Ich muss [Aufgabe beschreiben] bis [Termin] erledigen. Zerlege sie in einzeln delegierbare Teilaufträge: pro Teilauftrag eine Zeile mit dem Input, den ich liefern muss, dem erwarteten Output und einem Abnahmekriterium. Markiere zusätzlich, welche Teilaufträge sich als wiederkehrende Vorlage lohnen."},{"title":"Red-Team vor der Abgabe","prompt":"Du bist der kritischste Gutachter, den [Empfänger, z. B. mein Auftraggeber] kennt. Zerlege dieses Dokument:\n[Text einfügen]\nNenne die drei angreifbarsten Stellen — schwache Belege, versteckte Annahmen, missverständliche Formulierungen — und formuliere zu jeder die unangenehmste Rückfrage, die mir dazu gestellt werden könnte."},{"title":"Stil-Regeln festschreiben","prompt":"Hier sind [zwei bis drei] Texte, deren Ton ich immer treffen will:\n[Beispiele einfügen]\nExtrahiere daraus einen Stilblock: Satzlänge, Ansprache, typische Formulierungen, verbotene Wörter, Formatierungsregeln. Formuliere ihn als Anweisungsblock, den ich künftig vor jeden Schreibauftrag kopieren kann."},{"title":"Nur diese Stelle ändern","prompt":"Überarbeite im folgenden Text ausschließlich die mit [MARKIERUNG] gekennzeichnete Passage:\n[Text einfügen]\nZiel der Änderung: [z. B. präziser, kürzer, belegbarer]. Alles andere bleibt wörtlich unverändert. Gib zuerst die neue Passage aus, danach eine Liste: was geändert wurde und warum — Punkt für Punkt."},{"title":"Vorlagen-TÜV","prompt":"Das ist eine Prompt-Vorlage, die ich seit [Zeitraum] nutze:\n[Vorlage einfügen]\nPrüfe sie wie ein Auditor: Welche Annahmen sind veraltet? Welche Anweisungen sind überflüssig oder widersprüchlich? Wo fehlen Abnahmekriterien? Liefere eine gestraffte Version 2 und begründe jede Streichung in einem Satz."},{"title":"Quellenpflicht-Modus","prompt":"Beantworte die folgende Frage nur mit Aussagen, die du einer nachprüfbaren Quelle oder einer expliziten Herleitung zuordnen kannst: [Frage einfügen]\nFormat: Aussage → Quelle bzw. Herleitung. Wo dir eine belastbare Grundlage fehlt, schreibe „unbelegt — selbst prüfen\". Keine Schätzungen ohne Kennzeichnung."},{"title":"Formatwechsel mit Änderungsprotokoll","prompt":"Überführe diese Inhalte von [Ausgangsformat, z. B. Stichpunkte] in [Zielformat, z. B. Tabelle mit den Spalten …]:\n[Inhalt einfügen]\nErfinde nichts hinzu und lasse nichts weg. Liste unter dem Ergebnis jede Stelle auf, an der du interpretieren musstest — damit ich genau dort nachprüfen kann."},{"title":"Drei Häppchen, ein Fließband","prompt":"Diese drei Teilaufgaben delegiere ich bisher immer einzeln: [Aufgabe 1], [Aufgabe 2], [Aufgabe 3]. Entwirf einen zusammenhängenden Ablauf, der alle drei in einem Durchgang erledigt — mit einem Prüfpunkt für mich nach jedem Abschnitt, an dem ich freigebe oder korrigiere. Zeige, welche Zwischenergebnisse ich an jedem Prüfpunkt sehen würde."}],"delegate":["Erstfassungen wiederkehrender Textbausteine — Statusberichte, Zusammenfassungen, Standard-Mails nach deiner Vorlage","Formatarbeit jeder Art: Stichpunkte zu Fließtext, Rohdaten zu Tabellen, Dokumente in neue Strukturen","Serienproduktion von Varianten aus einem freigegebenen Muster — für Segmente, Kanäle oder Empfänger","Das Vorsortieren von Recherchen: Material sammeln und mit Fundstellen versehen, die du gezielt nachprüfst","Erste Entwürfe von Checklisten und Vorlagen, die du anschließend verfeinerst und versionierst"],"keep":["Die finale Freigabe — kein Baustein verlässt das Haus ohne deinen letzten Blick","Die Prüfung kritischer Zahlen, Namen und rechtlich relevanter Aussagen gegen die Originalquelle","Den Bauplan: welche Teilaufgabe wann drankommt und wie die Teile zusammenpassen","Die Qualitätsstandards selbst — was „gut genug\" heißt, definierst du, nicht das Modell","Heikle Kommunikation mit Auftraggebern und Kolleg:innen — dein Ton, deine Verantwortung"],"workflows":[{"name":"Das Baustein-Fließband","steps":["Vorlage und Abnahmekriterien für das Gesamtergebnis einmal sauber definieren","Den ersten Baustein einzeln briefen — mit Vorlage, Kontext und der Regel, alle Prüfstellen zu markieren","Markierte Zahlen und Fakten gegen die Quelle abgleichen, dann freigeben","Freigegebenen Baustein ablegen und den nächsten briefen, bis das Ganze steht","Zum Abschluss einen Red-Team-Durchlauf über das zusammengesetzte Ergebnis fahren"]},{"name":"Die Vorlagen-Schmiede","steps":["Ein besonders gelungenes Ergebnis aus deiner jüngsten Arbeit auswählen","Die KI daraus Struktur, Tonregeln und No-Gos als Prompt-Vorlage destillieren lassen","Die Vorlage an einem echten neuen Fall testen und jede Abweichung notieren","Nachschärfen, versionieren und mit Datum in deiner Prompt-Bibliothek speichern"]},{"name":"Die Prüfstraße","steps":["Risikoklasse des Outputs festlegen: kritisch, normal oder unkritisch","Bei kritisch: vollständigen Faktencheck gegen die Quelle plus Zahlen-Gegenprobe fahren","Bei normal: nur markierte Prüfstellen kontrollieren, den Rest stichprobenartig","Bei unkritisch: Sichtprüfung in zwei Minuten, dann raus damit","Gefundene Fehler in die Vorlage zurückspielen, damit sie nicht wiederkommen"]}],"antiPatterns":[{"title":"Krümel-Delegation","fix":"Bündle einmal pro Woche drei wiederkehrende Kleinaufträge zu einem größeren, vorlagengesicherten Auftrag mit Prüfpunkten — und miss, wie viel Briefing-Zeit das spart."},{"title":"Gießkannen-Prüfung","fix":"Führe Risikoklassen ein: Zahlen, Namen und Rechtliches werden immer gegen die Quelle geprüft, unkritische Texte nur noch stichprobenartig."},{"title":"Vorlagen-Museum","fix":"Gib jeder Vorlage ein Prüfdatum: Was in acht Wochen nicht benutzt wurde, fliegt raus — was benutzt wurde, bekommt die Fehler des letzten Durchlaufs eingearbeitet."}]},"EVMI":{"description":"Du arbeitest mit der KI im Zuruf-Modus: eine klar umrissene Teilaufgabe rein, ein fertiges Ergebnis raus, kurz draufgeschaut, übernommen — und schon fliegt das nächste Häppchen hinterher. Dich treibt die kürzeste Strecke zwischen Einfall und verschicktem Ergebnis; Vorlagen und lange Prüfschleifen fühlen sich für dich an wie Umwege.","strengths":["Dein Durchsatz ist enorm: Während andere noch das Briefing formulieren, hast du schon drei Varianten gesehen und eine verschickt.","Weil du in kleinen Häppchen delegierst, verlierst du nie den Faden — Fehler bleiben lokal und sind in Sekunden korrigiert.","Du hast null Anlaufkosten: kein Setup, keine Vorlage, kein Ritual — du bist produktiv, sobald das Chatfenster offen ist."],"blindspots":["Überzeugend formuliert heißt für dich schnell auch korrekt — gerade bei Zahlen, Namen und Zusagen rutscht so Falsches ins fertige Ergebnis.","Du nimmst die erste brauchbare Version und siehst die bessere zweite nie, weil du sie gar nicht erst anforderst.","Deine besten Prompts entstehen spontan und verschwinden mit dem Chatverlauf — jede Session startet wieder bei null."],"signaturePrompt":"Ich brauche in fünf Minuten: [fertiges Ergebnis, z. B. Antwort auf diese Kundenmail].\nKontext in einem Satz: [Kontext].\nGib mir sofort drei fertige Varianten — eine knappe, eine ausführliche, eine überraschende.\nKeine Rückfragen, keine Vorrede. Ich wähle, du lieferst.","promptLibrary":[{"title":"Drei Varianten, ich wähle","prompt":"Schreibe [Ergebnis, z. B. eine Absage an einen Dienstleister] für [Empfänger].\nKontext: [1–2 Sätze].\nLiefere drei fertige Varianten: sachlich, warm, auf den Punkt.\nKeine Erklärungen dazwischen — nur die drei Texte, direkt kopierbar."},{"title":"Stichworte rein, fertig raus","prompt":"Hier sind meine rohen Stichpunkte: [Stichpunkte].\nMach daraus [Format, z. B. eine Mail / einen Abschnitt fürs Konzept / eine Slide-Struktur].\nTon: [z. B. kollegial, präzise]. Länge: maximal [X Wörter oder Zeilen].\nGib mir direkt die fertige Fassung, keine Zwischenfragen."},{"title":"Nur der nächste Baustein","prompt":"Ich baue gerade [Gesamtergebnis, z. B. eine Projektskizze]. Fertig ist schon: [was steht].\nLiefere mir jetzt NUR den nächsten Baustein: [Teilstück, z. B. den Abschnitt zu Risiken].\nEr muss nahtlos an das Vorhandene anschließen. Den Rest ignorierst du — den steuere ich selbst."},{"title":"Weiter im Ton","prompt":"Hier ist mein angefangener Text: [Text].\nSchreib genau da weiter, wo ich aufgehört habe — gleicher Ton, gleicher Rhythmus, gleiche Person.\nEtwa [X] Sätze. Wenn du den Ton triffst, merke ich es sofort; wenn nicht, auch."},{"title":"Meeting raus, Mail fertig","prompt":"Das sind meine ungefilterten Meeting-Notizen: [Notizen].\nMach daraus eine versandfertige Follow-up-Mail an [Verteiler]: kurze Zusammenfassung, Entscheidungen, To-dos mit Namen dahinter.\nMaximal [X] Zeilen. Direkt kopierbar."},{"title":"Der 30-Sekunden-Check","prompt":"Bevor ich das abschicke: [fertiger Text].\nNenn mir nur die drei Stellen mit dem höchsten Fehler-Risiko — Zahlen, Namen, Daten, Zusagen.\nKeine Umformulierung, keine Stilkritik. Drei Stellen, je ein Satz warum."},{"title":"Die bessere Zweite","prompt":"Diese Version ist brauchbar: [Text].\nGib mir eine Fassung, die 20 Prozent besser ist — klarer, mutiger oder kürzer, du entscheidest.\nÄndere nur, was sie wirklich stärker macht, und markiere jede Änderung fett."},{"title":"Kürzen ohne Verlust","prompt":"Hier ist mein Text: [Text]. Er hat [X] Wörter, ich brauche ihn in [Y].\nStreiche Füllwörter, Dopplungen und Anläufe — aber keinen Inhalt und keine Pointe.\nDirekt die fertige Kurzfassung, nichts weiter."},{"title":"Aus eins mach fünf","prompt":"Hier ist ein fertiges Stück Arbeit: [Text oder Inhalt].\nVerwerte es in fünf Formate: LinkedIn-Post, kurze Team-Mail, drei Bulletpoints für ein Slide, Einzeiler für den Statusbericht, Frage für die nächste Team-Runde.\nAlle fünf direkt verwendbar, jeweils mit Überschrift."},{"title":"Lückenfüller","prompt":"Mein Entwurf steht, nur die [eckigen] Stellen fehlen: [Entwurf mit Lücken].\nFülle ausschließlich die Lücken, im Ton des restlichen Texts.\nAlles andere bleibt Wort für Wort unangetastet."},{"title":"Spontan-Sparring im Sprinttempo","prompt":"Ich denke laut über [Thema oder Problem] nach — spiel mit.\nZu jedem Gedanken, den ich reinwerfe, gibst du mir genau zwei Dinge zurück: eine Weiterführung und eine Abkürzung zum Ergebnis.\nKurz halten. Wir sprinten, wir seminarisieren nicht.\nErster Gedanke: [Gedanke]."},{"title":"Zwischenstand auf Zuruf","prompt":"Ich muss [Stakeholder, z. B. meiner Chefin] in zwei Minuten einen Zwischenstand geben.\nFakten: [3–5 Stichpunkte].\nBau daraus eine Nachricht mit maximal [X] Zeilen: Stand, nächster Schritt, wo ich etwas brauche.\nTon: souverän, ohne Schönfärberei."},{"title":"Erst grob, dann auf Zuruf fein","prompt":"Aufgabe: [Ergebnis, z. B. ein Angebotstext für [Kunde]].\nGib mir zuerst eine grobe, aber komplette Fassung — lieber fertig als perfekt.\nDanach verfeinern wir per Zuruf: Ich sage nur noch „knapper“, „mehr davon“ oder „Ton wärmer“, du lieferst jeweils die neue Komplettfassung."},{"title":"Tabelle statt Textwüste","prompt":"Hier ist unsortiertes Material: [Text, Notizen oder Datenwust].\nMach
