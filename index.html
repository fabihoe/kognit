 daraus eine saubere Tabelle mit den Spalten [Spalten, z. B. Thema, Status, Verantwortlich, nächster Schritt].\nWas nicht reinpasst, kommt unter die Tabelle als „Offen“. Direkt einfügbar in [Tool]."}],"delegate":["Erstfassungen aller Routinetexte — Mails, Status-Updates, Zusammenfassungen, Protokolle","Formatarbeit: aus Stichpunkten Tabellen, aus Notizen To-do-Listen, aus Texten Slides","Varianten produzieren — drei Tonlagen statt einer, du wählst in Sekunden","Kürzen, Glätten und Tonanpassung fertiger Texte","Wiederverwertung: ein fertiges Stück Arbeit in fünf Formate für fünf Kanäle"],"keep":["Der letzte Blick auf Zahlen, Namen und Zusagen — alles, was falsch richtig teuer wird","Heikle Texte mit Beziehungsrisiko: Absagen, Kritik, Verhandlungen — die Endfassung bleibt deine","Die Entscheidung, was überhaupt gebaut wird — Priorisieren ist dein Steuer, nicht ihres","Der rote Faden über die Häppchen hinweg: Wie die Teile zusammenpassen, siehst nur du","Dein Qualitätsgefühl: Prüfe gelegentlich ein Ergebnis gründlich nach, damit dein Bauchgefühl kalibriert bleibt"],"workflows":[{"name":"Der 15-Minuten-Sprint","steps":["Ziel in einem Satz formulieren und sofort drei fertige Varianten anfordern","Beste Variante wählen und per Zuruf nachschärfen — knapper, wärmer, ein Beispiel rein","30-Sekunden-Check: Zahlen, Namen und Zusagen selbst gegenlesen","Abschicken — keine Extrarunde, der Sprint ist vorbei"]},{"name":"Die Häppchen-Kette","steps":["Das Endergebnis im Kopf in vier bis fünf Bausteine zerlegen","Jeden Baustein einzeln anfordern und sofort annehmen oder mit einem Zuruf nachbessern","Die Teile selbst zusammensetzen und nur die Übergänge glätten lassen","Einmal am Stück lesen: Trägt der rote Faden vom ersten bis zum letzten Baustein?"]},{"name":"Die zweite Meinung im Vorbeigehen","steps":["Erste brauchbare Version wie gewohnt in Minuten erzeugen","Eine einzige Anschlussfrage stellen: Was wäre die 20 Prozent bessere Fassung?","Nur übernehmen, was dich sofort überzeugt — der Rest fliegt raus","Merken, wo Version zwei regelmäßig gewinnt: Genau dort lohnt sich künftig die Extrafrage"]}],"antiPatterns":[{"title":"Flüssig verwechselt mit richtig","fix":"Führe die 30-Sekunden-Regel ein: Vor jedem Absenden einmal mit dem Finger über alle Zahlen, Namen und Zusagen — nur diese drei Dinge, mehr Prüfung brauchst du nicht."},{"title":"Jeden Tag das Rad neu erfinden","fix":"Wenn ein spontaner Prompt zum dritten Mal funktioniert, kopiere ihn in eine einzige Notiz — kein System, keine Bibliothek, nur ein Zettel für Wiederholungstäter."},{"title":"Selbst der Flaschenhals sein","fix":"Bei Ketten, die du ständig läufst — Notizen zu Mail zu To-dos — vergib testweise zwei Schritte in einem einzigen Auftrag; die Steuerung behältst du trotzdem."}]},"EPDA":{"description":"Du gibst der KI nie das ganze Werk, sondern immer nur das nächste, sauber umrissene Rädchen — und geprüft wird jedes einzelne, bevor es verbaut wird. Ihr größter Wert liegt für dich im Denken, nicht im Produzieren: Deine besten Prompts sind keine Zufallstreffer, sondern gespeicherte Werkzeuge, die du über Monate schärfst.","strengths":["In deine Arbeit sickert nichts Ungeprüftes ein: kleine Delegationshappen plus konsequente Verifikation lassen Fehlern kaum einen Weg hinein.","Deine Denk-Vorlagen machen einmal Durchdachtes wiederholbar — jede neue Analyse startet auf dem Niveau der besten davor.","Was du weitergibst, hält Nachfragen stand, weil Quellen, Zahlen und Argumente durch deine eigene Prüfung gegangen sind."],"blindspots":["Du prüfst die interne Notiz mit derselben Gründlichkeit wie die Vorstandsvorlage — und verlierst Stunden dort, wo eine Stichprobe genügt hätte.","Weil du nur Miniatur-Aufgaben abgibst und die KI kaum je produzieren lässt, bleibt ihr größter Hebel ungenutzt — ausgerechnet bei dir, der Rohfassungen am sichersten prüfen könnte.","Deine Vorlagen können zum Gleis werden: Neue Problemtypen presst du in bewährte Prompt-Strukturen, statt einmal ohne Geländer zu explorieren."],"signaturePrompt":"Ich arbeite an [Thema oder Entscheidung]. Wir gehen in drei Etappen vor — stoppe nach jeder und warte auf mein Go.\nEtappe 1: Zerlege das Problem in 4–6 Kernbausteine und nenne pro Baustein die eine Frage, die ich beantworten muss.\nEtappe 2: Für den Baustein, den ich wähle, liste alle Annahmen auf und markiere jede als belegt, plausibel oder Kippgefahr.\nEtappe 3: Mach daraus eine Prüfliste, die ich als Vorlage für ähnliche Probleme speichern kann.","promptLibrary":[{"title":"Annahmen-Röntgen","prompt":"Hier ist mein Entwurf: [Text oder Plan einfügen].\nExtrahiere jede Annahme, die darin steckt — auch die stillen. Ordne jede in eine von drei Klassen: BELEGT (mit Beleg im Text), PLAUSIBEL (vernünftig, aber unbelegt), KIPPGEFAHR (wenn falsch, kippt das Ganze).\nSortiere nach Kippgefahr. Bewerte nichts um — nur röntgen."},{"title":"Quellen-Verhör","prompt":"Prüfe diesen Text auf überprüfbare Behauptungen: [Text einfügen].\nListe jede Behauptung einzeln und gib an: (a) Was genau müsste stimmen? (b) Wie würde ich es in unter fünf Minuten gegenprüfen? (c) Wie sicher klingt die Formulierung im Verhältnis zur Beleglage?\nErgänze keine eigenen Fakten — liefere nur das Prüfraster."},{"title":"Denk-Etappen mit Stoppschildern","prompt":"Wir denken [Problem] gemeinsam durch — in Etappen. Regel: Nach jeder Etappe stoppst du und wartest auf mein Go.\nEtappe 1: Formuliere das Problem in einem Satz zurück und nenne, was dir zur Einordnung fehlt.\nEtappe 2: Drei grundverschiedene Lösungsrichtungen, je zwei Sätze.\nEtappe 3: Zur Richtung meiner Wahl die drei härtesten offenen Fragen."},{"title":"Prompt-zu-Vorlage-Kompiler","prompt":"Dieser Prompt hat gerade sehr gut funktioniert: [Prompt einfügen].\nMach daraus eine wiederverwendbare Vorlage: Ersetze alles Fallspezifische durch [VARIABLEN] mit sprechenden Namen, ergänze eine Zeile „Einsatz wenn: …\" und eine Zeile „Nicht geeignet für: …\".\nHalte die Vorlage kürzer als das Original."},{"title":"Argument-Zerreißprobe","prompt":"Nimm die Gegenposition zu meiner These ein: [These].\nBring die drei stärksten Einwände — nicht die häufigsten, die stärksten. Zu jedem: Unter welcher Bedingung wäre der Einwand tödlich, und woran würde ich früh erkennen, dass diese Bedingung eintritt?\nSei unbequem, nicht höflich."},{"title":"Struktur vor Text","prompt":"Ich muss [Dokumenttyp, z. B. Konzeptpapier] zu [Thema] schreiben — aber noch keinen Text. Baue mir erst das Skelett: Zielaussage in einem Satz, dann 4–6 Abschnitte mit je einer Leitfrage und dem einen Punkt, den der Abschnitt beweisen muss.\nMarkiere, wo mir vermutlich noch Material fehlt. Den Text schreibe ich selbst."},{"title":"Ein-Rädchen-Auftrag","prompt":"Eine einzige, eng umrissene Aufgabe: [Teilaufgabe, z. B. „Fasse diese fünf Kundenzitate in je einem neutralen Satz zusammen\"].\nRahmen: [Kontext in zwei Sätzen].\nAbnahmekriterien: [z. B. „maximal 15 Wörter pro Satz, keine Wertung\"].\nLiefere nur das — keine Vorschläge, was man sonst noch tun könnte."},{"title":"Prüfprotokoll-Generator","prompt":"Ich lasse mir regelmäßig [Output-Typ, z. B. Wettbewerbsanalysen] von KI zuarbeiten. Baue mir ein Prüfprotokoll mit maximal sieben Punkten: Was geht bei diesem Output-Typ typischerweise schief, in welcher Reihenfolge prüfe ich am effizientesten, und welche zwei Punkte darf ich bei Zeitdruck weglassen?\nFormatiere es so, dass ich es als Vorlage speichern kann."},{"title":"Zahlen-Gegenprobe","prompt":"Hier sind Zahlen aus [Quelle oder Kontext]: [Zahlen oder Tabelle einfügen].\nPrüfe sie auf innere Konsistenz: Summieren sich Teile zum Ganzen? Passen Größenordnungen und Einheiten? Widersprechen sich Werte untereinander?\nNenne pro Auffälligkeit, welche der beteiligten Zahlen du für die verdächtigere hältst — und warum."},{"title":"Entscheidungs-Gerüst","prompt":"Ich stehe vor der Entscheidung: [Entscheidung].\nBaue mir das Gerüst, nicht die Antwort: Welche 4–6 Kriterien sind wirklich entscheidungsrelevant, welche davon sind K.-o.-Kriterien, und welche Information fehlt mir pro Kriterium noch?\nDie Gewichtung und das Urteil übernehme ich."},{"title":"Blindstellen-Scan","prompt":"Hier ist mein Plan für [Vorhaben]: [Plan einfügen].\nSag mir nicht, was daran gut ist. Sag mir ausschließlich: Welche drei Dinge übersehe ich am wahrscheinlichsten — je eines aus den Kategorien „Beteiligte\", „Zeitpunkt\" und „stille Annahme\"?\nEin Absatz pro Blindstelle, konkret auf meinen Plan bezogen."},{"title":"Begriffs-Schärfer","prompt":"Ich benutze in [Kontext] den Begriff [Begriff], aber er ist mir zu unscharf. Schärfe ihn mit mir: Gib drei präzise Definitionskandidaten, die sich in mindestens einem wesentlichen Punkt unterscheiden.\nZeige pro Kandidat einen Grenzfall, der gerade noch darunterfällt — und einen, der es gerade nicht mehr tut."},{"title":"Vorlagen-TÜV","prompt":"Das ist eine meiner gespeicherten Prompt-Vorlagen: [Vorlage einfügen].\nPrüfe sie wie ein Gutachter: Wo ist sie auf alte Fälle überangepasst? Welche Formulierung erzeugt vorhersehbar generische Antworten? Welche eine Variable fehlt, damit sie auf mehr Fälle passt?\nLiefere die überarbeitete Fassung mit Änderungsvermerk."}],"delegate":["Rohordnung schaffen: Meeting-Notizen, Transkripte und Materialsammlungen zu ersten Gliederungen verdichten lassen.","Red-Teaming der eigenen Entwürfe — Gegenargumente findet die KI schneller und schonungsloser als der eigene Kopf.","Formulierungsvarianten für bereits geprüfte Kernaussagen: Wenn der Inhalt steht, darf die KI an der Sprache drehen.","Kandidatenlisten für die Recherche: Quellen, Studien und Beispiele vorschlagen lassen — die Auswahlprüfung bleibt bei dir.","Wiederkehrende Umbau-Arbeit nach deiner Vorlage: aus Stichpunkten Tabellen, aus Langfassungen Zusammenfassungen."],"keep":["Die finale Faktenfreigabe: Was du nicht selbst verifiziert hast, verlässt nicht deinen Schreibtisch.","Den Schnittplan: Du entscheidest, wie ein Problem zerlegt wird und welches Teilstück die KI bekommt.","Das Urteil: Die Empfehlung am Ende einer Analyse trägt deinen Namen — sie entsteht nicht im Modell.","Die Pflege deiner Vorlagenbibliothek: Was Vorlage wird und was fliegt, ist dein Qualitätsstandard.","Heikle Kommunikation: alles, wo zwischen den Zeilen mehr steht als in ihnen."],"workflows":[{"name":"Analyse in Etappen","steps":["Problem der KI in zwei Sätzen geben und in 4–6 Bausteine zerlegen lassen — noch keine Lösungen","Den riskantesten Baustein wählen und als eng umrissenen Einzelauftrag mit Abnahmekriterien delegieren","Die Annahmen des Ergebnisses klassifizieren lassen: belegt, plausibel, Kippgefahr","Die Kippgefahr-Annahmen selbst verifizieren, erst dann den nächsten Baustein starten","Die Zerlegung am Ende als Vorlage für die nächste Analyse dieses Typs speichern"]},{"name":"Vom Zufallstreffer zur Vorlage","steps":["Nach einer ungewöhnlich guten KI-Antwort sofort festhalten, welcher Teil des Prompts den Unterschied gemacht hat","Den Prompt vom Fallspezifischen befreien und Variablen in eckigen Klammern einsetzen","Die Vorlage an einem zweiten, anders gelagerten Fall testen","Mit einer Zeile „Einsatz wenn / nicht geeignet für\" in der Bibliothek ablegen"]},{"name":"Prüfschleuse für Zugeliefertes","steps":["Eingehenden Text oder Bericht von der KI in Einzelbehauptungen zerlegen lassen","Jede Behauptung einordnen lassen: überprüfbar, Meinung oder Prognose","Die drei folgenreichsten überprüfbaren Behauptungen selbst gegenchecken","Erst nach bestandener Schleuse weiterverarbeiten oder weiterleiten"]}],"antiPatterns":[{"title":"Prüfen im Einheitstakt","fix":"Vor jeder Prüfung zehn Sekunden triagieren: Vollprüfung nur für Externes und Zahlen, Stichprobe für Internes, Sichtprüfung für Wegwerf-Output."},{"title":"Der Rädchen-Deckel","fix":"Einmal pro Woche bewusst ein ganzes Arbeitspaket statt eines Teilschritts delegieren — und nur das Endergebnis durch deine Prüfschleuse schicken."},{"title":"Das Vorlagen-Museum","fix":"Jedes Quartal jede Vorlage gegen einen frei formulierten Prompt zum selben Fall antreten lassen; verliert sie, wird sie überarbeitet oder gelöscht."}]},"WPDI":{"description":"Du schickst die KI mit großen, offenen Fragen auf Expedition — und nimmst dann gründlich auseinander, was sie mitbringt. Dich treibt nicht die fertige Antwort, sondern die nächste gute Spur: Delegieren heißt für dich nicht abkürzen, sondern mehr Terrain durchsuchen, als du allein je könntest.","strengths":["Du verbindest die Reichweite großer, selbstständiger KI-Aufträge mit konsequenter Prüfung — du erntest die Ergebnisse, ohne die Fehler mitzuernten.","Im freien Nachfragen bist du zu Hause: Aus einer vagen Ahnung wird bei dir in wenigen Dialogrunden eine präzise, prüfbare These.","Weil du KI als Denkpartner statt als Textautomat einsetzt, findest du Widersprüche und weiße Flecken, wo andere nur Zusammenfassungen abholen."],"blindspots":["Du folgst einer interessanten Spur oft länger, als die anstehende Entscheidung es braucht — die Erkundung wird zum Ziel, die Antwort bleibt offen.","Weil du Aufträge spontan statt spezifiziert vergibst, driften lange autonome Läufe unbemerkt ab — und du siehst es erst, wenn die Arbeit schon getan ist.","Dein Prüfanspruch skaliert nicht mit deiner Delegation: Bei großen Ergebnismengen kontrollierst du entweder alles und verlierst das Tempo — oder nach Gefühl und übersiehst das Muster im Fehler."],"signaturePrompt":"Recherchiere selbstständig: [Thema oder offene Frage]. Arbeite in mehreren Etappen — verschaffe dir erst einen Überblick über das Feld, verfolge dann die drei vielversprechendsten Spuren in die Tiefe.\nKennzeichne bei jeder zentralen Aussage, worauf sie beruht: Quelle, Schlussfolgerung oder Vermutung.\nAm Ende: Was hat dich überrascht, wo widersprechen sich deine Quellen — und welcher Spur würdest du als Nächstes folgen?","promptLibrary":[{"title":"Expeditionsauftrag","prompt":"Du bekommst eine offene Frage und arbeitest selbstständig in Etappen: [Frage].\nEtappe 1: Kartiere das Feld — welche Positionen, Schulen und Lager gibt es?\nEtappe 2: Verfolge die zwei stärksten und die eine überraschendste Position in die Tiefe.\nEtappe 3: Berichte, wo die Evidenz hart ist, wo sie dünn ist und was du auf eigene Faust weiterverfolgen würdest.\nTrenne durchgehend Belegtes von Vermutetem."},{"title":"Quellen-Verhör","prompt":"Hier ist ein Ergebnis, das ich prüfen will: [Text oder Ergebnis einfügen].\nZerlege es in einzelne Tatsachenbehauptungen. Bewerte jede: Wie sicher ist sie, worauf stützt sie sich, wie ließe sie sich unabhängig verifizieren?\nMarkiere zum Schluss die drei Behauptungen, deren Kollaps das Gesamtergebnis am stärksten beschädigen würde."},{"title":"Steelman-Gegner","prompt":"Meine Arbeitsthese: [These].\nNimm die Gegenposition ein — nicht als Strohmann, sondern in ihrer stärksten Form. Welche Evidenz spricht gegen mich, welche Annahme trage ich unbemerkt mit, und an welchem konkreten Punkt würde ein kundiger Gegner ansetzen?\nDanach: Was müsste wahr sein, damit ich trotzdem recht habe?"},{"title":"Widersprüche zuerst","prompt":"Ich lese mich in [Thema] ein. Statt mir den Konsens zusammenzufassen: Zeig mir die drei Punkte, an denen sich seriöse Quellen widersprechen.\nErkläre pro Streitpunkt, was auf dem Spiel steht, wer was behauptet — und welche Beobachtung oder Zahl den Streit entscheiden würde."},{"title":"Autopilot mit Leitplanken","prompt":"Bevor du loslegst: Übersetze meinen Auftrag in drei Erfolgskriterien und zwei Abbruchkriterien und zeig sie mir zur Freigabe.\nDer Auftrag: [offene Aufgabe].\nNach meiner Freigabe arbeitest du selbstständig alle Schritte ab und lieferst am Ende das Ergebnis plus ein kurzes Protokoll der Entscheidungen, die du unterwegs getroffen hast."},{"title":"Spurwechsel-Check","prompt":"Ich verfolge gerade diese Spur: [kurz beschreiben, worum es geht und was du bisher hast].\nStell mir fünf Fragen, die klären, ob die Spur trägt. Dann dein ehrliches Urteil: weitergraben, abzweigen oder abschließen?\nBegründe mit dem, was eine Woche mehr Suche realistisch noch ändern könnte."},{"title":"Denk-Sparring ohne Netz","prompt":"Ich denke laut über [Problem oder Frage] nach und will kein fertiges Ergebnis, sondern besseres Denken.\nReagiere auf das, was ich schreibe: Benenne die Annahme dahinter, biete eine Umdeutung an und stelle genau eine Frage zurück.\nKurz und pointiert — wir tasten uns vor."},{"title":"Landkarte statt Zusammenfassung","prompt":"Erstelle eine Landkarte von [Themenfeld]: die vier bis sechs zentralen Gebiete, die jeweils entscheidende Frage dort, die Grenzen zwischen den Gebieten — und die weißen Flecken, über die auffällig wenig gesprochen wird.\nKeine Fließtext-Zusammenfassung, sondern eine Struktur, mit der ich navigieren kann."},{"title":"Vermutung vs. Beleg","prompt":"Geh deinen letzten Output noch einmal durch und annotiere jede zentrale Aussage mit einem von drei Labels:\nBELEGT (nenne die Grundlage), GEFOLGERT (zeig die Schlusskette), VERMUTET (sag es offen).\nListe danach die Aussagen auf, bei denen du beim Annotieren selbst unsicher geworden bist."},{"title":"Überraschungs-Auftrag","prompt":"Hier ist mein Material: [Dokument, Daten oder Notizen].\nDein Auftrag ist bewusst offen: Finde darin das, was ich vermutlich übersehe. Arbeite selbstständig — quer lesen, Muster suchen, Vergleiche ziehen.\nBring mir am Ende drei Beobachtungen mit, von denen du erwartest, dass sie mich überraschen, und sag zu jeder, wie sicher du bist."},{"title":"Zweitgutachter","prompt":"Bewerte unabhängig, ohne mein Urteil zu kennen: [Ergebnis oder Analyse einfügen].\nTu so, als hätte es ein Kollege eingereicht, dessen Sorgfalt du nicht kennst. Prüfe Rechenwege, Quellenlogik und stille Annahmen.\nUrteil in drei Stufen: übernehmen / mit Korrekturen übernehmen / neu machen — mit Begründung."},{"title":"Die Frage hinter der Frage","prompt":"Meine Frage lautet: [Frage].\nBevor du sie beantwortest: Welche drei besseren Fragen verstecken sich dahinter? Formuliere sie aus und sag, welche du an meiner Stelle stellen würdest und warum.\nBeantworte dann nur diese eine."},{"title":"Fährten-Protokoll","prompt":"Arbeite dich selbstständig durch [Quelle oder Dokumentensammlung] und melde dich nach jeder Etappe mit einem Drei-Zeilen-Bericht: Was hast du gefunden, was hast du verworfen, wohin gehst du als Nächstes?\nIch greife nur ein, wenn ich abbiegen will — sonst läufst du weiter."},{"title":"Erkenntnis-Destillat","prompt":"Wir haben in diesem Gespräch viel Terrain durchquert. Destilliere daraus:\ndie drei tragfähigsten Erkenntnisse (mit ihrer Begründung), zwei verworfene Hypothesen (und warum) und eine offene Frage, die die nächste Sitzung eröffnen sollte.\nSo knapp, dass ich es direkt in mein Notizsystem übernehmen kann."}],"delegate":["Die erste Durchquerung neuer Themenfelder: Überblick, Lager, Schlüsselbegriffe — bevor du selbst die erste Stunde investierst.","Die Fleißarbeit der Verifikation: Behauptungen extrahieren, Quellenangaben abgleichen, Zahlen nachrechnen — das Urteil bleibt bei dir.","Mehrschrittige Recherche-Aufträge im Hintergrund: Material sichten, Muster suchen, Widersprüche markieren, Etappenberichte liefern.","Das Protokollieren deiner Streifzüge: Zwischenstände, verworfene Pfade und offene Fragen aus dem Dialog heraus destillieren lassen.","Die Produktion nach der Erkenntnis: Wenn das Denken fertig ist, darf die KI daraus das Memo, den Bericht oder die Präsentation bauen."],"keep":["Die Frage selbst: Was gefragt wird und warum, ist dein wertvollster Beitrag — keine noch so gute Antwort ersetzt die richtige Problemwahl.","Das finale Urteil bei strittigen Fakten: Wo Quellen sich widersprechen, entscheidest du — nicht die eloquenteste Zusammenfassung.","Den Moment des Abschließens: Wann eine Spur ausrecherchiert ist, ist eine Entscheidung, keine Erkenntnis — triff sie bewusst und selbst.","Gespräche mit echten Menschen im Feld: Die Spuren, die in keinem Trainingsmaterial stehen, findest du nur dort.","Die Synthese am Ende: Viele Spuren zu einer eigenen Position zu verdichten ist genau das Denken, für das du die KI benutzt — gib es nicht ab."],"workflows":[{"name":"Expedition mit Rückkehrpunkt","steps":["Formuliere die offene Frage — und davor einen Satz dazu, woran du ein brauchbares Ergebnis erkennen wirst.","Vergib den vollständigen Recherche-Auftrag am Stück, inklusive der Regel: Belegtes, Gefolgertes und Vermutetes getrennt kennzeichnen.","Verhöre das Ergebnis im Dialog: Widersprüche zuerst, dann die drei tragenden Behauptungen stichprobenhaft selbst verifizieren.","Entscheide bewusst: weitergraben, abzweigen oder abschließen — und halte die Entscheidung schriftlich fest.","Lass ein Destillat für dein Notizsystem erzeugen, bevor du den Chat schließt."]},{"name":"These härten","steps":["Sprich deine Ahnung frei in den Chat und lass die Annahme benennen, die dahintersteckt.","Lass die stärkste Gegenposition bauen und notiere, welcher Einwand dich wirklich trifft.","Vergib einen selbstständigen Auftrag: Evidenz für und gegen die These sammeln, Quellenqualität mitbewerten.","Prüfe die drei entscheidenden Belege selbst nach — nicht alle, die entscheidenden.","Formuliere die These neu: ein Satz plus ihre Bedingung („Gilt, solange …\")."]},{"name":"Vom Chatverlauf zum Ergebnis","steps":["Lege vor der Session einen Liefergegenstand fest — Memo, Entscheidung oder Empfehlung, ein Satz genügt.","Exploriere frei wie gewohnt, aber markiere Fundstücke unterwegs mit einem Stichwort („merken\").","Lass am Ende alle markierten Fundstücke zum Liefergegenstand verdichten.","Verifiziere nur, was im Liefergegenstand tatsächlich behauptet wird — der Rest darf ungeprüft bleiben.","Versende oder archiviere das Ergebnis noch am selben Tag."]}],"antiPatterns":[{"title":"Das Kaninchenbau-Syndrom","fix":"Setze vor jeder Session einen Rückkehrpunkt: eine Uhrzeit oder eine Frage, deren Beantwortung die Expedition beendet. Alles, was danach noch lockt, kommt auf die Liste für die nächste Session — nicht in diese."},{"title":"Der Blankoscheck-Auftrag","fix":"Lass die KI deinen Auftrag vor dem Start in drei Erfolgskriterien übersetzen und gib sie frei. Das kostet dreißig Sekunden und verwandelt „mal sehen, was kommt\" in ein prüfbares Ergebnis."},{"title":"Der Erkenntnis-Friedhof","fix":"Beende keine Session ohne Destillat: drei Erkenntnisse, zwei verworfene Hypothesen, eine offene Frage — direkt ins Notizsystem. Der Chatverlauf ist Rohmaterial, kein Archiv."}]},"EVMA":{"description":"Du arbeitest mit einem gewachsenen Repertoire erprobter Prompts und Vorlagen, aus dem du für jede Aufgabe gezielt das passende Werkzeug ziehst — und gibst der KI damit kleine, sauber umrissene Produktionsaufträge. Was zurückkommt, beurteilst du mit geübtem Blick: Überzeugt es, wandert es direkt ins fertige Ergebnis, und du bist schon beim nächsten Baustein.","strengths":["Deine erprobten Vorlagen liefern verlässlich gleichbleibende Qualität — du fängst nie bei null an und wirst mit jedem Einsatz schneller.","Du verlierst keine Zeit mit Absicherungsschleifen: Was gut ist, erkennst du auf einen Blick und bringst es sofort in Umlauf.","Weil du nur sauber umrissene Teilstücke abgibst, fügt sich jeder KI-Baustein nahtlos ins Ganze — die Handschrift bleibt erkennbar deine."],"blindspots":["Dein Blick prüft Form schneller als Fakten — eloquent formulierter Output mit stillen Sachfehlern rutscht dir am ehesten durch.","Deine Sammlung veraltet leise: Du greifst zum bewährten Prompt, auch wenn neuere Modelle längst einen besseren Weg eröffnet hätten.","Beim Zerlegen in Häppchen bleibst du selbst der Engpass — Ketten, die die KI am Stück erledigen könnte, montierst du unnötig von Hand."],"signaturePrompt":"Erstelle drei deutlich unterschiedliche Varianten von [Baustein, z. B. Einleitung oder Produkttext] für [Zielgruppe und Anlass]: eine nüchtern-präzise, eine zugespitzte, eine erzählerische.\nVorgaben: [Länge, Tonalität, No-Gos].\nNummeriere sie und schreibe zu jeder einen Satz, wofür sie sich am besten eignet — keine Rückfragen, ich wähle aus.","promptLibrary":[{"title":"Drei-Varianten-Buffet","prompt":"Erstelle drei deutlich unterschiedliche Varianten von [Baustein, z. B. Betreffzeile / Einstieg / Produkttext] für [Zielgruppe und Anlass]: eine nüchtern-präzise, eine zugespitzte, eine erzählerische. Vorgaben: [Länge, Tonalität, No-Gos]. Nummeriere sie und schreibe zu jeder einen Satz, wofür sie sich am besten eignet. Keine Rückfragen — ich wähle aus."},{"title":"Vorlage aus dem Treffer destillieren","prompt":"Dieses Ergebnis war genau richtig:\n[gelungenes Beispiel einfügen]\nDestilliere daraus eine wiederverwendbare Prompt-Vorlage: Platzhalter in eckigen Klammern für alles Variable, feste Formulierungen für alles, was die Qualität ausmacht. Ergänze am Ende drei Hinweise, worauf ich beim Ausfüllen achten muss."},{"title":"Baustein nach Stilprofil","prompt":"Stilprofil: [dein gespeicherter Stilblock — Tonalität, Satzlänge, typische Wendungen, No-Gos].\nProduziere in exakt diesem Stil: [konkreter Baustein, z. B. Abschnitt über X, ca. Y Wörter].\nLiefere nur den fertigen Text, keine Erläuterungen."},{"title":"Finale Fassung, kein Menü","prompt":"Liefere direkt die eine beste Fassung von [Aufgabe] — keine Alternativen, keine Rückfragen, keine Erklärungen deiner Entscheidungen. Kontext: [2–3 Sätze]. Format: [gewünschtes Format]. Fehlt dir eine Information, triff die plausibelste Annahme und kennzeichne sie im Text mit [ANNAHME: …]."},{"title":"Stichpunkte zu Tabelle","prompt":"Hier sind ungeordnete Notizen:\n[Notizen einfügen]\nBaue daraus eine saubere Tabelle mit genau diesen Spalten: [Spalte 1, Spalte 2, Spalte 3]. Fasse Doppeltes zusammen, sortiere nach [Kriterium] und liste unter der Tabelle auf, was sich nicht einordnen ließ."},{"title":"Chirurgischer Feinschliff","prompt":"Überarbeite ausschließlich den markierten Absatz — der Rest des Textes bleibt unangetastet und dient dir nur als Tonlage-Referenz.\n[gesamten Text einfügen, Zielabsatz mit >>> und <<< markieren]\nZiel der Überarbeitung: [z. B. präziser, halb so lang, stärkerer Einstieg]. Gib nur den neuen Absatz zurück."},{"title":"Prompt-Sammlung straffen","prompt":"Hier sind meine [Anzahl] meistgenutzten Prompts:\n[Prompts einfügen]\nStraffe jeden einzeln: Füllwörter raus, Platzhalter vereinheitlichen, Format-Vorgaben präzisieren. Zeige mir pro Prompt nur die geänderten Stellen als Vorher/Nachher — und sag mir, ob zwei sich so ähneln, dass einer reicht."},{"title":"Serie nach Goldstandard","prompt":"Das hier ist mein Goldstandard — an diesem Muster misst sich alles:\n[fertiges Beispiel einfügen]\nProduziere nach exakt diesem Muster [Anzahl] weitere Stücke zu diesen Themen: [Themenliste]. Gleiche Struktur, gleiche Länge, gleicher Ton. Nummeriert, ohne Kommentar."},{"title":"60-Sekunden-Risikoblick","prompt":"Prüfe diesen Text NICHT auf Stil. Nenne mir nur die drei Stellen mit dem höchsten Faktenrisiko — Zahlen, Namen, Daten, Behauptungen, die falsch sein könnten — mit je einem Satz, warum. Sonst nichts.\n[Text einfügen]"},{"title":"Format-Konverter","prompt":"Übertrage den folgenden Inhalt 1:1 in [Zielformat, z. B. fünf Folien-Bullets / eine Mail an X / eine 100-Wort-Zusammenfassung]. Nichts hinzuerfinden, nichts Wesentliches weglassen — was nicht ins Format passt, liste separat unter »Nicht untergebracht«.\n[Inhalt einfügen]"},{"title":"Lücken-Auftrag","prompt":"In diesem Dokument steht an einer Stelle [LÜCKE]. Fülle genau diese Lücke: [was dort stehen soll, ungefähre Länge]. Übernimm Ton und Tempo der umgebenden Absätze, sodass niemand die Naht sieht. Gib nur den Lückentext zurück.\n[Dokument einfügen]"},{"title":"Vorsortierung fürs Auge","prompt":"Hier sind [Anzahl] Kandidaten:\n[Optionen einfügen]\nSortiere sie absteigend nach [Kriterium, z. B. Passung zur Zielgruppe X] und gib zu jedem eine Ein-Zeilen-Begründung. Nenne am Ende deinen Favoriten in einem Satz — die Entscheidung treffe ich."},{"title":"Vorlagen-TÜV","prompt":"Das ist meine bewährte Vorlage für [Aufgabe]:\n[Vorlage einfügen]\nSie funktioniert — aber sie ist [Alter] alt. Schlage genau drei Verbesserungen vor, die heutige Modellfähigkeiten nutzen (längerer Kontext, bessere Formattreue, präzisere Anweisungen). Als Vorher/Nachher-Gegenüberstellung, damit ich gezielt übernehmen kann."},{"title":"Antwortbaukasten anlegen","prompt":"Ich beantworte immer wieder ähnliche [Anfragen/Mails] zu: [3–5 typische Fälle].\nBaue mir einen Baukasten: pro Fall eine Textvorlage mit [Platzhaltern] für das Variable, dazu je zwei alternative Schlusssätze (einmal verbindlich, einmal locker). So knapp, dass ich jede in unter einer Minute anpassen kann."}],"delegate":["Rohfassungen aller Standardformate — Statusmails, Zusammenfassungen, Protokolle — laufen komplett über deine Vorlagen.","Formatwechsel jeder Art: Notizen zu Tabellen, Langtexte zu Folien, Dokumente zu Kurzfassungen.","Serienproduktion nach erprobtem Muster — sobald der Goldstandard steht, gehört die Stückzahl der KI.","Varianten-Erzeugung für alles, wo dein Auge entscheidet: Titel, Einstiege, Betreffzeilen, Formulierungsalternativen.","Die Wartung deiner eigenen Prompts: Straffen, Vereinheitlichen und Verbesserungsvorschläge kann die KI selbst liefern."],"keep":["Die finale Auswahl: Welche Variante rausgeht, entscheidet dein Blick — genau darin liegt dein Wert.","Fakten mit Konsequenzen: Zahlen, Namen, Zusagen und Quellen kurz selbst verifizieren, bevor etwas das Haus verlässt.","Den roten Faden des Ganzen: Reihenfolge, Argumentationslinie und Dramaturgie setzt du — die KI füllt nur Bausteine.","Heikle Kommunikation — Absagen, Kritik, Verhandlungen — bleibt Handarbeit, weil hier Nuancen zählen, die keine Vorlage abdeckt.","Die Kuratierung der Sammlung selbst: Was aufgenommen, aktualisiert oder aussortiert wird, ist deine redaktionelle Entscheidung."],"workflows":[{"name":"Varianten-Auswahl-Strecke","steps":["Aufgabe in einen klar umrissenen Baustein zerlegen und die passende Vorlage aus deiner Sammlung ziehen","Drei bewusst unterschiedliche Varianten erzeugen lassen, jede mit einer Ein-Satz-Einordnung","Mit geübtem Blick die stärkste wählen und nur dieser einen eine Feinschliff-Runde geben","Gewinner einbauen — und wenn der Prompt gut funktioniert hat, wandert er zurück in die Sammlung"]},{"name":"Serienproduktion nach Goldstandard","steps":["Ein einzelnes Stück bis zur Perfektion bringen — das ist dein Goldstandard","Aus dem Goldstandard eine Vorlage mit Platzhaltern und expliziten Qualitätsmerkmalen destillieren","Die Serie in Häppchen produzieren lassen: immer nur drei bis fünf Stücke pro Durchgang","Pro Durchgang ein Stichproben-Stück gegen den Goldstandard halten, dann den Rest freigeben"]},{"name":"Bibliothekspflege im Quartal","steps":["Die zehn meistgenutzten Prompts aus deiner Sammlung ziehen","Jeden von der KI gegen die aktuelle Modellgeneration prüfen lassen: Wo geht heute mehr?","Zwei Prompts verbessern, zwei bewusst aussortieren, einen neuen aufnehmen","Änderungen mit Datum versehen, damit du weißt, was wann zuletzt auf dem Prüfstand war"]}],"antiPatterns":[{"title":"Der eloquente Blender","fix":"Alles mit Zahlen, Namen oder Zusagen bekommt vor dem Versand den 60-Sekunden-Risikoblick: Lass dir nur die drei fehleranfälligsten Stellen nennen — mehr Prüfung braucht dein Stil nicht, weniger wäre fahrlässig."},{"title":"Das Vorlagen-Museum","fix":"Setz dir einen festen Quartalstermin: die zehn meistgenutzten Prompts gegen die aktuelle Modellgeneration testen, zwei verbessern, zwei aussortieren — eine Sammlung lebt vom Wegwerfen."},{"title":"Der Kleinteil-Reflex","fix":"Vergib einmal pro Woche eine gewohnte Dreier-Kette testweise als einen einzigen Auftrag mit klarem Endformat — oft ist das Stück-für-Stück-Montieren nur Gewohnheit, nicht Notwendigkeit."}]},"WPDA":{"description":"Du übergibst der KI keine Häppchen, sondern ganze Denkaufträge: offene Analysen, die sie über mehrere Schritte selbstständig durchläuft, während du Fragestellung, Kriterien und Prüfpunkte setzt. Dich treibt der Hebel — Systeme, die du einmal sauber aufsetzt, die verlässlich Denkarbeit liefern und deren kritische Stellen du kennst und gezielt kontrollierst.","strengths":["Du delegierst ganze Denkstrecken statt Einzelschritte — und gewinnst die Höhe, von der aus man Fragestellungen sieht statt nur Aufgaben.","Deine Prüfungen sind Präzisionsarbeit: Du weißt, an welchen Stellen autonome KI-Läufe kippen, und setzt deine Kontrolle genau dort an statt überall.","Was bei dir einmal funktioniert, funktioniert wieder: Aus guten Ergebnissen baust du Vorlagen, die auch beim zwanzigsten Einsatz stabil liefern."],"blindspots":["Deine Vorlagen können zu Schienen werden: Läuft jede Frage durch dasselbe Raster, siehst du irgendwann nur noch, was das Raster vorsieht.","Du prüfst Fakten im Ergebnis gewissenhaft — aber die Rahmung, die die KI in Schritt zwei eines langen Laufs gesetzt hat, entgeht deiner Endkontrolle.","Wer dauerhaft nur prüft, was die Maschine gebaut hat, eicht seinen Maßstab nicht mehr an eigener Arbeit — und merkt nicht, wenn er sinkt."],"signaturePrompt":"Übernimm selbstständig, ohne Rückfragen: Analysiere [Entscheidung oder Problem] in vier Schritten.\nErstens: Zerlege die Frage in ihre 3–5 Kernspannungen. Zweitens: Entwickle pro Spannung die stärkste Position dafür und dagegen.\nDrittens: Markiere jede Tatsachenbehauptung als belegt, plausibel oder ungeprüft.\nViertens: Liefere eine Entscheidungsmatrix, die ich für künftige Fälle dieser Art wiederverwenden kann. Kontext: [Situation in drei Sätzen].","promptLibrary":[{"title":"Die Denk-Mission","prompt":"Arbeite selbstständig und ohne Rückfragen: Analysiere [Problem oder Fragestellung] aus drei Blickwinkeln — [Perspektive 1], [Perspektive 2], [Perspektive 3]. Führe jede Analyse vollständig durch und benenne pro Blickwinkel die stärkste Erkenntnis und die größte offene Frage. Schließe mit einer Synthese: Wo widersprechen sich die Blickwinkel, und welche Zusatzinformation würde den Widerspruch auflösen? Kennzeichne alles, was du nicht sicher weißt, ausdrücklich als Vermutung."},{"title":"Der stehende Lagebericht","prompt":"Erstelle einen Lagebericht zu [Thema, Projekt oder Markt]. Format bitte exakt einhalten, ich nutze es wiederholt: 1. Lage in drei Sätzen. 2. Was sich seit [Zeitpunkt] verändert hat. 3. Die drei größten Risiken, je mit Frühwarnzeichen. 4. Die eine Entscheidung, die jetzt ansteht. 5. Anhang: alle Tatsachenbehauptungen als Liste, je mit Konfidenz (hoch/mittel/niedrig) und einem Hinweis, wie ich sie prüfen könnte."},{"title":"Das Red-Team danach","prompt":"Du hast mir gerade [Analyse oder Empfehlung] geliefert. Wechsle jetzt die Seite: Greife deine eigene Arbeit an, als hättest du den Auftrag, sie vor einem kritischen Gremium zu zerlegen. Finde (a) die schwächste Tatsachenbehauptung, (b) den größten logischen Sprung, (c) die Annahme, die am ehesten falsch ist. Sag mir am Ende, welcher der drei Punkte deine Empfehlung kippen würde, falls er zutrifft."},{"title":"Die Prüf-Triage","prompt":"Hier ist ein KI-generierter Text, den ich verwenden will: [Text einfügen]. Extrahiere alle überprüfbaren Behauptungen und sortiere sie in drei Körbe: (1) Muss ich prüfen — falsch wäre teuer oder peinlich. (2) Stichprobe reicht. (3) Unkritisch. Begründe jede Zuordnung in Korb 1 in einem Satz und schlage pro Behauptung die schnellste Prüfmethode vor."},{"title":"Das Entscheidungs-Memo","prompt":"Baue mir ein Entscheidungs-Memo zu [Entscheidung]. Struktur: Kontext (maximal fünf Sätze) — Optionen (je mit dem stärksten Argument dafür und dagegen) — Kriterien, gewichtet nach [was mir wichtig ist] — Empfehlung mit Konfidenzangabe — zum Schluss: Was müsste wahr sein, damit die zweitbeste Option gewinnt? Halte die Struktur strikt ein, ich verwende sie als Standard für alle Entscheidungen dieser Art."},{"title":"Der Prompt-Lektor","prompt":"Hier ist ein Prompt, den ich regelmäßig verwende: [Prompt einfügen]. Analysiere ihn wie ein Lektor: Wo ist er mehrdeutig, wo fehlen Randfälle, wo verlasse ich mich auf Glück statt auf Anweisung? Liefere eine überarbeitete Version plus Änderungsliste mit Begründung. Ziel: Der Prompt soll auch beim fünfzigsten Einsatz mit wechselndem Material stabil funktionieren."},{"title":"Die Vorlagen-Schmiede","prompt":"Dieses Ergebnis war genau richtig: [gelungenes Ergebnis einfügen]. Rekonstruiere daraus eine wiederverwendbare Vorlage: Welche Elemente sind der übertragbare Kern, welche waren fallspezifisch? Liefere die Vorlage mit [Platzhaltern] und einer kurzen Ausfüllanleitung — so, dass eine Kollegin sie ohne Rückfragen nutzen könnte."},{"title":"Die Annahmen-Inventur","prompt":"Lies [Plan, Analyse oder Strategie] und liste alle Annahmen auf, auf denen sie ruht — auch die unausgesprochenen. Sortiere sie nach dem Produkt aus zwei Fragen: Wie wahrscheinlich ist die Annahme falsch, und wie schlimm wäre das? Für die drei riskantesten: Wie könnte ich sie mit weniger als einer Stunde Aufwand testen?"},{"title":"Der Perspektiven-Rat","prompt":"Simuliere eine Beratungsrunde zu [Frage]: [Rolle 1, z. B. skeptischer CFO], [Rolle 2, z. B. erfahrene Praktikerin], [Rolle 3, z. B. betroffener Kunde]. Lass jede Rolle ihre Position vollständig entwickeln und dann zwei Runden echten Widerspruch austragen — keine höfliche Einigkeit. Schließe mit dem Protokoll: Wo besteht Konsens, und wo liegt ein echter Zielkonflikt, den nur ich entscheiden kann?"},{"title":"Kontrollpunkte vor dem Start","prompt":"Ich gebe dir gleich eine mehrstufige Aufgabe zur selbstständigen Bearbeitung: [Aufgabe skizzieren]. Bevor du loslegst: Schlage mir zwei bis drei Kontrollpunkte vor, an denen ich zwischenprüfen sollte — die Stellen, an denen ein früher Fehler die meiste Folgearbeit entwerten würde. Begründe kurz und warte dann auf mein Go."},{"title":"Der Raster-Bruch","prompt":"Ich analysiere [Thema] normalerweise mit diesem Raster: [übliches Vorgehen oder Framework]. Analysiere es heute bewusst anders: Wähle ein Denkmodell aus einem fremden Feld ([z. B. Evolutionsbiologie, Städtebau, Spieltheorie]) und wende es ernsthaft an, nicht als Gag. Sag mir am Ende: Was hat diese Brille gezeigt, was mein übliches Raster systematisch übersieht?"},{"title":"Gerüst vor Prosa","prompt":"Bevor irgendein Fließtext entsteht: Baue mir das Argumentgerüst für [Dokument oder Präsentation]. Kernthese in einem Satz, darunter drei bis vier tragende Argumente, pro Argument der stärkste Beleg und der stärkste Einwand. Erst wenn ich das Gerüst freigegeben habe, schreiben wir aus."},{"title":"Das Zahlen-Verhör","prompt":"In diesem Material stecken Zahlen: [Text oder Tabelle einfügen]. Verhöre jede einzelne: Woher könnte sie stammen, ist die Rechenlogik nachvollziehbar, passt sie zu den anderen Zahlen im Dokument? Markiere jede Zahl als plausibel, nicht prüfbar oder widersprüchlich — und erkläre jede Markierung in einem Satz."},{"title":"Der System-Debrief","prompt":"Wir haben gerade [Projekt oder Aufgabe] abgeschlossen. Werte den Verlauf aus: Welche meiner Anweisungen haben gut funktioniert, wo musstest du raten, wo habe ich nachsteuern müssen? Destilliere daraus drei bis fünf stehende Regeln für meine Standard-Instruktionen — formuliert so, dass sie auf künftige Projekte dieser Art übertragbar sind."}],"delegate":["Materialsichtung im Ganzen: lange Dokumente, Studien und Diskussionen nicht nur zusammenfassen, sondern direkt strukturieren und bewerten lassen.","Die komplette erste Analyse-Runde zu neuen Fragestellungen — mehrstufig, selbstständig, mit ausgewiesenen Konfidenzangaben.","Das Ausformulieren, sobald dein Gerüst steht: Prosa ist bei dir Nacharbeit, kein Denkakt.","Konsistenz-Checks erster Stufe: interne Widersprüche, Rechenwege und Lücken von der KI selbst aufspüren lassen, bevor du prüfst.","Die Pflege deiner Prompt-Bibliothek: Vorlagen regelmäßig von der KI gegen neue Fälle testen und nachschärfen lassen."],"keep":["Die Rahmung: Welche Frage gestellt wird und welche Kriterien zählen, entscheidet über alles danach.","Die Endabnahme bei allem, was deinen Namen trägt, Geld bewegt oder Vertrauen kostet.","Echte Zielkonflikte: Die KI kann Optionen schärfen, aber nicht abwägen, was dir wichtiger ist.","Regelmäßig eine delegierte Aufgabe komplett selbst erledigen — um den Maßstab zu eichen, mit dem du prüfst.","Gespräche, in denen es um Menschen geht statt um Material: Feedback, Verhandlung, Überzeugung."],"workflows":[{"name":"Die Entscheidungs-Kampagne","steps":["Rahmen selbst setzen: Frage, Kriterien und No-Gos in fünf Sätzen festhalten","Denk-Mission starten: Die KI analysiert alle Optionen selbstständig entlang deiner Kriterien","Red-Team-Durchlauf: Dieselbe KI greift ihr eigenes Ergebnis an","Gezielt prüfen: Nur die drei bis fünf Behauptungen verifizieren, an denen die Empfehlung hängt","Entscheiden — und die Kriterienmatrix als Vorlage für die nächste Entscheidung dieser Art sichern"]},{"name":"Der stehende Lagebericht","steps":["Berichtsformat einmal sauber definieren: Struktur, Konfidenzangaben, Prüf-Anhang","Format als gespeicherten Prompt anlegen und regelmäßig mit frischem Material füttern","Pro Bericht gezielt den Prüf-Anhang kontrollieren: Stichprobe bei hoher, Vollprüfung bei kritischer Relevanz","Monatlich das Format selbst überarbeiten: Was du nie liest, fliegt raus"]},{"name":"Vom Treffer zur Vorlage","steps":["Nach einem besonders gelungenen KI-Ergebnis kurz stoppen statt einfach weiterzuarbeiten","Die KI ihren eigenen Erfolg rekonstruieren lassen: Was am Auftrag hat funktioniert?","Den übertragbaren Kern als Vorlage mit Platzhaltern ablegen","Die Vorlage beim nächsten realen Fall testen und einmal nachschärfen","Quartalsweise ausmisten: Vorlagen, die du dreimal nicht genutzt hast, werden gelöscht"]}],"antiPatterns":[{"title":"Endkontrolle statt Wegkontrolle","fix":"Lass dir bei mehrstufigen Aufträgen die Argumentationskette als Liste mitliefern und prüfe die ersten zwei Schritte zuerst — Fehler in der Anlage sieht man dem polierten Endergebnis nicht an."},{"title":"Noch eine Analyse-Schleife","fix":"Setz dir vor jeder Denk-Mission eine Entscheidungsfrist — und starte eine zweite Runde nur, wenn du benennen kannst, welche konkrete Information sie liefern soll."},{"title":"Das Vorlagen-Museum","fix":"Miste quartalsweise aus: Was du dreimal in Folge nicht genutzt hast, wird gelöscht — und einmal im Monat läuft eine Analyse bewusst ganz ohne Raster."}]},"WVMI":{"description":"Du gibst der KI ganze Vorhaben statt einzelner Aufgaben — ein offener Auftrag im Chat, und während andere noch am Briefing feilen, hältst du schon ein fertiges Ergebnis in der Hand. Dein Qualitätsgefühl ersetzt die Checkliste: Was überzeugt, geht raus, und was nicht überzeugt, schickst du mit zwei Sätzen zurück in die nächste Runde.","strengths":["Du lieferst an einem Nachmittag, wofür andere eine Projektwoche ansetzen — weil du ganze Arbeitspakete am Stück abgibst statt in Häppchen.","Dein trainiertes Gefühl für „gut genug\" erspart dir Prüfschleifen, die bei den meisten Aufgaben mehr kosten, als sie retten.","Neue Modelle und Werkzeuge machen dich sofort produktiv, weil du keine Vorlagen brauchst, sondern dich im freien Dialog ans Optimum herantastest."],"blindspots":["Überzeugend formulierter Output ist genau die Sorte Fehler, die dein Bauchgefühl passieren lässt — und bei deinem Tempo passiert das in Serie.","Deine besten Läufe sind Einzelstücke: Ohne festgehaltene Muster startest du morgen wieder bei null, und dein Vorsprung bleibt unwiederholbar.","Wer alles am Stück abgibt, verliert schleichend den Kontakt zum eigenen Handwerk — und genau davon lebt das Qualitätsgefühl, dem du vertraust."],"signaturePrompt":"Übernimm das komplette Vorhaben: [Ziel in einem Satz].\nKontext: [2–3 Stichpunkte zu Zielgruppe, Anlass, Format].\nTriff alle Zwischenentscheidungen selbst und protokolliere jede in einer Zeile.\nLiefere das fertige Ergebnis — plus die drei Stellen, an denen du dir am wenigsten sicher bist, damit ich nur dort draufschaue.","promptLibrary":[{"title":"Der Generalauftrag","prompt":"Du übernimmst ab jetzt eigenständig: [Vorhaben in einem Satz].\nRahmen: [Zielgruppe/Anlass], [gewünschtes Format], [Umfang].\nTriff alle Zwischenentscheidungen selbst — frag nur nach, wenn eine Entscheidung das Ergebnis grundlegend verändern würde.\nLiefere am Ende das fertige Ergebnis plus fünf Zeilen: was du entschieden hast und warum."},{"title":"Drei fertige Fassungen","prompt":"Erstelle drei komplett ausgearbeitete Fassungen von [Deliverable]: eine sichere, eine mutige, eine unerwartete.\nKeine Skizzen — jede Fassung muss so fertig sein, dass ich sie direkt verwenden kann.\nSag mir am Ende in zwei Sätzen, welche du nehmen würdest und warum."},{"title":"Die Unsicherheits-Markierung","prompt":"Liefere [Aufgabe] fertig aus — und markiere direkt im Text die drei Stellen, bei denen du dir am wenigsten sicher bist, im Format [FRAGLICH: Grund].\nAlles Unmarkierte übernehme ich ungeprüft, also markiere ehrlich."},{"title":"Vom Braindump zum Ergebnis","prompt":"Hier ist mein ungeordneter Gedankenstrom: [Braindump, ruhig chaotisch].\nMach daraus ohne Rückfragen ein fertiges [Format: Konzept / Mail / Entscheidungsvorlage].\nWas fehlt, ergänze plausibel und kennzeichne es mit [ANNAHME]."},{"title":"Der Nachtzug","prompt":"Arbeite folgende Kette selbstständig ab: Recherchiere [Thema], destilliere die fünf tragfähigsten Erkenntnisse und baue daraus [Deliverable] für [Zielgruppe].\nZeig mir keine Zwischenstände — ich will nur das Endergebnis sehen, mit einer Quellenliste am Schluss."},{"title":"Eine Stufe weiter","prompt":"Nimm dieses Ergebnis: [Ergebnis einfügen].\nEs ist gut — aber dreh es eine Stufe weiter: überraschender, schärfer, eigenständiger.\nErhalte, was funktioniert, und riskiere etwas an der bravsten Stelle."},{"title":"Der Stellvertreter","prompt":"Hier sind drei Texte von mir: [Beispiele einfügen]. Ab jetzt schreibst du in dieser Stimme.\nErste Aufgabe: [Mail / Antwort / Post] zu [Anlass] — versandfertig, ohne Erklärungen drumherum."},{"title":"Beute sichern","prompt":"Dieser Chatverlauf hat ein richtig gutes Ergebnis produziert.\nDestilliere in maximal acht Zeilen: welcher Auftrag, welche Wendung, welches Muster den Unterschied gemacht hat — so, dass ich es beim nächsten Mal in 30 Sekunden wieder abrufen kann."},{"title":"Serienproduktion","prompt":"Produziere in einem Durchgang [Anzahl] Stück [Format, z. B. LinkedIn-Posts / Produkttexte / FAQ-Antworten] zu [Thema].\nJedes Stück eigenständig verwendbar, keine zwei mit derselben Eröffnung.\nSortiere am Ende: das stärkste zuerst."},{"title":"Der 60-Sekunden-Check","prompt":"Bevor ich das rausschicke: Lies [Ergebnis] wie mein kritischster Empfänger.\nNenne mir genau den EINEN Punkt, der mich blamieren könnte — Zahl, Behauptung oder Ton.\nWenn es keinen gibt, sag nur: freigegeben."},{"title":"Kurskorrektur im Flug","prompt":"Behalte alles bei, was du gerade gebaut hast — ändere nur eines: [gewünschte Änderung].\nLiefere direkt die vollständige neue Fassung, nicht die Änderung als Beschreibung."},{"title":"Der Erkunder","prompt":"Ich habe nur eine vage Ahnung: [halbfertige Idee in 1–2 Sätzen].\nStell mir maximal drei präzise Fragen — und bau danach sofort einen ersten kompletten Wurf, statt weiter zu fragen."},{"title":"Entscheidung mit Ansage","prompt":"Ich muss zwischen [Option A] und [Option B] entscheiden und will nicht lange abwägen.\nEntscheide du: klare Empfehlung im ersten Satz, drei Zeilen Begründung, ein Satz dazu, wann ich die Entscheidung revidieren sollte."},{"title":"Das fehlende Drittel","prompt":"Hier ist ein angefangenes Stück: [Fragment einfügen].\nVollende es in meinem Duktus zu einem fertigen [Format] — und zwar so, dass niemand die Naht findet."}],"delegate":["Erstfassungen jeder Art, vom Konzept bis zur Kundenmail — deine Stärke liegt im Auslösen und Annehmen, nicht im Tippen.","Mehrstufige Recherche-und-Aufbereitungs-Ketten, die nebenher oder über Nacht laufen können.","Serienarbeit: Varianten, Anpassungen, Übersetzungen und Formatwechsel desselben Inhalts.","Routinekorrespondenz und Statusberichte auf Basis weniger Stichpunkte.","Den ersten Qualitätscheck — lass die KI ihre eigenen schwächsten Stellen markieren, bevor du überhaupt draufschaust."],"keep":["Die Endabnahme bei allem mit Zahlen, Namen und rechtlicher Wirkung — hier ist Bauchgefühl kein zulässiges Prüfverfahren.","Aussagen, die unter deinem Namen an wichtige Empfänger gehen: Vorstand, Kundin, Öffentlichkeit.","Regelmäßige Eigenleistung in deinem Kernhandwerk — dein Qualitätsgefühl ist nur so gut wie dein letzter eigener Kontakt mit der Materie.","Die Richtungsentscheidung, was überhaupt produziert wird und wofür — Tempo ist wertlos in die falsche Richtung.","Beziehungsheikle Kommunikation: Absagen, Kritik, Verhandlungen."],"workflows":[{"name":"Der Über-Nacht-Auftrag","steps":["Formuliere das Vorhaben in einem Satz plus drei Stichpunkte Kontext — mehr Briefing braucht es nicht.","Gib den Generalauftrag mit dem Zusatz, alle Zwischenentscheidungen selbst zu treffen und in je einer Zeile zu protokollieren.","Lass die KI das fertige Ergebnis plus ihre drei unsichersten Stellen liefern.","Prüfe nur die markierten Stellen und das Entscheidungsprotokoll — den Rest nimmst du an.","Lass dir in fünf Zeilen destillieren, was am Auftrag funktioniert hat, und leg es für den nächsten Lauf ab."]},{"name":"Die Drei-Fassungen-Entscheidung","steps":["Bestelle drei fertige Fassungen: sicher, mutig, unerwartet — jede direkt verwendbar.","Wähle in unter fünf Minuten per Bauchgefühl — genau dafür ist es da.","Lass die Gewinnerfassung in einer Runde nachschärfen: eine Änderung, komplette Neufassung.","Versende — und leg die zwei Verliererfassungen als Rohstoff für später ab."]},{"name":"Der Serienlauf mit Stichprobe","steps":["Definiere das Format anhand eines gelungenen Beispiels statt einer Vorlage.","Lass die ganze Serie in einem Durchgang produzieren, stärkstes Stück zuerst sortiert.","Zieh zwei Zufallsstichproben und prüfe nur diese gründlich.","Sind beide sauber, geht die Serie raus; ist eine faul, dreht die ganze Serie eine Korrekturrunde."]}],"antiPatterns":[{"title":"Blindflug mit Ansage","fix":"Führe eine Zwei-Klassen-Regel ein: Alles mit Zahlen, Namen oder Außenwirkung bekommt den 60-Sekunden-Check durch die KI selbst („Nenne den einen Punkt, der mich blamiert\") — alles andere darf im Vertrauensmodus weiterlaufen."},{"title":"Jeden Tag ein neues Rad","fix":"Bau keine Vorlagen — dabei bleibst du ohnehin nicht. Lass stattdessen nach jedem starken Lauf die KI ein Acht-Zeilen-Destillat schreiben und sammle alle in einer einzigen Notiz: Wiederverwendung per Copy-Paste statt per System."},{"title":"Output-Rausch","fix":"Stell dir vor jedem Generalauftrag eine Frage: Wer braucht das, und was ändert es? Ohne Antwort ist es Beschäftigung — dann lieber gar nicht starten als schnell."}]},"WVDA":{"description":"Du übergibst der KI keine Häppchen, sondern ganze Denkaufträge — eine Strategie durchdenken, ein Feld kartieren, eine Entscheidung strukturieren — und lässt sie dabei mehrere Schritte am Stück laufen. Weil deine Aufträge auf erprobten Vorlagen ruhen, kannst du dem Ergebnis meist direkt vertrauen und deine Energie dort einsetzen, wo sie hingehört: beim großen Bild.","strengths":["Du holst aus einer einzigen Sitzung Denkarbeit heraus, für die andere eine Woche Meetings brauchen — weil du ganze Aufträge statt Einzelfragen übergibst.","Deine Vorlagen machen gutes Denken wiederholbar: Was einmal funktioniert hat, funktioniert bei dir wieder — auf Knopfdruck.","Du verlierst keine Energie im Kleinklein der Nachkontrolle und hältst den Kopf frei für die Frage, die wirklich zählt."],"blindspots":["Ein plausibel klingender, aber schief gebauter Gedankengang läuft bei dir ungeprüft durch mehrere Folgeschritte — der Fehler vererbt sich durch die ganze Kette.","Deine bewährten Vorlagen liefern dir immer die Struktur, die du vorgegeben hast — und machen dich blind für die Antwort, die daneben liegt.","Gut sortierte Argumente fühlen sich für dich wie geprüfte an: Eloquenz kann bei dir unbemerkt zum Ersatz für Evidenz werden."],"signaturePrompt":"Übernimm die Rolle meines Strategie-Sparringspartners für [Vorhaben].\nArbeite selbstständig in vier Schritten: Kartiere das Umfeld, benenne die drei wichtigsten Hebel, entwerfe pro Hebel eine Stoßrichtung und destilliere alles zu einer Ein-Seiten-Strategie mit klarer Empfehlung.\nTriff unterwegs eigene Annahmen und markiere sie ausdrücklich — Rückfragen erst am Ende, maximal drei.","promptLibrary":[{"title":"Der Delegations-Brief","prompt":"Du übernimmst folgende Aufgabe komplett und selbstständig: [Aufgabe in einem Satz].\nKontext: [2–3 Sätze Hintergrund].\nLeitplanken: [was feststeht, was tabu ist].\nEndformat: [z. B. Ein-Seiten-Memo mit Empfehlung].\nTriff unterwegs eigene Annahmen und kennzeichne sie ausdrücklich als solche. Stell mir erst am Ende maximal drei Rückfragen."},{"title":"Feld kartieren","prompt":"Kartiere für mich das Feld [Thema/Markt/Debatte] in einem Durchlauf:\nWer sind die relevanten Akteure, welche Positionen gibt es, wo verlaufen die echten Konfliktlinien, was wird überschätzt, was übersehen?\nErgebnis: eine Landkarte in fünf Abschnitten plus die eine Einsicht, die meine Sicht auf [mein Vorhaben] am stärksten verändern sollte."},{"title":"Entscheidung strukturieren","prompt":"Ich stehe vor dieser Entscheidung: [Entscheidung].\nBaue selbstständig einen Entscheidungsrahmen: die 3–5 Kriterien, die wirklich zählen (mit Gewichtung und Begründung), die realistischen Optionen, eine bewertete Matrix und eine klare Empfehlung samt dem stärksten Gegenargument.\nFrag nicht zwischendurch — liefere den kompletten Rahmen, ich entscheide dann."},{"title":"Drei Horizonte","prompt":"Denke [Vorhaben/Bereich] auf drei Horizonten durch:\nHorizont 1 — was in drei Monaten stehen muss. Horizont 2 — was sich in einem Jahr verändert haben soll. Horizont 3 — wohin das in drei Jahren führen kann.\nPro Horizont: das Ziel in einem Satz, die zwei wichtigsten Hebel und die eine Weiche, die jetzt gestellt werden muss."},{"title":"Perspektiven-Rat einberufen","prompt":"Berufe einen Rat aus drei Perspektiven zu meiner Frage ein: [Frage].\nBesetzung: [z. B. eine erfahrene Praktikerin, ein skeptischer Ökonom, eine typische Nutzerin].\nLass jede Stimme ihr stärkstes Argument machen und benenne dann die Punkte, an denen sie einander wirklich widersprechen.\nSchließe mit deiner Synthese: Was würde ein kluger Mensch aus allen dreien machen?"},{"title":"Vom Nebel zur Landkarte","prompt":"Hier sind meine ungeordneten Gedanken zu [Thema]: [Notizen einfügen].\nFinde die Struktur, die darin schon angelegt ist — erfinde keine fremde. Benenne die 3–4 tragenden Ideen, ordne alles Übrige darunter und markiere Lücken und Widersprüche.\nErgebnis: eine Gliederung, mit der ich sofort weiterdenken kann."},{"title":"Rückwärts vom Ziel","prompt":"Endzustand: [wie die Welt aussieht, wenn mein Vorhaben gelungen ist — 2–3 Sätze].\nArbeite dich rückwärts: Welche 4–5 Zwischenzustände müssen vorher erreicht sein, was ist jeweils die kritische Bedingung, und welcher erste Schritt folgt daraus für die kommenden zwei Wochen?\nFormat: Zeitstrahl von hinten nach vorn, am Ende der eine nächste Schritt."},{"title":"Ein-Seiten-Synthese","prompt":"Hier ist umfangreiches Material zu [Thema]: [Texte/Dokumente einfügen].\nDestilliere es auf genau eine Seite für jemanden, der in zehn Minuten entscheiden muss: Kernaussage in einem Satz, drei tragende Argumente, die eine offene Frage, eine Empfehlung.\nAlles, was diese Entscheidung nicht braucht, fliegt raus."},{"title":"Stichprobe statt Korrektur","prompt":"Du hast mir gerade [Ergebnis] geliefert. Bevor ich es übernehme:\nNenne die drei Behauptungen darin, auf denen am meisten Gewicht liegt — die Stellen, an denen das Ganze kippt, wenn sie falsch sind.\nSag zu jeder ehrlich, wie sicher du bist und woran ich sie in unter fünf Minuten selbst prüfen kann."},{"title":"Denk-Vorlage aus einer guten Session","prompt":"Diese Unterhaltung hat ungewöhnlich gut funktioniert.\nDestilliere daraus eine wiederverwendbare Vorlage: Was war die Struktur meines Auftrags, welche Angaben haben den Unterschied gemacht, was sollte beim nächsten Mal von Anfang an dabei sein?\nFormuliere die Vorlage als fertigen Prompt mit [Platzhaltern], den ich abspeichern kann."},{"title":"Projekt-Betriebssystem","prompt":"Erstelle ein Standing-Briefing für alle künftigen Gespräche zu [Projekt]:\nZiel und Zielgruppe, meine Rolle, Tonalität, was als Qualität gilt, was du nie tun sollst und in welchem Format ich Ergebnisse will.\nMaximal 15 Zeilen — ich stelle es künftig jedem Auftrag zu diesem Projekt voran."},{"title":"Szenarien durchspielen","prompt":"Nimm meinen Plan: [Plan in 3–5 Sätzen].\nSpiele drei Zukünfte selbstständig durch: die erwartbare, die unbequem gute (der Erfolg überrollt uns) und die unbequem schlechte (die zentrale Annahme kippt).\nPro Szenario: Was passiert konkret, woran merken wir früh, dass wir drin sind, und welche Vorkehrung lohnt sich schon heute?"},{"title":"Der stärkste Einwand","prompt":"Hier ist die Strategie, von der ich überzeugt bin: [Strategie].\nGib mir nicht zehn Einwände — gib mir den einen, der sie wirklich gefährdet: das Argument, das die klügste Kritikerin im Raum machen würde.\nDann sag mir, ob und wie die Strategie ihn übersteht."},{"title":"Vorlagen-Inventur","prompt":"Hier sind meine gespeicherten Prompts und Vorlagen: [Liste einfügen].\nPrüfe sie wie ein Werkzeugmacher: Welche sind veraltet, welche überschneiden sich, und wo fehlt eine für Aufgaben, die ich offenbar oft habe?\nLiefere die bereinigte Bibliothek in drei Spalten: behalten, verbessern (mit konkretem Vorschlag), streichen."}],"delegate":["Erste vollständige Entwürfe von Strategiepapieren, Konzepten und Entscheidungsmemos","Feldkartierungen in einem Durchlauf: Markt, Wettbewerb, Forschungsstand oder Debattenlage","Das Strukturieren von rohem Material — Notizen, Transkripte, Brainstorms — zu belastbaren Gliederungen","Szenarien, Gegenpositionen und Was-wäre-wenn-Ketten mehrstufig durchspielen","Die Pflege deiner Prompt-Bibliothek: Vorlagen verbessern, verdichten, ausmisten"],"keep":["Die Problemdefinition — welche Frage überhaupt auf den Tisch kommt, entscheidet über alles danach","Den Faktencheck der zwei, drei tragenden Zahlen und Behauptungen, bevor etwas das Haus verlässt","Die finale Entscheidung samt ihrer Begründung gegenüber Team, Kundschaft oder Vorgesetzten","Das Urteil, wann ein Rahmen fertig gedacht ist und die Umsetzung beginnen muss","Gespräche, in denen Vertrauen und Politik mitschwingen — dort zählt deine Stimme, nicht deine Vorlage"],"workflows":[{"name":"Strategie-Sprint in 90 Minuten","steps":["Formuliere Ziel, Kontext und drei Leitplanken als Delegations-Brief","Lass die KI selbstständig kartieren, Hebel ableiten und eine Empfehlung bauen","Prüfe nur die drei tragenden Behauptungen — nicht den ganzen Text","Destilliere das Ergebnis auf eine Seite und triff die Entscheidung selbst","Speichere den Auftrag als Vorlage, wenn er gut funktioniert hat"]},{"name":"Entscheidung in einer Stunde","steps":["Beschreibe die Entscheidung und was ein gutes Ergebnis auszeichnet","Lass Kriterien, Optionen und eine bewertete Matrix in einem Durchlauf bauen","Fordere den einen stärksten Einwand gegen die Favoriten-Option an","Entscheide selbst und halte die Begründung in drei Sätzen fest"]},{"name":"Vorlagen-Werkstatt, einmal im Quartal","steps":["Sammle die fünf besten KI-Sessions der letzten Wochen","Lass die KI daraus die wiederkehrenden Erfolgsmuster extrahieren","Baue diese Muster in deine bestehenden Vorlagen ein","Streiche jede Vorlage, die du zweimal in Folge nicht genutzt hast"]}],"antiPatterns":[{"title":"Der Durchwinker","fix":"Führe eine feste Stichproben-Regel ein: Pro Autopilot-Lauf verifizierst du selbst die drei Behauptungen, auf denen das Ergebnis ruht — nie mehr, aber auch nie weniger."},{"title":"Das Vorlagen-Korsett","fix":"Starte jede fünfte Denkaufgabe bewusst ohne Vorlage und lass die KI den Rahmen vorschlagen — was dabei Neues entsteht, wandert zurück in deine Bibliothek."},{"title":"Der ewige Rahmen","fix":"Gib jeder Denk-Session vorab einen Liefergegenstand — ein Memo, eine Entscheidung, einen ersten Schritt — und beende sie erst, wenn er existiert."}]},"WPMI":{"description":"Du übergibst der KI komplette Aufgaben im spontanen Zuruf — Bericht, Auswertung, Konzept, was gerade hereinkommt — und lässt sie in mehreren Schritten bis zum fertigen Ergebnis durchlaufen. Verwendet wird davon aber nichts, bevor Zahlen, Quellen und Fakten deine Prüfung bestanden haben: Dich treibt Durchsatz, der auch kritischen Nachfragen standhält.","strengths":["Du holst aus der KI fertige Ergebnisse in Serie, weil du ganze Aufgaben am Stück übergibst, statt jeden Zwischenschritt selbst zu verwalten.","Dein Tempo ist belastbar: Was deine Prüfung passiert hat, übersteht auch die skeptische Rückfrage im Meeting.","Du brauchst keine Anlaufzeit — ohne Vorlagen und feste Abläufe bist du bei einer völlig neuen Aufgabenart genauso schnell wie bei der hundertsten."],"blindspots":["Weil du die KI lange autonom laufen lässt, prüfst du oft erst ganz am Ende — ein früher Fehler in der Recherche hat sich dann schon durch das gesamte Ergebnis gezogen.","Deine besten Prompts entstehen spontan und verschwinden mit dem Chatverlauf: Was gestern hervorragend funktioniert hat, erfindest du morgen mühsam neu.","Du produzierst schneller, als du klärst — die Fakten stimmen am Ende, aber ob es das richtige Ergebnis für das eigentliche Problem war, prüfst du selten."],"signaturePrompt":"Übernimm diese Aufgabe komplett: [Aufgabe in 1–2 Sätzen, z. B. „Mach aus diesen Notizen ein Entscheidungspapier für die Geschäftsführung\"].\nArbeite selbstständig in mehreren Schritten bis zum fertigen Ergebnis im Format [Zielformat].\nHänge am Ende einen Prüfanhang an: jede Zahl, jede Quelle und jede Annahme, die ich vor der Verwendung verifizieren sollte — sortiert nach Risiko.","promptLibrary":[{"title":"Komplettauftrag mit Prüfanhang","prompt":"Erledige diese Aufgabe vollständig und selbstständig: [Aufgabe]. Kontext: [2–3 Sätze]. Gewünschtes Endformat: [z. B. fertiger Text / Tabelle / Foliengerüst].\nHänge am Ende einen Prüfanhang an: alle Fakten, Zahlen und Quellen, die ich verifizieren sollte — jeweils mit deiner Einschätzung, wie sicher du dir bist."},{"title":"Zwischenlandung einbauen","prompt":"Übernimm diese mehrstufige Aufgabe: [Aufgabe]. Arbeite selbstständig, aber stoppe nach [erstem Meilenstein, z. B. der Recherche / der Gliederung] und zeig mir eine kompakte Zwischenbilanz: was du gefunden hast, worauf du dich stützt, wie du weitermachen willst. Erst nach meinem Okay produzierst du das fertige Ergebnis."},{"title":"Selbst-Faktencheck","prompt":"Hier ist dein eigener Output: [Output einfügen]. Geh ihn als strenger Faktenprüfer durch. Markiere jede überprüfbare Behauptung und ordne sie ein: sicher belegbar / plausibel, aber ungeprüft / potenziell falsch. Nenne bei den letzten beiden Kategorien, wie ich es in unter zwei Minuten selbst nachprüfen kann."},{"title":"Zahlen-Audit","prompt":"Prüfe alle Zahlen in diesem Dokument: [Text oder Tabelle einfügen]. Rechne jede Berechnung nach, prüfe Summen, Prozentwerte und Bezüge zwischen den Zahlen auf Konsistenz. Liste jede Auffälligkeit mit Fundstelle und deiner Korrekturempfehlung."},{"title":"Red-Team vor dem Versand","prompt":"Du bist [kritischste Empfängerin des Dokuments, z. B. eine skeptische Bereichsleiterin]. Hier ist mein fertiges Ergebnis: [einfügen]. Greif es an: Wo sind die schwächsten Stellen, welche Zahl würdest du zuerst anzweifeln, welche Frage bringt mich in Erklärungsnot? Danach: die drei Änderungen mit dem größten Effekt."},{"title":"Drei Fassungen, eine Empfehlung","prompt":"Erstelle drei deutlich unterschiedliche fertige Fassungen von [Aufgabe, z. B. dieser Management-Zusammenfassung]: eine nüchtern-knappe, eine argumentativ-ausführliche, eine zugespitzte. Sag mir danach, welche du für [Zielgruppe/Anlass] empfiehlst — und was du aus den anderen beiden hineinnehmen würdest."},{"title":"Rohmaterial zu Ergebnis","prompt":"Hier ist unsortiertes Rohmaterial: [Notizen, Stichpunkte, Chatverlauf einfügen]. Mach daraus in einem Durchgang ein fertiges [Zielformat, z. B. Entscheidungsmemo mit Empfehlung]. Was im Material fehlt oder sich widerspricht, löst du nicht stillschweigend — sammle es in einem Block „Offene Punkte\" am Ende."},{"title":"Schnellster Weg zum fertigen Stück","prompt":"Ich brauche bis [Zeitpunkt] ein fertiges [Ergebnis]. Schlag mir zuerst in drei Sätzen den schnellsten sinnvollen Weg dorthin vor: was du übernimmst, was du von mir brauchst, was wir bewusst weglassen. Wenn ich zustimme, legst du sofort los und arbeitest bis zum Ende durch."},{"title":"Fremdes Terrain, eigene Prüfkompetenz","prompt":"Ich lasse dich gleich eine Aufgabe in einem Feld erledigen, das ich nur oberflächlich kenne: [Feld, z. B. Datenschutzrecht]. Bevor du loslegst: Was sind die fünf Punkte, an denen Laien-Ergebnisse in diesem Feld typischerweise scheitern? Ich will wissen, worauf ich deinen Output nachher prüfen muss."},{"title":"Widerspruchsjagd","prompt":"Durchsuche dieses lange Dokument nach inneren Widersprüchen: [einfügen]. Wo widersprechen sich Aussagen, Zahlen oder Begriffe zwischen Anfang und Ende? Wo hat sich eine Annahme unterwegs stillschweigend geändert? Liste jeden Fund mit beiden Fundstellen."},{"title":"Stichproben statt Volltextprüfung","prompt":"Ich habe keine Zeit, dieses Ergebnis komplett zu prüfen: [einfügen]. Wähl die fünf Stellen aus, an denen ein Fehler am wahrscheinlichsten UND am teuersten wäre — mit kurzer Begründung der Auswahl. Nur diese fünf prüfe ich selbst."},{"title":"Drei Fragen vor dem Losrennen","prompt":"Bevor du diese Aufgabe übernimmst — [Aufgabe] —, stell mir die drei Fragen, deren Antworten das Ergebnis am stärksten verändern würden. Keine Verständnisfragen, sondern Weichenstellungen. Danach arbeitest du ohne weitere Rückfragen bis zum fertigen Ergebnis durch."},{"title":"Was hat funktioniert?","prompt":"Das Ergebnis aus diesem Chat war ungewöhnlich gut. Destilliere aus unserem Verlauf, was den Unterschied gemacht hat: Welche meiner Angaben, Formulierungen oder Kurskorrekturen waren entscheidend? Fass es in 3–5 Zeilen zusammen, die ich beim nächsten ähnlichen Auftrag als Startpunkt einfügen kann."},{"title":"Update-Durchlauf","prompt":"Hier ist ein fertiges Ergebnis von [letzter Woche / früherem Stand]: [einfügen]. Hier sind die neuen Informationen: [einfügen]. Arbeite alles Neue ein und liefere die aktualisierte Fassung komplett. Markiere separat, welche Aussagen sich geändert haben und welche alten Zahlen jetzt nicht mehr stimmen."}],"delegate":["Komplette Erstfassungen — vom Bericht bis zum Foliengerüst — inklusive der Recherche dafür","Mehrstufige Aufträge wie „recherchieren, verdichten, in eine Empfehlung gießen\" am Stück","Formatwechsel in Serie: aus Notizen eine Tabelle, aus der Tabelle ein Memo, aus dem Memo eine Mail","Den ersten Prüfdurchgang — Rechen-, Konsistenz- und Vollständigkeitschecks als Vorfilter vor deiner eigenen Prüfung","Die Anpassung fertiger Stücke an neue Zielgruppen, Längen und Anlässe"],"keep":["Die Klärung, was eigentlich gebraucht wird — ein perfekt geprüftes Ergebnis auf die falsche Frage bleibt wertlos","Die finale Faktenfreigabe bei allem, was deinen Namen nach außen trägt","Die Auswahl, welche deiner vielen fertigen Outputs es tatsächlich in die Welt schaffen — Durchsatz ist keine Priorisierung","Kommunikation mit Konfliktpotenzial: Absagen, Kritik, Verhandlungen","Den Aufbau eigener Urteilsfähigkeit in Feldern, in denen du KI-Output bisher nicht beurteilen kannst"],"workflows":[{"name":"Der Ein-Rutsch-Auftrag","steps":["Aufgabe in drei Sätzen übergeben: Ziel, Kontext, gewünschtes Endformat","Die KI ohne Zwischenrufe mehrstufig bis zum fertigen Ergebnis arbeiten lassen","Zuerst den mitbestellten Prüfanhang lesen: Zahlen, Quellen und Annahmen nach Risiko sortiert","Die drei riskantesten Punkte selbst verifizieren statt alles flächendeckend zu lesen","Korrekturen gesammelt in einer Rückmeldung geben und die Endfassung freigeben"]},{"name":"Die Zwischenlandung","steps":["Vor dem Start benennen, wo der riskanteste Punkt der Aufgabe liegt — meist die Recherche- oder Datenbasis","Den Autopilot-Auftrag mit eingebautem Stopp genau an dieser Stelle formulieren","Die Zwischenbilanz prüfen, bevor ein einziger Absatz Endprodukt existiert","Erst nach Freigabe der Basis den Rest in einem Zug fertig produzieren lassen"]},{"name":"Die Fünf-Minuten-Konserve","steps":["Nach einem ungewöhnlich guten Ergebnis den Chat nicht einfach schließen","Die KI destillieren lassen, welche Angaben und Wendungen den Unterschied gemacht haben","Das Destillat als Textbaustein in einer einzigen Notizdatei ablegen — ohne System, chronologisch reicht","Beim nächsten ähnlichen Auftrag den Baustein einfügen und frei weiterimprovisieren"]}],"antiPatterns":[{"title":"Prüfstau nach dem Autopilot","fix":"Bestell die Prüfung gleich mit: Jeder lange Auftrag endet mit einer nach Risiko sortierten Liste der heiklen Stellen — du verifizierst gezielt die Top drei, statt zwanzig Seiten am Stück gegenzulesen."},{"title":"Jeden Tag bei null anfangen","fix":"Lass dir nach jedem starken Ergebnis in 3–5 Zeilen destillieren, was den Unterschied gemacht hat, und sammle diese Bausteine in einer einzigen Notiz — kein System nötig, die Suchfunktion reicht."},{"title":"Fertig, aber am Ziel vorbei","fix":"Erzwinge vor jedem größeren Auftrag eine Weichenstellung: Die KI stellt dir erst die drei Fragen, deren Antworten das Ergebnis am stärksten verändern würden — dann erst schaltest du den Autopiloten ein."}]},"WVDI":{"description":"Du wirfst der KI ganze, offene Fragen hin und lässt sie frei laufen — nicht, um Texte zu bekommen, sondern um zu sehen, welche Gedanken bei der Reaktion entstehen. Dich treibt der Moment, in dem sich zwei Ideen verbinden, die vorher nichts voneinander wussten; feste Vorlagen und Prüfschleifen würden diesen Moment nur stören.","strengths":["Du erschließt Denkräume, die planvolle Nutzer nie betreten, weil du der KI erlaubst, Wege zu gehen, die du nicht vorgezeichnet hast.","Deine Ideenfrequenz ist enorm: Ohne Prüfschleifen und Vorlagen-Reibung kommst du in einer Stunde durch mehr Perspektiven als andere in einer Woche.","Du nutzt die KI dort, wo sie am stärksten ist — als Sparringspartner, der ganze Gedankengänge selbstständig zu Ende denkt, während du nur die Funken einsammelst."],"blindspots":["Eine elegant begründete, aber falsche Gedankenkette segelt bei dir ungeprüft durch — gerade bei Denkarbeit sieht man dem Ergebnis den Fehler nicht an.","Deine besten Einsichten verdunsten im Chatverlauf: Ohne feste Ablage-Routine beginnt jede Session wieder bei null.","Du verwechselst manchmal die Aufregung des Explorierens mit Fortschritt — aus zehn brillanten Denkläufen wird kein einziges fertiges Ergebnis."],"signaturePrompt":"Ich denke über [Thema oder Entscheidung] nach und habe bewusst noch keine Richtung.\nZerlege die Frage und denk sie aus drei Disziplinen durch, die nichts mit [mein Feld] zu tun haben.\nVerschmelze die Perspektiven zu zwei Thesen, die ich so noch nicht gedacht habe.\nLauf frei durch alle Schritte — ich steige erst ein, wenn du fertig bist.\nSag mir am Ende, welche These dich selbst am meisten überrascht hat.","promptLibrary":[{"title":"Der Gedanken-Autopilot","prompt":"Hier ist eine offene Frage, die mich beschäftigt: [Frage].\nArbeite sie komplett selbstständig durch: Zerlege sie in ihre Teilfragen, beantworte jede aus einer anderen Perspektive, verbinde die Antworten zu einer Gesamtsicht und ende mit den drei Gedanken, die am meisten Sprengkraft haben.\nFrag nicht zwischendurch nach — triff alle Annahmen selbst und leg sie am Ende offen."},{"title":"Die Reaktionskammer","prompt":"Nimm [Konzept A] und [Konzept B] — zwei Dinge, die nichts miteinander zu tun haben.\nKreuze sie auf fünf verschiedene Arten und beschreibe, was bei jeder Kreuzung entsteht.\nWähle dann selbst die fruchtbarste Verbindung aus und denk sie drei Schritte weiter, als ich es erwarten würde."},{"title":"Drei fremde Brillen","prompt":"Ich hänge bei [Problem] fest, weil ich es immer aus derselben Richtung anschaue.\nDenk es nacheinander durch die Brille einer Evolutionsbiologin, eines Jazzmusikers und einer Städteplanerin durch.\nSag mir danach, welche Brille das Problem am stärksten verändert hat — und was ich von dort aus übersehe."},{"title":"Der Serendipitäts-Spaziergang","prompt":"Ich will über [Thema] nachdenken, aber nicht auf dem direkten Weg.\nFühr mich in fünf Stationen durch Nachbargebiete, die nur entfernt damit zu tun haben — bei jeder Station eine überraschende Verbindung zurück zu meinem Thema.\nWähle die Route selbst; je unwahrscheinlicher, desto besser."},{"title":"Lautes Denken zu zweit","prompt":"Ich denke jetzt einfach laut über [Thema] — unsortiert, in Fragmenten.\nDeine Rolle: Denk quer statt mit. Wirf nach jedem meiner Gedanken einen ein, den ich nicht kommen sehe — eine Analogie, einen Widerspruch, eine absurde Konsequenz.\nKeine Zusammenfassungen, kein Ordnen. Erst wenn ich „Destillat“ sage, sammelst du ein."},{"title":"Der Analogie-Reaktor","prompt":"Mein eigentliches Problem: [Problem in einem Satz].\nErkläre mir dieses Problem durch fünf Analogien aus komplett anderen Welten — Küche, Sport, Chemie, Geschichte, was immer trägt.\nSag dann, welche Analogie am tragfähigsten ist, und leite aus ihr eine Lösung ab, die im Original-Problem funktionieren würde."},{"title":"Die Umkehrung","prompt":"Meine Grundannahme bei [Thema] lautet: [Annahme].\nDreh sie um und bau die Welt, in der das Gegenteil stimmt: Was wäre dann klug, was wäre dumm, wer würde gewinnen?\nLauf so weit, bis die Umkehrung entweder zusammenbricht oder interessanter wird als das Original — und sag mir ehrlich, welches von beidem passiert ist."},{"title":"Das Perspektiven-Karussell","prompt":"Lass drei Stimmen über [meine Idee oder These] debattieren: eine glühende Verfechterin, einen gelangweilten Skeptiker, dem das alles zu klein gedacht ist, und jemanden aus dem Jahr 2036, der zurückblickt.\nSchreib die Debatte als echten Schlagabtausch, nicht als höfliche Aufzählung.\nAm Ende: Welcher einzelne Satz aus der Debatte verdient es, weitergedacht zu werden?"},{"title":"Der Zufallskatalysator","prompt":"Wir denken über [Thema] nach und drehen uns im Kreis.\nWirf einen zufälligen Katalysator in die Mischung: ein Konzept aus einem Feld, das ich nicht erwarte.\nZeig, was die Reaktion mit meinem Thema macht — und wenn nichts Brauchbares entsteht, wirf den nächsten, bis es zündet."},{"title":"Die Nachtschicht","prompt":"Hier ist ein ganzer Denkauftrag, den du ohne mich durchziehst: [offene Frage oder Entscheidungssituation, gern mit Kontext].\nEntwickle mindestens drei grundverschiedene Sichtweisen, lass sie gegeneinander antreten und komm zu einem begründeten Standpunkt.\nLiefere mir ein Memo von einer Seite: dein Standpunkt, die stärkste Gegenposition und der eine Punkt, der mich überraschen wird."},{"title":"Das Destillat","prompt":"Wir haben gerade weit ausgeholt. Jetzt destillier:\nDie drei tragfähigsten Gedanken dieser Session, je in einem Satz, den ich in einem Monat noch verstehe.\nDazu die eine Annahme, auf der alles ruht — und der eine nächste Schritt, der aus dem Denken etwas Reales macht."},{"title":"Der eine Riss","prompt":"Du hast mich gerade überzeugt — genau deshalb: Zeig mir die eine Stelle, an der deine Argumentation am dünnsten ist.\nNicht fünf Einwände, nur den einen Riss, der das Ganze zum Einsturz bringen könnte, wenn er sich weitet.\nSag mir auch, wie ich in zwei Minuten selbst prüfen kann, ob er real ist."},{"title":"Die Landebahn","prompt":"Genug exploriert. Nimm alles, was in diesem Gespräch entstanden ist, und bau daraus eine Entscheidungsvorlage:\nWorum es geht, die zwei besten Optionen, deine klare Empfehlung mit Begründung — auf maximal einer halben Seite.\nFormuliere so, dass ich sie heute noch an [Person oder Team] schicken könnte."}],"delegate":["Das selbstständige Zu-Ende-Denken offener Fragen — ganze Läufe mit Zerlegung, Perspektivwechsel und Synthese am Stück","Vorstöße in fremde Wissensgebiete, aus denen du Analogien und Rohmaterial für neue Verbindungen ziehst","Das Weiterspinnen halbfertiger Ideen in mehrere Richtungen gleichzeitig","Das Ordnen und Verdichten deiner ausufernden Gedanken zu klaren Destillaten","Erste Fassungen von Memos und Entscheidungsvorlagen aus deinem Denkmaterial"],"keep":["Die Wahl der Ausgangsfrage — was überhaupt gedacht wird, bestimmt den Wert des ganzen Laufs","Das letzte Urteil, welche These trägt: Dein Gespür ist dein Kapital, aber es braucht deine bewusste Unterschrift","Die Faktenprüfung bei allem, was den Chat verlässt und andere Menschen erreicht","Das Festhalten deiner besten Einsichten — kein Modell merkt sich, was dir wichtig war","Den Moment der Landung: die Entscheidung, wann genug exploriert ist und etwas Reales entstehen muss"],"workflows":[{"name":"Der freie Lauf mit Landung","steps":["Wirf der KI die Frage als Ganzes hin — unsortiert, mit allem Kontext, ohne Struktur vorzugeben","Lass sie mehrere Schritte selbstständig durchdenken und steige nur dort ein, wo es funkt","Fordere am Ende ein Destillat: drei tragfähige Gedanken, eine tragende Annahme, ein nächster Schritt","Prüfe die tragende Annahme selbst — nur diese eine, dafür wirklich","Sichere das Destillat an einem festen Ort außerhalb des Chats"]},{"name":"Die Reaktionskammer","steps":["Wähle zwei Zutaten, die nichts miteinander zu tun haben: dein Thema und ein fremdes Konzept","Lass die KI fünf Kreuzungen erzeugen und selbst die fruchtbarste auswählen","Vertiefe diese eine Verbindung im freien Dialog, bis eine These in einem Satz steht","Teste die These an einem realen Fall aus deinem Alltag, bevor du sie weitererzählst"]},{"name":"Vom Funken zum Artefakt","steps":["Sammle die Destillate deiner letzten Denkläufe und gib sie der KI als Rohmaterial","Erteile einen Autopilot-Auftrag: daraus eigenständig ein Memo, eine Skizze oder eine Entscheidungsvorlage bauen","Lies nur die Stellen gegen, die dich überraschen — der Rest darf stehen bleiben","Lege ein Datum fest, an dem das Artefakt einen realen Menschen erreicht — und halte es"]}],"antiPatterns":[{"title":"Der elegante Irrtum","fix":"Bevor du eine These übernimmst, die dir gefällt, stell genau eine Frage: „Welche einzelne Annahme müsste falsch sein, damit das kippt?“ — und prüfe diese eine Annahme selbst, zwei Minuten, außerhalb des Chats."},{"title":"Verdunstetes Gold","fix":"Beende jede Denksession mit dem Destillat-Prompt und lege das Ergebnis an einem einzigen festen Ort ab — eine Notizdatei genügt, aber es muss immer dieselbe sein."},{"title":"Die ewige Vorstufe","fix":"Definiere vor jedem Denklauf in einem Satz, was am Ende existieren muss — ein Memo, eine Entscheidung, eine Nachricht an eine reale Person — und starte keinen neuen Lauf, bevor das letzte Ergebnis gelandet ist."}]},"WVMA":{"description":"Du übergibst der KI ganze Aufgabenpakete am Stück — mit gespeicherter Vorlage, klaren Standards und dem Auftrag, bis zum fertigen Ergebnis durchzuarbeiten. Dich treibt nicht das einzelne Dokument, sondern das System dahinter: einmal sauber aufgesetzt, liefert es verlässlich ab, ohne dass du jedes Ergebnis anfassen musst.","strengths":["Du verwandelst wiederkehrende Arbeit in laufende Systeme — was du zweimal gebraucht hast, startet beim dritten Mal mit einem einzigen Satz.","Weil du ganze Aufgaben abgibst und fertigen Ergebnissen vertraust, statt jeden Zwischenschritt zu begleiten, skaliert dein Output weit über deine eigene Arbeitszeit hinaus.","Deine Vorlagen halten das Qualitätsniveau konstant: Das zwanzigste Ergebnis hat denselben Standard wie das erste."],"blindspots":["Ein Fehler in der Vorlage passiert bei dir nicht einmal, sondern in Serie — und weil du Endergebnisse selten prüfst, fällt
