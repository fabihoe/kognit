er oft erst auf, wenn er längst verschickt ist.","Dein Qualitätsgefühl, auf dem dein ganzes Vertrauen ruht, verliert die Kalibrierung, wenn du nur noch dirigierst und das Material nie mehr selbst in der Hand hast.","Du pflegst Systeme manchmal länger, als sie es verdienen: Die Vorlage von vor sechs Monaten läuft noch, obwohl ein neues Modell die Aufgabe längst eleganter lösen würde."],"signaturePrompt":"Übernimm diese Aufgabe komplett selbstständig, ohne Rückfragen zwischendurch: [Aufgabe, z. B. aus den angehängten Notizen ein Entscheidungsmemo für die Geschäftsführung erstellen].\nArbeite in drei Stufen: Rohfassung, Selbstprüfung gegen die Kriterien [Kriterium 1], [Kriterium 2], [Kriterium 3], dann Endfassung.\nZeig mir nur die Endfassung — plus die drei Stellen, an denen du dir am wenigsten sicher warst.\nErstelle danach aus diesem Ablauf eine wiederverwendbare Vorlage, die ich beim nächsten Mal mit einem Satz starten kann.","promptLibrary":[{"title":"Der Komplettauftrag","prompt":"Übernimm diese Aufgabe von Anfang bis Ende, ohne Rückfragen zwischendurch: [Aufgabe, z. B. aus dem beigefügten Kundenfeedback einen Maßnahmenplan erstellen].\nKontext: [relevantes Material einfügen oder anhängen].\nArbeite mehrstufig: erst Struktur, dann Rohfassung, dann Selbstprüfung, dann Endfassung.\nTriff notwendige Annahmen selbst und dokumentiere sie am Ende in maximal fünf Stichpunkten.\nLiefere mir ausschließlich die Endfassung plus die Annahmenliste."},{"title":"Vorlagen-Extraktor","prompt":"Hier ist ein Arbeitsergebnis, mit dem ich sehr zufrieden bin: [Text/Dokument einfügen].\nAnalysiere, was es gut macht: Struktur, Tonalität, Argumentaufbau, Detailtiefe.\nBaue daraus eine wiederverwendbare Prompt-Vorlage mit [Platzhaltern] für die variablen Teile und festen Qualitätskriterien für den Rest.\nDie Vorlage soll so präzise sein, dass sie ohne mein Zutun Ergebnisse auf diesem Niveau produziert."},{"title":"Die Produktionsstraße","prompt":"Aus diesem einen Ausgangsmaterial brauche ich mehrere fertige Formate: [Material einfügen, z. B. Projektbericht].\nErstelle daraus in einem Durchlauf: [Format 1, z. B. eine Management-Summary von 150 Wörtern], [Format 2, z. B. eine E-Mail ans Team], [Format 3, z. B. fünf Stichpunkte für die nächste Präsentation].\nJedes Format eigenständig nutzbar, jeweils im passenden Ton. Keine Zwischenfragen — liefere alle drei am Stück."},{"title":"Serienfertigung","prompt":"Hier ist meine Vorlage: [Vorlage einfügen]. Und hier die Liste der Fälle: [Liste einfügen, z. B. zwölf Produkte mit Eckdaten].\nProduziere für jeden Fall ein fertiges Ergebnis nach der Vorlage — gleiche Struktur, gleiches Qualitätsniveau, aber ohne erkennbare Textbausteine.\nMarkiere am Ende die zwei Fälle, bei denen die Vorlage am schlechtesten gepasst hat, damit ich sie nachschärfen kann."},{"title":"Selbstprüfende Pipeline","prompt":"Erledige folgende Aufgabe komplett: [Aufgabe].\nBevor du mir das Ergebnis zeigst, prüfe es selbst gegen diese Checkliste: [Kriterium 1], [Kriterium 2], [Kriterium 3]. Korrigiere alles, was durchfällt.\nZeig mir dann nur die Endfassung — plus ein Ausnahme-Protokoll: jede Stelle, an der du unsicher warst, eine Annahme getroffen oder eine Quelle nicht verifizieren konntest.\nIst das Protokoll leer, schreib das explizit dazu."},{"title":"Eskalations-Regel","prompt":"Arbeite die folgende Aufgabe selbstständig ab: [Aufgabe mit Kontext].\nUnterbrich mich nur in genau drei Fällen: wenn eine Entscheidung Geld kostet, wenn etwas nach außen geht, oder wenn zwei meiner Qualitätskriterien im Konflikt stehen.\nAlles andere entscheidest du selbst und dokumentierst es in einem Entscheidungslog am Ende."},{"title":"Der Staffelstab","prompt":"Ich will folgenden wiederkehrenden Ablauf als festes System aufsetzen: [Ablauf beschreiben, z. B. aus wöchentlichen Team-Updates einen Statusbericht für die Geschäftsführung machen].\nEntwirf dafür eine mehrstufige Prompt-Kette: Was passiert in jeder Stufe, was ist ihr Input, was ihr Output, wo sind Prüfpunkte sinnvoll?\nFormuliere jede Stufe als fertigen, speicherbaren Prompt. Am Ende soll der ganze Ablauf mit einem einzigen Startbefehl laufen."},{"title":"Haus-Standard","prompt":"Hier sind drei Texte, die genau meinen Ton treffen: [Texte einfügen].\nDestilliere daraus einen Stil-Standard: Satzlänge, Wortwahl, Tonalität, No-Gos — als kompakten Systemprompt, den ich jeder künftigen Aufgabe voranstellen kann.\nTeste ihn direkt: Schreibe [kurze Beispielaufgabe] einmal mit und einmal ohne den Standard, damit ich den Unterschied sehe."},{"title":"System-TÜV","prompt":"Hier ist eine Vorlage, die ich seit [Zeitraum] unverändert nutze: [Vorlage einfügen].\nPrüfe sie kritisch: Welche Anweisungen sind überflüssig geworden? Was würdest du mit heutigen Modellfähigkeiten anders lösen? Wo produziert sie erkennbare Muster, die sich abnutzen?\nLiefere eine überarbeitete Version 2.0 und die drei wichtigsten Änderungen mit Begründung."},{"title":"Das Ausnahme-Dashboard","prompt":"Hier sind meine wiederkehrenden Aufgaben für diese Woche: [Liste, z. B. Statusbericht, zwei Kundenmails, Wettbewerbs-Kurzcheck].\nArbeite alle nacheinander ab, jede nach ihrer Vorlage: [Vorlagen einfügen oder referenzieren].\nLiefere am Ende alles gesammelt in einem Dokument, gegliedert nach Aufgabe — plus eine Ampel pro Ergebnis: grün (kann raus), gelb (eine Stelle ansehen), rot (Entscheidung nötig)."},{"title":"Der Zweitdirigent","prompt":"Ich beschreibe dir, wie ich [wiederkehrende Aufgabe] mit KI erledige: [Ablauf in eigenen Worten schildern].\nVerwandle das in eine saubere Schritt-für-Schritt-Anleitung, die eine Kollegin ohne Vorwissen morgen übernehmen könnte — inklusive der fertigen Prompts für jeden Schritt und der typischen Fehler, auf die sie achten muss."},{"title":"Die Stichprobe","prompt":"Hier ist ein zufällig gezogenes Ergebnis aus meiner laufenden Produktion: [Ergebnis einfügen]. Und hier die Vorlage, aus der es stammt: [Vorlage einfügen].\nPrüfe es so streng wie ein externer Gutachter: Fakten, Zahlen, Logik, versteckte Annahmen.\nWichtig: Wenn du etwas findest, sag mir nicht nur, was am Ergebnis falsch ist — sag mir, welche Änderung an der Vorlage diesen Fehlertyp künftig verhindert."},{"title":"Bibliotheks-Ordnung","prompt":"Hier ist meine gesammelte Prompt-Sammlung: [Prompts einfügen].\nSortiere sie zu einer Bibliothek: aussagekräftiger Name pro Prompt, Einsatzzweck in einem Satz, Duplikate zusammengelegt, Lücken benannt.\nSchlage mir zum Schluss die drei Vorlagen vor, die mir noch fehlen — abgeleitet aus den Mustern, die du in der Sammlung erkennst."}],"delegate":["Komplette Erstfassungen wiederkehrender Deliverables — Statusberichte, Protokolle, Angebotstexte — vom Briefing bis zur Endfassung","Serienproduktion über Listen: zwanzig Varianten, Personalisierungen oder Kurzprofile nach einer Vorlage","Mehrstufige Recherche-und-Verdichtung-Aufträge, die unbeaufsichtigt durchlaufen","Die erste Qualitätsprüfung — als eingebaute Selbstprüf-Stufe in jeder Pipeline, nicht als dein Handgriff","Das Dokumentieren und Aktualisieren deiner eigenen Abläufe, von der SOP bis zur Vorlagen-Beschreibung"],"keep":["Den Bau und die Pflege der Vorlagen selbst — wer die Partitur schreibt, bestimmt das Ergebnis","Die letzte Freigabe bei allem, was unumkehrbar ist: Zahlen an Kunden, rechtliche Aussagen, Zusagen","Regelmäßige Handarbeit an einem echten Stück — nicht aus Nostalgie, sondern damit dein Qualitätsgefühl kalibriert bleibt","Die Entscheidung, was überhaupt produziert wird — Priorisierung ist keine Pipeline-Aufgabe","Nachrichten, bei denen deine persönliche Stimme der eigentliche Inhalt ist"],"workflows":[{"name":"Die Partitur — eine Vorlage bauen und einspielen","steps":["Nimm ein gelungenes, fertiges Arbeitsergebnis und lass die KI daraus Struktur, Tonalität und Qualitätskriterien extrahieren","Verdichte das zu einer Vorlage mit klaren Platzhaltern und festen Standards","Teste die Vorlage an zwei möglichst unterschiedlichen echten Fällen und vergleiche die Ergebnisse nebeneinander","Speichere die finale Version mit Namen und Einsatzzweck in deiner Prompt-Bibliothek","Setze ein Ablaufdatum — nach drei Monaten wird die Vorlage neu geprüft oder aussortiert"]},{"name":"Der Durchlauf — Autopilot mit Ausnahme-Meldung","steps":["Übergib die komplette Aufgabe mit Vorlage, Kontextmaterial und Qualitätskriterien in einem einzigen Auftrag","Lass die KI mehrstufig arbeiten: Rohfassung, Selbstprüfung gegen deine Kriterien, Endfassung","Lass dir nur die Endfassung zeigen — plus eine Liste der Stellen, an denen die KI unsicher war oder Annahmen getroffen hat","Entscheide ausschließlich über die gemeldeten Stellen; der Rest geht direkt in den nächsten Schritt"]},{"name":"Die Stichprobe — deine Kalibrier-Routine","steps":["Zieh einmal pro Woche ein zufälliges Ergebnis aus deiner laufenden Produktion","Prüfe es einmal gründlich von Hand: Fakten, Zahlen, Kernaussagen","Findest du nichts, läuft das System weiter — findest du etwas, reparierst du die Vorlage, nicht das Einzelstück","Notiere Muster über mehrere Stichproben hinweg; sie zeigen dir, wo dein System leise driftet"]}],"antiPatterns":[{"title":"Der Serienfehler","fix":"Keine Vorlage geht in Produktion, bevor sie an zwei möglichst unterschiedlichen echten Fällen getestet wurde — und taucht ein Fehler auf, reparierst du zuerst die Vorlage, dann das Einzelstück."},{"title":"Das Vorlagen-Museum","fix":"Gib jeder Vorlage ein Ablaufdatum von drei Monaten; danach wird sie gegen die aktuelle Modellgeneration neu getestet oder aussortiert — Anhänglichkeit ist kein Qualitätskriterium."},{"title":"Dirigieren ohne Gehör","fix":"Produziere einmal im Monat ein Deliverable komplett von Hand — nicht weil die KI es nicht könnte, sondern weil dein Vertrauen nur so gut ist wie das Gespür, auf dem es beruht."}]},"WPMA":{"description":"Du übergibst der KI keine Einzelfragen, sondern ganze Produktionsaufträge, die auf deinen erprobten Vorlagen laufen — und lässt sie mehrere Schritte am Stück abarbeiten. Was hinten rauskommt, geht trotzdem erst raus, wenn du Fakten, Zahlen und Quellen gegengeprüft hast: Dein Anspruch ist Serienfertigung ohne Ausschuss.","strengths":["Du skalierst Qualität statt nur Menge: Eine ausgereifte Vorlage liefert dir das zwanzigste Ergebnis so zuverlässig wie das erste.","Hohes Tempo mit voller Deckung: Weil nichts ungeprüft rausgeht, kannst du der KI große Aufträge anvertrauen, ohne deinen Namen zu riskieren.","Dein Werkzeugkasten verzinst sich: Erkenntnisse aus der Prüfung fließen zurück in die Vorlagen, sodass deine Strecken mit jedem Durchlauf besser werden."],"blindspots":["Fehler aus Schritt zwei siehst du erst in Schritt sieben: Weil du an der Ausfahrt prüfst, kompoundieren Irrtümer über den ganzen Autopilot-Lauf — und dort ist Korrektur am teuersten.","Deine Vorlagen veralten leise: Du optimierst innerhalb deiner Systeme und merkst spät, wenn ein neues Modell oder ein anderer Ansatz die ganze Strecke überflüssig macht.","Die KI ist bei dir Werkbank, nie Sparringspartner: Deine Pipeline produziert makellos — auch dann, wenn niemand geprüft hat, ob das Werkstück überhaupt das richtige ist."],"signaturePrompt":"Übernimm diesen Auftrag komplett selbstständig: Erstelle aus [Rohmaterial/Input] ein fertiges [Ergebnis, z. B. Kundenreport] nach exakt dieser Vorlage: [Struktur einfügen].\nArbeite alle Schritte am Stück ab, ohne zwischendurch nachzufragen.\nLiefere am Ende zwei Dinge: das fertige Ergebnis und ein Prüfprotokoll — jede Zahl, jeder Fakt und jede Quelle mit Herkunftsangabe, alles Unsichere klar markiert.","promptLibrary":[{"title":"Vom Einzelfall zur Vorlage","prompt":"Ich habe diese Aufgabe gerade zum dritten Mal erledigt: [Aufgabe beschreiben].\nBaue daraus eine wiederverwendbare Prompt-Vorlage: Identifiziere, was sich von Fall zu Fall ändert, und mache daraus [Platzhalter]. Alles andere wird feste Anweisung.\nErgänze am Ende der Vorlage einen eingebauten Selbstcheck: Woran erkenne ich, dass ein Durchlauf misslungen ist?"},{"title":"Komplettauftrag mit Meilensteinen","prompt":"Erledige den folgenden Auftrag komplett selbstständig: [Auftrag mit Ziel, Zielgruppe und gewünschtem Endformat].\nPlane zuerst deine Arbeitsschritte, dann arbeite sie nacheinander ab.\nMelde dich nur an zwei Punkten mit einem Zwischenstand: nach [Meilenstein 1] und nach [Meilenstein 2]. Dort wartest du auf mein Go, bevor du weitermachst."},{"title":"Prüfprotokoll erzwingen","prompt":"Hier ist ein Ergebnis aus meiner Produktionsstrecke: [Output einfügen].\nErstelle ein Prüfprotokoll als Tabelle: jede Tatsachenbehauptung, jede Zahl, jede Quelle in eine eigene Zeile. Spalten: Behauptung | Herkunft | Prüfbar durch | Risiko, wenn falsch (hoch/mittel/niedrig).\nSortiere nach Risiko, damit ich oben anfangen kann."},{"title":"Red-Team an der Ausfahrt","prompt":"Du bist ein unbestechlicher Gutachter und willst das folgende Dokument durchfallen lassen: [Output einfügen].\nFinde die drei angreifbarsten Stellen: sachliche Fehler, unbelegte Behauptungen, Rechenfehler, innere Widersprüche.\nBewerte jede Stelle: Was passiert, wenn das so bei [Empfänger, z. B. Kunde oder Vorstand] landet?"},{"title":"Zwei Straßen, ein Vergleich","prompt":"Erstelle [Ergebnis] auf zwei völlig unabhängigen Wegen: einmal ausgehend von [Quelle/Ansatz A], einmal ausgehend von [Quelle/Ansatz B]. Nutze für Weg B nichts aus Weg A.\nVergleiche danach beide Ergebnisse Zeile für Zeile und liste jede Abweichung auf — genau dort sitzen die Stellen, die ich selbst prüfen muss."},{"title":"Serienlauf aus einer Tabelle","prompt":"Hier ist meine erprobte Vorlage: [Vorlage einfügen]. Und hier eine Tabelle mit [Anzahl] Fällen: [Tabelle einfügen].\nProduziere für jede Zeile ein eigenes Ergebnis nach der Vorlage. Halte Ton und Struktur über alle Fälle identisch; nur die Platzhalter-Inhalte ändern sich.\nMarkiere jeden Fall, bei dem die Tabellendaten unvollständig oder widersprüchlich waren, statt Lücken zu erfinden."},{"title":"Vorlagen-TÜV","prompt":"Diese Prompt-Vorlage nutze ich seit [Zeitraum] etwa [Häufigkeit]: [Vorlage einfügen].\nPrüfe sie wie ein Auditor: Welche Anweisungen sind überflüssig geworden, welche zu vage, welche verhindern heute bessere Ergebnisse?\nSchreibe eine überarbeitete Version und liste die fünf wichtigsten Änderungen mit Begründung."},{"title":"Stichprobenplan statt Vollprüfung","prompt":"Meine Strecke produziert [Anzahl] [Ergebnisse] pro [Zeitraum] — ich kann nicht alles prüfen.\nEntwirf einen Stichprobenplan: Welche Merkmale machen ein Ergebnis risikoreich (z. B. [Zahlen, Rechtliches, Kundenkontakt])? Welche Fälle prüfe ich immer, welche nur stichprobenartig, in welchem Rhythmus?\nErgebnis als einseitige Prüfregel, die ich auch weitergeben kann."},{"title":"Fehler ausrotten, nicht ausbessern","prompt":"In einem Ergebnis aus dieser Vorlage steckte folgender Fehler: [Fehler beschreiben]. Hier die Vorlage: [Vorlage einfügen].\nAnalysiere, welche Anweisung oder Lücke in der Vorlage den Fehler möglich gemacht hat.\nSchreibe die Vorlage so um, dass diese ganze Fehlerklasse strukturell nicht mehr auftreten kann — nicht nur dieser eine Fall."},{"title":"Format-Wächter","prompt":"Definiere für [Ergebnistyp, z. B. Wochenreport] ein striktes Ausgabeformat: feste Abschnitte, Pflichtfelder, erlaubte Wertebereiche für Zahlen, maximale Längen.\nFormuliere es so, dass ich es künftig an jeden Produktionsauftrag anhängen kann — und dass Abweichungen sofort ins Auge springen.\nErgänze drei Beispiele: ein korrektes Ergebnis und zwei typische Formatverstöße."},{"title":"Übergabe-Briefing","prompt":"Ich will dir gleich eine größere Aufgabe komplett übergeben. Hier meine noch unsortierten Gedanken dazu: [Stichpunkte einfügen].\nForme daraus ein sauberes Briefing mit: Ziel, verfügbarem Input, gewünschtem Endformat, Qualitätskriterien und Stopp-Regeln (wann du abbrichst und nachfragst, statt zu raten).\nStelle mir vorab maximal fünf Fragen zu allem, was für einen fehlerfreien Durchlauf noch fehlt."},{"title":"Abnahme-Checkliste bauen","prompt":"Erstelle eine wiederverwendbare Abnahme-Checkliste für [Ergebnistyp], mit der ich jedes KI-Ergebnis in unter fünf Minuten prüfen kann.\nOrdne die Punkte nach Schadenspotenzial: zuerst alles, was mich [Geld/Reputation/rechtliche Folgen] kosten kann, zuletzt Kosmetik.\nFormuliere jeden Punkt als Ja/Nein-Frage mit konkreter Prüfhandlung: Wo genau sehe ich nach?"},{"title":"Quellen-Ampel","prompt":"Hier ist ein Text mit Fakten und Zahlen: [Text einfügen].\nKlassifiziere jede Aussage in drei Kategorien: BELEGT (nachprüfbare Quelle vorhanden), PLAUSIBEL (klingt richtig, braucht Prüfung), UNGEDECKT (keine Grundlage erkennbar).\nGib mir für jede PLAUSIBEL- und UNGEDECKT-Stelle die schnellste Methode, sie zu verifizieren."},{"title":"Denkpause vor dem Serienlauf","prompt":"Bevor du produzierst: Hier ist der Auftrag, den ich gleich in Serie geben will: [Auftrag einfügen].\nGreif ihn erst an — welche Annahme darin ist am wackligsten, für wen ist das Ergebnis wirklich gedacht, und was wäre die peinlichste Art, damit zu scheitern?\nErst wenn ich deine drei Fragen beantwortet habe, starten wir die Produktion."}],"delegate":["Die komplette Rohproduktion wiederkehrender Formate — Reports, Angebote, Protokolle, Posts —, sobald eine erprobte Vorlage existiert.","Formatwandel jeder Art: aus Notizen Slides, aus Daten Tabellen, aus Langtexten Zusammenfassungen.","Varianten in Serie — zehn Fassungen desselben Ergebnisses für zehn verschiedene Empfänger.","Das Sammeln und Vorstrukturieren von Recherche-Rohmaterial, bevor du es prüfst.","Die erste Fehlersuche am eigenen Output: Selbstcheck und Prüfprotokoll kann die KI vorbereiten, bevor du ranmusst."],"keep":["Die finale Freigabe — kein Ergebnis verlässt die Strecke ohne deinen Blick, egal wie rund die Serie läuft.","Zahlen, rechtliche Aussagen und alles mit Außenwirkung verifizierst du selbst an der Originalquelle.","Die Architektur deiner Vorlagen: Die KI darf Verbesserungen vorschlagen, aber du entscheidest, was ins System kommt.","Die Frage, was überhaupt produziert wird — Priorisierung und Zielsetzung gehören nicht in den Autopiloten.","Die Qualitätskriterien, an denen du prüfst — wer den Maßstab delegiert, prüft nur noch zum Schein."],"workflows":[{"name":"Vom Handgriff zur Strecke","steps":["Erledige die Aufgabe einmal manuell mit der KI und dokumentiere jeden Prompt, der funktioniert hat.","Destilliere daraus eine Vorlage: Variables wird zum Platzhalter, Bewährtes zur festen Anweisung.","Fahre drei Testläufe mit echten Fällen und prüfe jedes Ergebnis gegen deine Abnahme-Checkliste.","Korrigiere nach jedem gefundenen Fehler die Vorlage — nicht nur das Ergebnis.","Nimm die Strecke in Betrieb: Vollprüfung nur noch für Risikofälle, Stichproben für den Rest."]},{"name":"Abnahme mit doppeltem Boden","steps":["Lass die KI zum fertigen Ergebnis ein Prüfprotokoll erstellen: alle Fakten, Zahlen und Quellen mit Herkunft.","Verifiziere die als risikoreich markierten Stellen selbst an der Originalquelle.","Lass eine zweite, unabhängige KI-Sitzung das Ergebnis als Gutachter zerlegen — ohne Zugriff auf die erste.","Gib erst frei, wenn beide Prüfungen sauber sind, und notiere jeden gefundenen Fehler.","Spiele jeden Fehler als neue Regel in die Vorlage zurück."]},{"name":"Quartals-Wartung für Vorlagen","steps":["Liste alle aktiven Vorlagen mit Nutzungshäufigkeit und letztem Änderungsdatum auf.","Lass die KI jede Vorlage auditieren: Was ist überholt, was ginge mit aktuellen Modellen besser?","Teste die überarbeitete Version gegen die alte — am selben echten Fall, blind verglichen.","Übernimm die bessere Version und archiviere die alte mit Datum und Änderungsgrund."]}],"antiPatterns":[{"title":"Prüf-Stau an der Ausfahrt","fix":"Staffle die Prüftiefe nach Risiko: Vollprüfung nur für Zahlen, Rechtliches und alles mit Außenwirkung — der Rest läuft über Stichproben und maschinell prüfbare Formatregeln, damit dein Prüfer-Anspruch nicht zum Flaschenhals wird."},{"title":"Systembau für den Einmalfall","fix":"Drei-Mal-Regel: Erst wenn eine Aufgabe zum dritten Mal auftaucht, bekommt sie eine Vorlage. Davor reicht ein schneller Wegwerf-Prompt — nicht jede Fahrt braucht eine eigene Straße."},{"title":"Output flicken statt Vorlage heilen","fix":"Jede Korrektur, die du zweimal von Hand machst, wandert als feste Regel in die Vorlage. Du besserst keine Fehler aus — du rottest Fehlerklassen aus."}]}};

let ROLES = [{"key":"beratung","label":"Beratung","benchmarkTeaser":"Kaum eine Rolle spannt KI so weit auf wie die Beratung — Denkpartner fürs Storyline-Sparring, Maschine für den Foliensatz — und auf der Kontroll-Achse entscheidet sich, wessen Zahlen den Partner-Check überstehen: Spannend, wo du dich einordnest.","roleFlavor":"Dein Typ bestimmt, ob KI für dich das Sparring vor dem Steering Committee ist oder die Maschine, die aus deinem Storyline-Gerüst über Nacht den ersten Foliensatz baut — und wie viel davon du vor dem Kundentermin noch einmal auseinandernimmst."},{"key":"pm","label":"Product Management","benchmarkTeaser":"Product Manager nutzen KI unserem Modell nach vor allem als Denkpartner — für Priorisierung, Specs und das Durchspielen von Trade-offs — während die Delegations-Achse überraschend weit auseinandergeht: Zerlegst du in Häppchen, oder schickst du ganze Discovery-Aufgaben auf Reisen?","roleFlavor":"Im PM-Alltag zeigt sich dein Typ daran, ob du mit KI erst das Problem zerlegst oder direkt das PRD generieren lässt — und wie viel Stakeholder-Realität du dem Output noch beibringst, bevor er ins Refinement geht."},{"key":"marketing","label":"Marketing","benchmarkTeaser":"Im Marketing zieht die Fokus-Achse in unserem Modell klar Richtung Macher — Content, Kampagnen, Varianten in Serie — doch die spannendere Frage stellt die Kontroll-Achse: Wer lässt Ton und Marke wirklich von der KI mitschreiben, und wer wacht darüber?","roleFlavor":"Dein Typ entscheidet, ob KI deine Ideenmaschine fürs nächste Kampagnen-Konzept ist oder dein Produktionsstudio für zwanzig Varianten einer Betreffzeile — und ab welchem Punkt nur noch deine eigene Stimme in den Text darf."},{"key":"dev","label":"Software-Entwicklung","benchmarkTeaser":"Nirgendwo geht die Delegations-Achse so weit auf wie in der Software-Entwicklung — vom Zeile-für-Zeile-Autocomplete bis zum Agenten, der ganze Tickets abräumt — und unser Modell erwartet hier die systematischsten Architekt-Setups überhaupt: W function computeResult(answers){
  const sums=[0,0,0,0];
  QUESTIONS.forEach((q,i)=>{ const v=answers[i]||3; sums[q.axis]+=(v-3)*q.key; });
  let code="";
  const leans=[];
  sums.forEach((s,ax)=>{
    code += (s>=0)? AXES[ax].plus.letter : AXES[ax].minus.letter;
    let lean = 50 + (s/12)*50;          // lean toward PLUS pole
    lean = Math.max(3, Math.min(97, lean));
    leans.push(lean);
  });
  return {code, sums, leans};
}
function arch(code){
  const m = METAMAP[code] || {code,name:code,tagline:""};
  const d = DATA[code] || placeholderProfile(code);
  const ac = (PALETTE[code]||{dark:"#8B85FF",light:"#4F46D6"});
  return Object.assign({}, m, d, {accent:ac});
}
function accentFor(code){
  const dark = matchMedia("(prefers-color-scheme:dark)").matches;
  const forced = document.documentElement.getAttribute("data-theme");
  const isDark = forced? forced==="dark" : dark;
  const ac = PALETTE[code]||{dark:"#8B85FF",light:"#4F46D6"};
  return isDark? ac.dark : ac.light;
}
function placeholderProfile(code){
  return {
    description:"Profiltext wird geladen …",

  };
}

/* ====================================================================
   GENERATIVE GLYPH  — parametric "measuring instrument"
   Circular frame + 4 radial arms (one per axis). Each axis pole sets
   the arm's reach (plus = far/open, minus = near/solid). The four
   endpoints form a signature polygon → 16 distinct, coherent marks.
   ==================================================================== */
function glyphGeometry(code){
  // arm angles: Delegation top, Kontrolle right, Fokus bottom, Methode left
  const ang=[-Math.PI/2, 0, Math.PI/2, Math.PI];
  const plus=[]; // is plus pole?
  for(let i=0;i<4;i++){
    const L=code[i];
    plus.push( L===AXES[i].plus.letter );
  }
  return {ang,plus};
}
function drawGlyph(ctx, cx, cy, R, code, color, p){
  // p: 0..1 draw progress
  p = Math.max(0,Math.min(1,p));
  const {ang,plus} = glyphGeometry(code);
  ctx.save();
  ctx.lineCap="round"; ctx.lineJoin="round";
  const ease = p<1? (1-Math.pow(1-p,3)) : 1;

  // outer ring (sweeps in)
  ctx.strokeStyle=color; ctx.globalAlpha=0.28*ease+0.0;
  ctx.lineWidth=Math.max(1.2,R*0.014);
  ctx.beginPath();
  ctx.arc(cx,cy,R,-Math.PI/2,-Math.PI/2 + Math.PI*2*ease);
  ctx.stroke();

  // faint inner tick ring
  ctx.globalAlpha=0.14*ease;
  ctx.beginPath(); ctx.arc(cx,cy,R*0.72,-Math.PI/2,-Math.PI/2+Math.PI*2*ease); ctx.stroke();

  // endpoints
  const pts = ang.map((a,i)=>{
    const reach = (plus[i]? 0.9 : 0.5) * R;
    return {x:cx+Math.cos(a)*reach, y:cy+Math.sin(a)*reach, a, reach, plus:plus[i]};
  });

  // signature polygon
  const polyP = Math.max(0,(ease-0.25)/0.75);
  if(polyP>0){
    ctx.globalAlpha=0.9;
    ctx.strokeStyle=color; ctx.lineWidth=Math.max(1.6,R*0.02);
    ctx.beginPath();
    for(let i=0;i<=4;i++){
      const a = pts[i%4];
      const b = pts[(i-1+4)%4];
      if(i===0){ ctx.moveTo(a.x,a.y); }
      else{
        const t=Math.max(0,Math.min(1,(polyP*4)-(i-1)));
        ctx.lineTo(b.x+(a.x-b.x)*t, b.y+(a.y-b.y)*t);
        if(t<1) break;
      }
    }
    ctx.stroke();
  }

  // arms + nodes
  pts.forEach((pt,i)=>{
    const armP=Math.max(0,Math.min(1,(ease-0.1)/0.6));
    ctx.globalAlpha=0.55;
    ctx.strokeStyle=color; ctx.lineWidth=Math.max(1.2,R*0.013);
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(pt.a)*pt.reach*armP, cy+Math.sin(pt.a)*pt.reach*armP);
    ctx.stroke();
    if(ease>0.55){
      const nodeA=Math.min(1,(ease-0.55)/0.45);
      ctx.globalAlpha=nodeA;
      const nr=R*0.055;
      if(pt.plus){ // open ring
        ctx.lineWidth=Math.max(1.4,R*0.016); ctx.strokeStyle=color;
        ctx.beginPath(); ctx.arc(pt.x,pt.y,nr*1.15,0,Math.PI*2); ctx.stroke();
      }else{ // solid dot
        ctx.fillStyle=color;
        ctx.beginPath(); ctx.arc(pt.x,pt.y,nr,0,Math.PI*2); ctx.fill();
      }
    }
  });

  // center node
  ctx.globalAlpha=Math.min(1,ease*1.4);
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.arc(cx,cy,R*0.045,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=0.4*ease; ctx.lineWidth=Math.max(1,R*0.01); ctx.strokeStyle=color;
  ctx.beginPath(); ctx.arc(cx,cy,R*0.1,0,Math.PI*2); ctx.stroke();

  ctx.restore();
}
function setupCanvas(canvas, size){
  const dpr=Math.min(2.5, window.devicePixelRatio||1);
  canvas.width=size*dpr; canvas.height=size*dpr;
  const ctx=canvas.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return ctx;
}

const app=()=>document.getElementById("app");
function go(screen){
  state.screen=screen;
  render();
  window.scrollTo({top:0,behavior:reduceMotion()?"auto":"smooth"});
}
function reduceMotion(){ return matchMedia("(prefers-reduced-motion:reduce)").matches; }

function render(){
  const root=app();
  // apply the per-archetype accent on result screens; brand accent elsewhere
  const rootEl=document.documentElement;
  if(state.result && ["reveal","paywall","report"].includes(state.screen)){
    const ac=accentFor(state.result.code);
    rootEl.style.setProperty("--accent",ac);
    rootEl.style.setProperty("--accent-soft",hexA(ac,0.15));
  }else{
    rootEl.style.removeProperty("--accent");
    rootEl.style.removeProperty("--accent-soft");
  }
  let html="";
  if(state.screen==="landing") html=viewLanding();
  else if(state.screen==="start") html=viewStart();
  else if(state.screen==="test") html=viewTest();
  else if(state.screen==="reveal") html=viewReveal();
  else if(state.screen==="paywall") html=viewPaywall();
  else if(state.screen==="report") html=viewReport();
  root.innerHTML=`<div class="screen active" id="screen-${state.screen}">${html}</div>`;
  afterRender();
}

/* ---------------- TEST ---------------- */
function viewTest(){
  const q=QUESTIONS[state.qi];
  const ax=AXES[q.axis];
  const pct=Math.round((state.qi)/QUESTIONS.length*100);
  const cur=state.answers[state.qi];
  const opts=[1,2,3,4,5].map(n=>`
    <button class="opt${cur===n?" sel":""}" data-val="${n}" onclick="answer(${n})" aria-label="${LIKERT[n-1]}">
      <span class="dot"></span><span class="num">${n}</span>
    </button>`).join("");
  return `
  <div class="progress-wrap">
    <div class="progress-inner">
      <button class="iconbtn" onclick="prevQuestion()" aria-label="Zurück" ${state.qi===0?'style="opacity:.4;pointer-events:none"':''}>

      </button>
      <div class="pbar"><i style="width:${pct}%"></i></div>
      <div class="pcount">${String(state.qi+1).padStart(2,"0")} / ${QUESTIONS.length}</div>
    </div>
  </div>
  <div class="qstage">
    <div class="qaxis"><span class="tag">${ax.name}</span></div>
    <p class="qtext">${q.text}</p>
    <div class="likert">

      <div class="scale">${opts}</div>

      <div class="qhint">Wähle per <kbd>1</kbd>–<kbd>5</kbd> oder Klick</div>

  </div>`;
}

/* ---------------- REVEAL ---------------- */
function viewReveal(){
  const a=arch(state.result.code);

  const codeSpans=a.code.split("").map((c,i)=>`<span style="animation-delay:${0.15+i*0.12}s">${c}</span>`).join("");
  const axesHtml=AXES.map((ax,i)=>{
    const lean=state.result.leans[i];
    const plusOn = lean>=50;
    return `<div class="axis-row" style="animation-delay:${0.7+i*0.12}s">
      <div class="axpoles">
        <b class="${plusOn?'off':'on'}">${ax.minus.label}</b>

        <b class="${plusOn?'on':'off'}">${ax.plus.label}</b>
      </div>
      <div class="axtrack"><div class="fill" data-lean="${lean}"></div><div class="knob" data-lean="${lean}"></div></div>

  const strengths=(a.strengths||[]).map(s=>`<li><span class="b"></span>${s}</li>`).join("");

/* ====================================================================
   benchmark illustrative distribution (labelled preview)
   ==================================================================== */
function benchDistribution(code,roleKey){
  // deterministic pseudo-distribution across a few neighbouring types,
  // clearly illustrative. Puts "you" highlighted.
  const seedRoles={
    beratung:["EPDA","WPDA","EVDA"],pm:["EVDA","WVDA","EVMI"],marketing:["EVMI","WVMI","EVMA"],
    dev:["WPMA","EPMA","WPMI"],recht:["EPDA","EPDI","WPDA"],lehre:["EPDI","EVDI","EPDA"],
    gruendung:["WVMI","WVDA","EVMI"],andere:["EVDA","WVMI","EPDA"]
  };
  const near=(seedRoles[roleKey]||seedRoles.andere).slice();
  if(!near.includes(code)) near[near.length-1]=code;
  const base=[34,27,21];
  const rows=near.map((c,i)=>({label:(METAMAP[c]?METAMAP[c].name:c),pct:base[i],you:c===code,code:c}));
  if(!rows.some(r=>r.you)) rows.push({label:(METAMAP[code]?METAMAP[code].name:code),pct:14,you:true,code});
  // ensure "you" present & marked
  rows.forEach(r=>{ if(r.code===code) r.you=true; });
  return rows;
}

function startTest(){ state.answers=new Array(24).fill(0); state.qi=0; go("start"); }
function beginQuestions(){
  const sel=document.getElementById("roleSel");
  if(sel) state.role=sel.value;

}
function answer(n){
  state.answers[state.qi]=n;
  const stage=document.querySelector(".qstage");
  document.querySelectorAll(".opt").forEach(o=>o.classList.toggle("sel",+o.dataset.val===n));
  setTimeout(()=>{
    if(state.qi<QUESTIONS.length-1){ state.qi++; render(); }
    else finishTest();
  }, reduceMotion()?0:260);
}
function prevQuestion(){ if(state.qi>0){ state.qi--; render(); } }
function finishTest(){
  state.result=computeResult(state.answers);
  // Ergebnis persistieren — überlebt den Stripe-Checkout-Roundtrip
  store.set("kognit_result",JSON.stringify(state.result));
  store.set("kognit_role",state.role);
  go("reveal");
}

function redeemKey(){

}

/* ---- badge / share ---- */
function renderBadge(){
  const canvas=document.getElementById("badgeCanvas");
  if(!canvas||!state.result) return;
  const W=1200,H=630;
  const dpr=1; // fixed export size
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext("2d");
  const a=arch(state.result.code);
  const ac=(PALETTE[a.code]||{dark:"#8B85FF"}).dark; // badge ground is always dark → use the dark (brighter) accent variant in both themes
  // ground
  const g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,"#0B0E1C"); g.addColorStop(1,"#151A34");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // halo
  const rg=ctx.createRadialGradient(880,315,40,880,315,420);
  rg.addColorStop(0,hexA(ac,.32)); rg.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
  // border frame
  ctx.strokeStyle="rgba(255,255,255,.10)"; ctx.lineWidth=2; roundRect(ctx,24,24,W-48,H-48,26); ctx.stroke();
  // glyph
  drawGlyph(ctx,880,315,190,a.code,ac,1);
  // text
  ctx.fillStyle="rgba(255,255,255,.55)"; ctx.font="500 24px ui-monospace,Menlo,monospace";
  ctx.fillText("KOGNIT · KI-ARBEITSTYP", 80, 120);
  ctx.fillStyle=ac; ctx.font="600 30px ui-monospace,Menlo,monospace";
  ctx.fillText(a.code.split("").join("  "), 80, 300);
  ctx.fillStyle="#EDEFFA"; ctx.font="600 76px ui-serif,Georgia,serif";
  ctx.fillText(a.name, 78, 375);
  ctx.fillStyle="rgba(237,239,250,.72)"; ctx.font="italic 30px ui-serif,Georgia,serif";
  wrapText(ctx,"„"+a.tagline+"\"",80,430,520,38);
  const role=ROLES.find(r=>r.key===state.role);
  ctx.fillStyle="rgba(255,255,255,.4)"; ctx.font="500 22px ui-sans-serif,system-ui,sans-serif";
  ctx.fillText((role?role.label:"")+"  ·  kognit", 80, H-70);
  return canvas;
}
function downloadBadge(){
  const canvas=renderBadge(); if(!canvas) return;
  try{
    const url=canvas.toDataURL("image/png");
    const a2=document.createElement("a");
    a2.download="kognit-"+state.result.code+".png"; a2.href=url; a2.click();
    toast("Badge als PNG gespeichert");
  }catch(e){ toast("Download in dieser Umgebung blockiert — Screenshot tut's auch"); }
}
async function shareBadge(){
  const canvas=renderBadge(); if(!canvas) return;
  try{
    if(navigator.share && canvas.toBlob){
      canvas.toBlob(async b=>{
        try{
          const file=new File([b],"kognit-"+state.result.code+".png",{type:"image/png"});
          if(navigator.canShare && navigator.canShare({files:[file]})){
            await navigator.share({files:[file],title:"Mein KI-Arbeitstyp",text:arch(state.result.code).name+" · Kognit"});
          }else{ downloadBadge(); }
        }catch(e){ downloadBadge(); }
      },"image/png");
    }else{ downloadBadge(); }
  }catch(e){ downloadBadge(); }
}

/* ====================================================================
   after-render hooks: canvases, animations, keyboard
   ==================================================================== */
function afterRender(){
  // glyph chips / previews
  document.querySelectorAll("canvas[data-glyph]").forEach(cv=>{
    const code=cv.dataset.glyph;
    const rect=cv.getBoundingClientRect();
    const size=Math.max(40,rect.width||60);
    const ctx=setupCanvas(cv,size);
    drawGlyph(ctx,size/2,size/2,size*0.42,code,accentFor(code),1);
  });

  if(state.screen==="landing") initHeroOrbit();
  if(state.screen==="test") { /* keyboard handled globally */ }
  if(state.screen==="reveal") animateReveal();
  if(state.screen==="paywall") { const k=document.getElementById("licenseKey"); }
}

function animateReveal(){
  const sec=document.getElementById("revealSection");
  if(sec) requestAnimationFrame(()=>sec.classList.add("lit"));
  // glyph draw-in
  const cv=document.getElementById("revealGlyph");
  if(cv){
    const size=cv.getBoundingClientRect().width||300;
    const ctx=setupCanvas(cv,size);
    const code=cv.dataset.code, col=accentFor(code);
    if(reduceMotion()){ drawGlyph(ctx,size/2,size/2,size*0.4,code,col,1); }
    else{
      const dur=1100, t0=performance.now();
      (function frame(now){
        const p=Math.min(1,(now-t0)/dur);
        ctx.clearRect(0,0,size,size);
        drawGlyph(ctx,size/2,size/2,size*0.4,code,col,p);
        if(p<1) requestAnimationFrame(frame);
      })(t0);
    }
  }
  // axis fills
  setTimeout(()=>{
    document.querySelectorAll(".axtrack .fill").forEach(f=>{ f.style.width=(+f.dataset.lean)+"%"; });
    document.querySelectorAll(".axtrack .knob").forEach(k=>{ k.style.left=(+k.dataset.lean)+"%"; setTimeout(()=>k.classList.add("show"),300); });
  }, reduceMotion()?0:900);
  // badge
  setTimeout(renderBadge, 60);
}

let heroRAF=null;
function initHeroOrbit(){
  const cv=document.getElementById("heroOrbit"); if(!cv) return;
  if(heroRAF) cancelAnimationFrame(heroRAF);
  function resize(){
    const p=cv.parentElement.getBoundingClientRect();
    const dpr=Math.min(2,window.devicePixelRatio||1);
    cv.width=p.width*dpr; cv.height=p.height*dpr;
    cv.getContext("2d").setTransform(dpr,0,0,dpr,0,0);
  }
  resize();
  const ctx=cv.getContext("2d");
  const isDark=()=>{ const f=document.documentElement.getAttribute("data-theme"); return f?f==="dark":matchMedia("(prefers-color-scheme:dark)").matches; };
  const brand=()=>getComputedStyle(document.documentElement).getPropertyValue("--brand").trim()||"#6C63FF";
  // static constellation of faint archetype glyphs drifting
  // deterministic positions confined to the EMPTY right half so the
  // faint instrument glyphs never cross the left-aligned headline/copy
  const POS=[
    {x:0.86,y:0.15,r:66},{x:0.965,y:0.45,r:54},{x:0.72,y:0.80,r:90},
    {x:0.90,y:0.79,r:46},{x:0.80,y:0.30,r:40}
  ];
  const nodes=POS.map((p,i)=>({code:META[(i*3+2)%16].code, x:p.x, y:p.y, r:p.r, spd:0.018+(i%4)*0.006, ph:i*1.7}));
  if(reduceMotion()){
    const W=cv.clientWidth,H=cv.clientHeight;
    nodes.forEach(n=>{ ctx.globalAlpha=0.06; drawGlyph(ctx,n.x*W,n.y*H,n.r,n.code,brand(),1); });
    return;
  }
  let t=0;
  function loop(){
    const W=cv.clientWidth,H=cv.clientHeight;
    ctx.clearRect(0,0,W,H); t+=0.006;
    nodes.forEach((n,i)=>{
      const x=n.x*W + Math.cos(t*n.spd*10+n.ph)*30;
      const y=n.y*H + Math.sin(t*n.spd*10+n.ph)*24;
      ctx.globalAlpha=isDark()?0.07:0.05;
      drawGlyph(ctx,x,y,n.r,n.code,brand(),1);
    });
    heroRAF=requestAnimationFrame(loop);
  }
  loop();
  window.addEventListener("resize",()=>{ resize(); },{passive:true});
}

document.addEventListener("keydown",e=>{

/* ---- helpers ---- */
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function copyText(btn,jsonStr){
  let txt; try{ txt=JSON.parse(jsonStr);}catch(e){ txt=jsonStr; }
  const done=()=>{ const o=btn.textContent; btn.textContent="Kopiert ✓"; setTimeout(()=>btn.textContent=o,1400); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt,done)); }
  else fallbackCopy(txt,done);
}
function fallbackCopy(txt,done){
  const ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); done(); }catch(e){} document.body.removeChild(ta);
}
let toastT=null;
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2600);
}
function hexA(hex,a){
  const h=hex.replace("#",""); const n=parseInt(h.length===3?h.split("").map(c=>c+c).join(""):h,16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function wrapText(ctx,text,x,y,maxW,lh){
  const words=text.split(" "); let line="",yy=y;
  for(const w of words){ const t=line+w+" "; if(ctx.measureText(t).width>maxW&&line){ ctx.fillText(line,x,yy); line=w+" "; yy+=lh; } else line=t; }
  ctx.fillText(line,x,yy);
}

/* ---- theme toggle ---- */
(function(){
  const btn=document.getElementById("themeToggle");
  const saved=store.get("kognit_theme");
  if(saved) document.documentElement.setAttribute("data-theme",saved);
  btn.addEventListener("click",()=>{
    const cur=document.documentElement.getAttribute("data-theme")
      || (matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
    const next=cur==="dark"?"light":"dark";
    document.documentElement.setAttribute("data-theme",next);
    store.set("kognit_theme",next);
    render(); // recolor canvases for new theme
  });
})();
